<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>27个事件生命周期定位图</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1a2e;
    --session: #7b61ff;
    --query: #00d4ff;
    --tool: #48bb78;
    --agent: #ffd93d;
    --blockable: #ff4757;
    --fireforget: #a0a0a0;
    --text: #e8e8e8;
    --text-dim: #94a3b8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans SC', 'Space Grotesk', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px;
    background-image: 
      radial-gradient(circle at 15% 20%, rgba(123,97,255,0.14) 0%, transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(0,212,255,0.1) 0%, transparent 45%),
      radial-gradient(circle at 50% 50%, rgba(26,26,46,1) 0%, rgba(16,16,30,1) 100%);
  }
  h1 {
    font-family: 'Space Grotesk', 'Noto Sans SC', sans-serif;
    font-size: 1.9rem;
    font-weight: 700;
    margin-bottom: 6px;
    letter-spacing: -0.02em;
    background: linear-gradient(90deg, #fff, #a5b4fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-bottom: 28px;
    letter-spacing: 0.04em;
  }
  .diagram-container {
    width: 100%;
    max-width: 1240px;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.35);
    backdrop-filter: blur(8px);
    position: relative;
  }
  svg { width: 100%; height: auto; display: block; }
  .layer-rect { rx: 12; }
  .fill-session { fill: url(#gradSession); opacity: 0.14; }
  .fill-query { fill: url(#gradQuery); opacity: 0.14; }
  .fill-tool { fill: url(#gradTool); opacity: 0.14; }
  .fill-agent { fill: url(#gradAgent); opacity: 0.14; }
  .event-dot { cursor: pointer; transition: r 0.2s ease; }
  .event-dot:hover { r: 8; }
  .blockable-ring { fill: none; stroke: var(--blockable); stroke-width: 2; pointer-events: none; }
  .ff-dot { fill: var(--fireforget); }
  .event-label { font-size: 11px; font-weight: 500; fill: var(--text); font-family: 'Noto Sans SC', sans-serif; pointer-events: none; }
  .event-sub { font-size: 9px; fill: var(--text-dim); font-family: 'Space Grotesk', sans-serif; pointer-events: none; }
  .layer-label { font-size: 12px; font-weight: 700; font-family: 'Space Grotesk', sans-serif; text-transform: uppercase; letter-spacing: 0.08em; pointer-events: none; }
  .group-label { font-size: 12px; font-weight: 700; fill: var(--text); font-family: 'Noto Sans SC', sans-serif; pointer-events: none; }
  .tooltip {
    position: absolute;
    pointer-events: none;
    background: rgba(18,18,32,0.98);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 12px;
    color: var(--text);
    box-shadow: 0 16px 50px rgba(0,0,0,0.5);
    opacity: 0;
    transition: opacity 0.2s;
    max-width: 280px;
    z-index: 100;
    backdrop-filter: blur(10px);
    line-height: 1.5;
  }
  .tooltip-title { font-weight: 700; font-size: 13px; margin-bottom: 4px; color: #fff; }
  .tooltip-meta { color: var(--text-dim); font-size: 11px; }
  .tooltip-badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; margin-top: 6px; margin-right: 4px; font-weight: 600; border: 1px solid; }
  .badge-block { background: rgba(255,71,87,0.12); color: #ff6b7a; border-color: rgba(255,71,87,0.35); }
  .badge-ff { background: rgba(160,160,160,0.12); color: #c8c8c8; border-color: rgba(160,160,160,0.35); }
  .satellite-rect { fill: rgba(255,255,255,0.03); stroke: rgba(255,255,255,0.1); stroke-width: 1; rx: 8; }
  .legend { display: flex; gap: 18px; margin-top: 18px; flex-wrap: wrap; justify-content: center; font-size: 11px; }
  .legend-item { display: flex; align-items: center; gap: 5px; color: var(--text-dim); }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; }
  .legend-ring { border: 2px solid var(--blockable); background: transparent; }
</style>
</head>
<body>
  <h1>27个事件生命周期定位图</h1>
  <div class="subtitle">27 Hook Events Lifecycle Map — Session / Query / Tool / Agent</div>
  
  <div class="diagram-container">
    <svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
      <defs>
        <linearGradient id="gradSession" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#7b61ff" stop-opacity="0.5"/><stop offset="100%" stop-color="#7b61ff" stop-opacity="0.03"/></linearGradient>
        <linearGradient id="gradQuery" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#00d4ff" stop-opacity="0.45"/><stop offset="100%" stop-color="#00d4ff" stop-opacity="0.03"/></linearGradient>
        <linearGradient id="gradTool" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#48bb78" stop-opacity="0.45"/><stop offset="100%" stop-color="#48bb78" stop-opacity="0.03"/></linearGradient>
        <linearGradient id="gradAgent" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#ffd93d" stop-opacity="0.45"/><stop offset="100%" stop-color="#ffd93d" stop-opacity="0.03"/></linearGradient>
        <filter id="glowSession" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="3" result="blur"/><feComposite in="SourceGraphic" in2="blur" operator="over"/></filter>
      </defs>
      
      <!-- DESKTOP VIEW -->
      <g id="desktop-view">
        <!-- Connection lines -->
        <line x1="220" y1="610" x2="220" y2="580" stroke="rgba(148,163,184,0.3)" stroke-width="1" stroke-dasharray="4,4"/>
        <line x1="450" y1="610" x2="450" y2="580" stroke="rgba(148,163,184,0.3)" stroke-width="1" stroke-dasharray="4,4"/>
        <line x1="700" y1="610" x2="700" y2="580" stroke="rgba(148,163,184,0.3)" stroke-width="1" stroke-dasharray="4,4"/>
        <line x1="950" y1="610" x2="950" y2="580" stroke="rgba(148,163,184,0.3)" stroke-width="1" stroke-dasharray="4,4"/>
        
        <!-- Session -->
        <rect x="80" y="60" width="1040" height="520" rx="16" class="fill-session layer-rect" stroke="#7b61ff" stroke-width="2" filter="url(#glowSession)"/>
        <text x="110" y="88" fill="#7b61ff" class="layer-label">Session Layer</text>
        <!-- Query -->
        <rect x="140" y="130" width="920" height="380" rx="14" class="fill-query layer-rect" stroke="#00d4ff" stroke-width="2"/>
        <text x="170" y="153" fill="#00d4ff" class="layer-label">Query Layer</text>
        <!-- Tool -->
        <rect x="200" y="200" width="800" height="240" rx="12" class="fill-tool layer-rect" stroke="#48bb78" stroke-width="2"/>
        <text x="230" y="222" fill="#48bb78" class="layer-label">Tool Layer</text>
        <!-- Agent -->
        <rect x="260" y="270" width="680" height="100" rx="10" class="fill-agent layer-rect" stroke="#ffd93d" stroke-width="2"/>
        <text x="290" y="288" fill="#ffd93d" class="layer-label">Agent Layer</text>
        
        <!-- Arrows -->
        <polygon points="1120,70 1133,80 1120,90" fill="#7b61ff" opacity="0.5"/>
        <polygon points="1060,140 1073,150 1060,160" fill="#00d4ff" opacity="0.5"/>
        <polygon points="1000,210 1013,220 1000,230" fill="#48bb78" opacity="0.5"/>
        <polygon points="940,280 953,290 940,300" fill="#ffd93d" opacity="0.5"/>
        
        <!-- SessionStart -->
        <g class="event-group" data-title="SessionStart" data-desc="会话启动时触发。包括 startup / resume / clear / compact 等场景。" data-blockable="false" data-ff="false">
          <circle cx="140" cy="320" r="6" fill="#7b61ff" class="event-dot"/>
          <text x="155" y="324" class="event-label">SessionStart</text><text x="155" y="336" class="event-sub">startup / resume / clear</text>
        </g>
        <!-- SessionEnd -->
        <g class="event-group" data-title="SessionEnd" data-desc="会话结束时触发。包括 clear / logout / prompt_input_exit / other 等场景。" data-blockable="false" data-ff="false">
          <circle cx="1060" cy="320" r="6" fill="#7b61ff" class="event-dot"/>
          <text x="1045" y="324" text-anchor="end" class="event-label">SessionEnd</text><text x="1045" y="336" text-anchor="end" class="event-sub">clear / logout / exit</text>
        </g>
        
        <!-- Query events -->
        <g class="event-group" data-title="UserPromptSubmit" data-desc="用户提交提示词时触发。可通过 hook 脚本阻断（exit 2）。" data-blockable="true" data-ff="false">
          <circle cx="200" cy="320" r="6" fill="#00d4ff" class="event-dot"/><circle cx="200" cy="320" r="9" class="blockable-ring"/>
          <text x="200" y="298" text-anchor="middle" class="event-label">UserPromptSubmit</text>
          <path d="M196,282 l4,-2 l4,2 v3 a4,4 0 0 1 -4,4 a4,4 0 0 1 -4,-4 z" fill="none" stroke="#ff4757" stroke-width="1.2"/>
        </g>
        <g class="event-group" data-title="InstructionsLoaded" data-desc="系统指令加载完成时触发。横跨配置与查询层的关键衔接点。" data-blockable="false" data-ff="false">
          <circle cx="330" cy="320" r="6" fill="#00d4ff" class="event-dot"/>
          <text x="330" y="345" text-anchor="middle" class="event-label">InstructionsLoaded</text><text x="330" y="356" text-anchor="middle" class="event-sub">Config + Query</text>
        </g>
        <g class="event-group" data-title="Stop" data-desc="AI 即将结束回答时触发。可通过 hook 脚本阻断（exit 2）。" data-blockable="true" data-ff="false">
          <circle cx="600" cy="320" r="6" fill="#00d4ff" class="event-dot"/><circle cx="600" cy="320" r="9" class="blockable-ring"/>
          <text x="600" y="298" text-anchor="middle" class="event-label">Stop</text>
          <path d="M596,282 l4,-2 l4,2 v3 a4,4 0 0 1 -4,4 a4,4 0 0 1 -4,-4 z" fill="none" stroke="#ff4757" stroke-width="1.2"/>
        </g>
        <g class="event-group" data-title="StopFailure" data-desc="Stop 事件处理失败时触发。Fire-and-forget，不可阻断。" data-blockable="false" data-ff="true">
          <circle cx="690" cy="320" r="6" fill="#a0a0a0" class="event-dot ff-dot"/>
          <text x="690" y="345" text-anchor="middle" class="event-label">StopFailure</text>
          <path d="M688,360 q1,-2 2,0 q1,-1 1,1 q0,2 -2,3 q-2,-1 -2,-3 q0,-1 1,-1 z" fill="#a0a0a0"/>
        </g>
        <g class="event-group" data-title="Notification" data-desc="系统通知发出时触发。Fire-and-forget 模式。" data-blockable="false" data-ff="true">
          <circle cx="780" cy="320" r="6" fill="#a0a0a0" class="event-dot ff-dot"/>
          <text x="780" y="298" text-anchor="middle" class="event-label">Notification</text>
          <path d="M778,282 q1,-2 2,0 q1,-1 1,1 q0,2 -2,3 q-2,-1 -2,-3 q0,-1 1,-1 z" fill="#a0a0a0"/>
        </g>
        <g class="event-group" data-title="PreCompact" data-desc="压缩操作开始前触发。可通过 hook 脚本阻断（exit 2）。" data-blockable="true" data-ff="false">
          <circle cx="870" cy="320" r="6" fill="#00d4ff" class="event-dot"/><circle cx="870" cy="320" r="9" class="blockable-ring"/>
          <text x="870" y="345" text-anchor="middle" class="event-label">PreCompact</text>
          <path d="M866,360 l4,-2 l4,2 v3 a4,4 0 0 1 -4,4 a4,4 0 0 1 -4,-4 z" fill="none" stroke="#ff4757" stroke-width="1.2"/>
        </g>
        <g class="event-group" data-title="PostCompact" data-desc="压缩操作完成后触发。" data-blockable="false" data-ff="false">
          <circle cx="960" cy="320" r="6" fill="#00d4ff" class="event-dot"/>
          <text x="960" y="298" text-anchor="middle" class="event-label">PostCompact</text>
        </g>
        
        <!-- Tool events -->
        <g class="event-group" data-title="PreToolUse" data-desc="工具执行前一刻触发。可通过 hook 脚本阻断（exit 2）。" data-blockable="true" data-ff="false">
          <circle cx="300" cy="320" r="6" fill="#48bb78" class="event-dot"/><circle cx="300" cy="320" r="9" class="blockable-ring"/>
          <text x="300" y="350" text-anchor="middle" class="event-label">PreToolUse</text>
          <path d="M296,365 l4,-2 l4,2 v3 a4,4 0 0 1 -4,4 a4,4 0 0 1 -4,-4 z" fill="none" stroke="#ff4757" stroke-width="1.2"/>
        </g>
        <g class="event-group" data-title="PostToolUse" data-desc="工具成功执行后触发。" data-blockable="false" data-ff="false">
          <circle cx="420" cy="320" r="6" fill="#48bb78" class="event-dot"/>
          <text x="420" y="298" text-anchor="middle" class="event-label">PostToolUse</text>
        </g>
        <g class="event-group" data-title="PostToolUseFailure" data-desc="工具执行失败后触发。Fire-and-forget 模式。" data-blockable="false" data-ff="true">
          <circle cx="540" cy="320" r="6" fill="#a0a0a0" class="event-dot ff-dot"/>
          <text x="540" y="350" text-anchor="middle" class="event-label">PostToolUseFailure</text>
          <path d="M538,365 q1,-2 2,0 q1,-1 1,1 q0,2 -2,3 q-2,-1 -2,-3 q0,-1 1,-1 z" fill="#a0a0a0"/>
        </g>
        <g class="event-group" data-title="PermissionDenied" data-desc="权限检查被拒绝时触发。" data-blockable="false" data-ff="false">
          <circle cx="660" cy="320" r="6" fill="#48bb78" class="event-dot"/>
          <text x="660" y="298" text-anchor="middle" class="event-label">PermissionDenied</text>
        </g>
        <g class="event-group" data-title="PermissionRequest" data-desc="权限弹窗请求时触发。" data-blockable="false" data-ff="false">
          <circle cx="780" cy="320" r="6" fill="#48bb78" class="event-dot"/>
          <text x="780" y="350" text-anchor="middle" class="event-label">PermissionRequest</text>
        </g>
        
        <!-- Agent events -->
        <g class="event-group" data-title="SubagentStart" data-desc="子 Agent 启动时触发。" data-blockable="false" data-ff="false">
          <circle cx="380" cy="320" r="6" fill="#ffd93d" class="event-dot"/>
          <text x="380" y="298" text-anchor="middle" class="event-label">SubagentStart</text>
        </g>
        <g class="event-group" data-title="SubagentStop" data-desc="子 Agent 即将退出时触发。可通过 hook 脚本阻断（exit 2）。" data-blockable="true" data-ff="false">
          <circle cx="820" cy="320" r="6" fill="#ffd93d" class="event-dot"/><circle cx="820" cy="320" r="9" class="blockable-ring"/>
          <text x="820" y="298" text-anchor="middle" class="event-label">SubagentStop</text>
          <path d="M816,282 l4,-2 l4,2 v3 a4,4 0 0 1 -4,4 a4,4 0 0 1 -4,-4 z" fill="none" stroke="#ff4757" stroke-width="1.2"/>
        </g>
        
        <!-- Satellite groups -->
        <g transform="translate(220, 620)">
          <rect x="-80" y="-48" width="160" height="86" class="satellite-rect"/>
          <text x="0" y="-32" text-anchor="middle" class="group-label" fill="#f472b6">配置 Config</text>
          <circle cx="-55" cy="-10" r="4" fill="#f472b6"/><text x="-45" y="-6" class="event-label" style="font-size:10px;">Setup</text>
          <circle cx="-55" cy="12" r="4" fill="#f472b6"/><circle cx="-55" cy="12" r="6" class="blockable-ring" style="stroke-width:1.2;"/>
          <text x="-45" y="16" class="event-label" style="font-size:10px;">ConfigChange</text>
          <path d="M-59,30 l4,-2 l4,2 v2.5 a3.5,3.5 0 0 1 -4,3.5 a3.5,3.5 0 0 1 -4,-3.5 z" fill="none" stroke="#ff4757" stroke-width="1"/>
          <circle cx="45" cy="0" r="4" fill="#f472b6"/><text x="55" y="4" class="event-label" style="font-size:10px;">InstructionsLoaded</text>
        </g>
        <g transform="translate(450, 620)">
          <rect x="-80" y="-48" width="160" height="86" class="satellite-rect"/>
          <text x="0" y="-32" text-anchor="middle" class="group-label" fill="#fb923c">文件系统 FS</text>
          <circle cx="-70" cy="-10" r="3" fill="#fb923c"/><text x="-60" y="-6" class="event-label" style="font-size:10px;">WorktreeCreate</text>
          <circle cx="-70" cy="10" r="3" fill="#fb923c"/><text x="-60" y="14" class="event-label" style="font-size:10px;">WorktreeRemove</text>
          <circle cx="35" cy="-10" r="3" fill="#fb923c"/><text x="45" y="-6" class="event-label" style="font-size:10px;">CwdChanged</text>
          <circle cx="35" cy="10" r="3" fill="#fb923c"/><text x="45" y="14" class="event-label" style="font-size:10px;">FileChanged</text>
        </g>
        <g transform="translate(700, 620)">
          <rect x="-80" y="-48" width="160" height="86" class="satellite-rect"/>
          <text x="0" y="-32" text-anchor="middle" class="group-label" fill="#c084fc">团队协作 Team</text>
          <circle cx="-65" cy="-10" r="4" fill="#c084fc"/><circle cx="-65" cy="-10" r="6" class="blockable-ring" style="stroke-width:1.2;"/>
          <text x="-55" y="-6" class="event-label" style="font-size:10px;">TeammateIdle</text>
          <path d="M-69,8 l4,-2 l4,2 v2.5 a3.5,3.5 0 0 1 -4,3.5 a3.5,3.5 0 0 1 -4,-3.5 z" fill="none" stroke="#ff4757" stroke-width="1"/>
          <circle cx="-65" cy="12" r="4" fill="#c084fc"/><circle cx="-65" cy="12" r="6" class="blockable-ring" style="stroke-width:1.2;"/>
          <text x="-55" y="16" class="event-label" style="font-size:10px;">TaskCreated</text>
          <path d="M-25,8 l4,-2 l4,2 v2.5 a3.5,3.5 0 0 1 -4,3.5 a3.5,3.5 0 0 1 -4,-3.5 z" fill="none" stroke="#ff4757" stroke-width="1"/>
          <circle cx="45" cy="0" r="4" fill="#c084fc"/><circle cx="45" cy="0" r="6" class="blockable-ring" style="stroke-width:1.2;"/>
          <text x="55" y="4" class="event-label" style="font-size:10px;">TaskCompleted</text>
          <path d="M41,18 l4,-2 l4,2 v2.5 a3.5,3.5 0 0 1 -4,3.5 a3.5,3.5 0 0 1 -4,-3.5 z" fill="none" stroke="#ff4757" stroke-width="1"/>
        </g>
        <g transform="translate(950, 620)">
          <rect x="-70" y="-38" width="140" height="66" class="satellite-rect"/>
          <text x="0" y="-22" text-anchor="middle" class="group-label" fill="#38bdf8">MCP 交互</text>
          <circle cx="-45" cy="0" r="4" fill="#38bdf8"/><text x="-35" y="4" class="event-label" style="font-size:10px;">Elicitation</text>
          <circle cx="40" cy="0" r="4" fill="#38bdf8"/><text x="50" y="4" class="event-label" style="font-size:10px;">ElicitationResult</text>
        </g>
      </g>
      
      <!-- MOBILE VIEW (vertical stacked lanes) -->
      <g id="mobile-view" style="display:none;">
        <!-- Session lane -->
        <rect x="60" y="40" width="1080" height="100" rx="12" class="fill-session layer-rect" stroke="#7b61ff" stroke-width="2"/>
        <text x="90" y="65" fill="#7b61ff" class="layer-label">Session</text>
        <g class="event-group" data-title="SessionStart" data-desc="会话启动时触发。" data-blockable="false" data-ff="false">
          <circle cx="180" cy="90" r="6" fill="#7b61ff" class="event-dot"/>
          <text x="195" y="94" class="event-label">SessionStart</text>
        </g>
        <g class="event-group" data-title="SessionEnd" data-desc="会话结束时触发。" data-blockable="false" data-ff="false">
          <circle cx="1020" cy="90" r="6" fill="#7b61ff" class="event-dot"/>
          <text x="1005" y="94" text-anchor="end" class="event-label">SessionEnd</text>
        </g>
        
        <!-- Query lane -->
        <rect x="60" y="160" width="1080" height="100" rx="12" class="fill-query layer-rect" stroke="#00d4ff" stroke-width="2"/>
        <text x="90" y="185" fill="#00d4ff" class="layer-label">Query</text>
        <g class="event-group" data-title="UserPromptSubmit" data-desc="用户提交提示词时触发。可阻断。" data-blockable="true" data-ff="false">
          <circle cx="160" cy="210" r="6" fill="#00d4ff" class="event-dot"/><circle cx="160" cy="210" r="9" class="blockable-ring"/>
          <text x="160" y="192" text-anchor="middle" class="event-label" style="font-size:10px;">UserPromptSubmit</text>
        </g>
        <g class="event-group" data-title="InstructionsLoaded" data-desc="系统指令加载完成。" data-blockable="false" data-ff="false">
          <circle cx="300" cy="210" r="6" fill="#00d4ff" class="event-dot"/>
          <text x="300" y="235" text-anchor="middle" class="event-label" style="font-size:10px;">InstructionsLoaded</text>
        </g>
        <g class="event-group" data-title="Stop" data-desc="AI 即将结束回答时触发。可阻断。" data-blockable="true" data-ff="false">
          <circle cx="520" cy="210" r="6" fill="#00d4ff" class="event-dot"/><circle cx="520" cy="210" r="9" class="blockable-ring"/>
          <text x="520" y="192" text-anchor="middle" class="event-label" style="font-size:10px;">Stop</text>
        </g>

          <circle cx="200" cy="330" r="6" fill="#48bb78" class="event-dot"/><circle cx="200" cy="330" r="9" class="blockable-ring"/>
          <text x="200" y="355" text-anchor="middle" class="event-label" style="font-size:10px;">PreToolUse</text>

        <g class="event-group" data-title="PostToolUse" data-desc="工具成功执行后。" data-blockable="false" data-ff="false">

        <g class="event-group" data-title="PostToolUseFailure" data-desc="工具执行失败。Fire-and-forget。" data-blockable="false" data-ff="true">
          <circle cx="540" cy="330" r="6" fill="#a0a0a0" class="event-dot ff-dot"/>

        </g>
        <g class="event-group" data-title="PermissionDenied" data-desc="权限被拒绝。" data-blockable="false" data-ff="false">

        <g class="event-group" data-title="PermissionRequest" data-desc="权限请求弹窗。" data-blockable="false" data-ff="false">

          <text x="860" y="355" text-anchor="middle" class="event-label" style="font-size:10px;">PermissionRequest</text>

        <!-- Agent lane -->
        <rect x="60" y="400" width="1080" height="80" rx="10" class="fill-agent layer-rect" stroke="#ffd93d" stroke-width="2"/>

        <g transform="translate(220, 560)">

          <text x="-70" y="8" class="event-sub" style="font-size:9px;">ConfigChange</text>

          <text x="-70" y="22" class="event-sub" style="font-size:9px;">CwdChanged</text>
          <text x="10" y="8" class="event-sub" style="font-size:9px;">FileChanged</text>
        </g>
        <g transform="translate(700, 560)">
          <rect x="-80" y="-38" width="160" height="66" class="satellite-rect"/>
          <text x="0" y="-24" text-anchor="middle" class="group-label" style="font-size:11px;" fill="#c084fc">团队协作 Team</text>
          <text x="-70" y="-6" class="event-sub" style="font-size:9px;">TeammateIdle</text>
          <text x="-70" y="8" class="event-sub" style="font-size:9px;">TaskCreated</text>
          <text x="-70" y="22" class="event-sub" style="font-size:9px;">TaskCompleted</text>
        </g>
        <g transform="translate(950, 560)">
          <rect x="-60" y="-32" width="120" height="54" class="satellite-rect"/>
          <text x="0" y="-18" text-anchor="middle" class="group-label" style="font-size:11px;" fill="#38bdf8">MCP</text>
          <text x="-45" y="0" class="event-sub" style="font-size:9px;">Elicitation</text>

    <div class="legend">
      <div class="legend-item"><span class="legend-dot" style="background:#7b61ff;"></span>Session</div>
      <div class="legend-item"><span class="legend-dot" style="background:#00d4ff;"></span>Query</div>
      <div class="legend-item"><span class="legend-dot" style="background:#48bb78;"></span>Tool</div>
      <div class="legend-item"><span class="legend-dot" style="background:#ffd93d;"></span>Agent</div>
      <div class="legend-item"><span class="legend-dot legend-ring"></span>可阻断 Blockable</div>
      <div class="legend-item"><span class="legend-dot" style="background:#a0a0a0;"></span>Fire-and-forget</div>
    </div>
  </div>
  
  <div class="tooltip" id="tooltip">
    <div class="tooltip-title" id="tt-title"></div>
    <div class="tooltip-meta" id="tt-desc"></div>
    <div id="tt-badges"></div>
  </div>
  
  <script>
    const tooltip = document.getElementById('tooltip');
    const ttTitle = document.getElementById('tt-title');
    const ttDesc = document.getElementById('tt-desc');
    const ttBadges = document.getElementById('tt-badges');
    const desktopView = document.getElementById('desktop-view');
    const mobileView = document.getElementById('mobile-view');
    const container = document.querySelector('.diagram-container');
    
    function updateView() {
      if (container.clientWidth < 640) {
        desktopView.style.display = 'none';
        mobileView.style.display = 'block';
      } else {
        desktopView.style.display = 'block';
        mobileView.style.display = 'none';
      }
    }
    window.addEventListener('resize', updateView);
    updateView();
    
    document.querySelectorAll('.event-group').forEach(g => {
      g.addEventListener('mouseenter', () => {
        ttTitle.textContent = g.dataset.title;
        ttDesc.textContent = g.dataset.desc;
        ttBadges.innerHTML = '';
        if (g.dataset.blockable === 'true') {
          ttBadges.innerHTML += '<span class="tooltip-badge badge-block">可阻断 exit 2</span>';
        }
        if (g.dataset.ff === 'true') {
          ttBadges.innerHTML += '<span class="tooltip-badge badge-ff">Fire-and-forget</span>';
        }
        tooltip.style.opacity = '1';
      });
      g.addEventListener('mousemove', e => {
        const contRect = container.getBoundingClientRect();
        let left = e.clientX - contRect.left + 14;
        let top = e.clientY - contRect.top + 14;
        tooltip.style.left = left + 'px';
        tooltip.style.top = top + 'px';
      });
      g.addEventListener('mouseleave', () => {
        tooltip.style.opacity = '0';
      });
    });
  </script>
</body>
