<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MagicDocs Auto-Update Sequence</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

:root {
  --bg-deep: #0a0f1a;
  --bg-panel: #0d1320;
  --user-color: #ffffff;
  --claude-color: #00d4ff;
  --magic-color: #ffcc00;
  --agent-color: #00ff88;
  --hook-color: #ff6b9d;
  --line-dim: rgba(255,255,255,0.08);
  --text-dim: rgba(255,255,255,0.5);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg-deep);
  font-family: 'Space Grotesk', 'Noto Sans SC', sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 40px 20px;
  overflow-x: auto;
}

.container {
  position: relative;
  width: 980px;
  background: radial-gradient(ellipse at 30% 20%, rgba(0, 212, 255, 0.05) 0%, transparent 50%),
              radial-gradient(ellipse at 70% 80%, rgba(255, 204, 0, 0.04) 0%, transparent 50%),
              var(--bg-panel);
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.06);
  padding: 48px;
  box-shadow: 0 32px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.03);
}

.title {
  font-size: 28px;
  font-weight: 600;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #fff 0%, var(--claude-color) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}

.subtitle {
  font-size: 13px;
  color: var(--text-dim);
  font-weight: 300;
  margin-bottom: 40px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

svg {
  width: 100%;
  height: auto;
  display: block;
}

.actor-box {
  rx: 6;
  ry: 6;
  stroke-width: 1.5;
}

.lifeline {
  stroke-dasharray: 6,4;
  stroke-width: 1;
  opacity: 0.4;
}

.message-line {
  stroke-width: 1.5;
  fill: none;
}

.message-arrow {
  fill: currentColor;
}

.phase-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  opacity: 0.85;
}

.message-label {
  font-size: 12px;
  font-weight: 500;
}

.message-label-en {
  font-size: 10px;
  font-weight: 300;
  opacity: 0.6;
}

.diamond {
  transform-box: fill-box;
  transform-origin: center;
}

.flash-ring {
  animation: pulse-ring 2s ease-out infinite;
}

.flash-core {
  animation: pulse-core 2s ease-out infinite;
}

@keyframes pulse-ring {
  0% { r: 8; opacity: 0.8; stroke-width: 2; }
  100% { r: 24; opacity: 0; stroke-width: 0; }
}

@keyframes pulse-core {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.7; transform: scale(1.2); }
}

.hover-group {
  cursor: pointer;
  transition: opacity 0.2s;
}

.hover-group:hover .message-line {
  stroke-width: 2.5;
  filter: drop-shadow(0 0 4px currentColor);
}

.hover-group:hover .message-label {
  font-weight: 600;
}

.tooltip {
  position: absolute;
  pointer-events: none;
  background: rgba(10, 15, 26, 0.95);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 12px;
  color: rgba(255,255,255,0.9);
  max-width: 260px;
  opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
  transform: translateY(8px);
  box-shadow: 0 16px 40px rgba(0,0,0,0.5);
  z-index: 100;
}

.tooltip.visible {
  opacity: 1;
  transform: translateY(0);
}

.diamond-icon {
  animation: diamond-glow 3s ease-in-out infinite;
}

@keyframes diamond-glow {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; filter: drop-shadow(0 0 3px var(--hook-color)); }
}

.bg-area {
  animation: area-breathe 4s ease-in-out infinite;
}

@keyframes area-breathe {
  0%, 100% { opacity: 0.06; }
  50% { opacity: 0.1; }
}
</style>
</head>
<body>

<div class="container">
  <h1 class="title">MagicDocs 自动维护时序图</h1>
  <p class="subtitle">Sequence VIS-2Q-016 &mdash; MagicDocs Auto-Update Flow</p>
  
  <svg viewBox="0 0 900 880" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="gradNormal" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="rgba(0,212,255,0.04)"/>
        <stop offset="100%" stop-color="rgba(0,212,255,0.01)"/>
      </linearGradient>
      <linearGradient id="gradMagic" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="rgba(255,204,0,0.08)"/>
        <stop offset="100%" stop-color="rgba(255,204,0,0.02)"/>
      </linearGradient>
      <marker id="arrow-user" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
        <path d="M0,0 L10,4 L0,8" fill="#ffffff"/>
      </marker>
      <marker id="arrow-claude" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
        <path d="M0,0 L10,4 L0,8" fill="#00d4ff"/>
      </marker>
      <marker id="arrow-magic" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
        <path d="M0,0 L10,4 L0,8" fill="#ffcc00"/>
      </marker>
      <marker id="arrow-agent" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
        <path d="M0,0 L10,4 L0,8" fill="#00ff88"/>
      </marker>
      <marker id="arrow-hook" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
        <path d="M0,0 L10,4 L0,8" fill="#ff6b9d"/>
      </marker>
      <filter id="glow-blue" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
        <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="glow-gold" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
        <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    
    <!-- Phase Backgrounds -->
    <!-- Normal Work Phase -->
    <rect x="60" y="140" width="780" height="300" fill="url(#gradNormal)" class="bg-area" rx="4"/>
    <text x="90" y="170" fill="rgba(255,255,255,0.4)" class="phase-label">Phase 1: 正常工作 / Normal Work</text>
    
    <!-- Divider -->
    <line x1="70" y1="450" x2="830" y2="450" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="8,4"/>
    <polygon points="450,445 460,450 450,455 440,450" fill="rgba(255,255,255,0.3)"/>
    <text x="450" y="440" text-anchor="middle" fill="rgba(255,255,255,0.6)" class="phase-label" style="font-size:10px;">工作单元结束 / Work Unit Complete</text>
    
    <!-- MagicDocs Phase -->
    <rect x="60" y="460" width="780" height="360" fill="url(#gradMagic)" class="bg-area" stroke="rgba(255,204,0,0.2)" stroke-width="1" stroke-dasharray="6,3" rx="4"/>
    <text x="90" y="490" fill="rgba(255,204,0,0.6)" class="phase-label">Phase 2: MagicDocs 更新 / Auto-Update</text>
    
    <!-- Background Label -->
    <rect x="720" y="740" width="110" height="28" fill="rgba(0,0,0,0.4)" stroke="rgba(255,255,255,0.15)" stroke-dasharray="4,2" rx="4"/>
    <text x="775" y="758" text-anchor="middle" fill="rgba(255,255,255,0.5)" class="phase-label" style="font-size:9px;">后台运行 / Background</text>
    
    <!-- Lifelines -->
    <!-- User -->
    <rect x="70" y="80" width="80" height="36" fill="rgba(255,255,255,0.08)" stroke="#ffffff" class="actor-box"/>
    <text x="110" y="98" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">用户</text>
    <text x="110" y="110" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9" font-weight="300">User</text>
    <line x1="110" y1="116" x2="110" y2="820" stroke="#ffffff" class="lifeline"/>
    
    <!-- Claude Main -->
    <rect x="230" y="80" width="100" height="36" fill="rgba(0,212,255,0.08)" stroke="#00d4ff" class="actor-box" filter="url(#glow-blue)"/>
    <text x="280" y="98" text-anchor="middle" fill="#00d4ff" font-size="12" font-weight="600">Claude</text>
    <text x="280" y="110" text-anchor="middle" fill="rgba(0,212,255,0.5)" font-size="9" font-weight="300">Main Thread</text>
    <line x1="280" y1="116" x2="280" y2="820" stroke="#00d4ff" class="lifeline"/>
    
    <!-- FileReadTool / Listener -->
    <rect x="410" y="80" width="100" height="36" fill="rgba(255,204,0,0.08)" stroke="#ffcc00" class="actor-box" filter="url(#glow-gold)"/>
    <text x="460" y="97" text-anchor="middle" fill="#ffcc00" font-size="11" font-weight="600">FileReadTool</text>
    <text x="460" y="109" text-anchor="middle" fill="rgba(255,204,0,0.5)" font-size="8" font-weight="300">+ MagicDocs Listener</text>
    <line x1="460" y1="116" x2="460" y2="820" stroke="#ffcc00" class="lifeline"/>
    
    <!-- Post-Sampling Hook -->
    <rect x="590" y="80" width="100" height="36" fill="rgba(255,107,157,0.08)" stroke="#ff6b9d" class="actor-box"/>
    <text x="640" y="97" text-anchor="middle" fill="#ff6b9d" font-size="11" font-weight="600">Post-Sampling</text>
    <text x="640" y="109" text-anchor="middle" fill="rgba(255,107,157,0.5)" font-size="8" font-weight="300">Hook</text>
    <line x1="640" y1="116" x2="640" y2="820" stroke="#ff6b9d" class="lifeline"/>
    
    <!-- Sub Agent -->
    <rect x="760" y="80" width="100" height="36" fill="rgba(0,255,136,0.08)" stroke="#00ff88" class="actor-box"/>
    <text x="810" y="97" text-anchor="middle" fill="#00ff88" font-size="11" font-weight="600">子Agent</text>
    <text x="810" y="109" text-anchor="middle" fill="rgba(0,255,136,0.5)" font-size="8" font-weight="300">Sonnet</text>
    <line x1="810" y1="116" x2="810" y2="820" stroke="#00ff88" class="lifeline"/>
    
    <!-- Activation: Claude working -->
    <rect x="273" y="160" width="14" height="180" fill="rgba(0,212,255,0.15)" rx="2" stroke="rgba(0,212,255,0.3)"/>
    
    <!-- Activation: Sub Agent -->
    <rect x="803" y="600" width="14" height="160" fill="rgba(0,255,136,0.15)" rx="2" stroke="rgba(0,255,136,0.3)"/>
    
    <!-- Messages -->
    <!-- 1. User -> Claude: Send request -->
    <g class="hover-group" data-tip="用户发起正常的工作请求，开启一次对话。">
      <line x1="110" y1="160" x2="280" y2="160" stroke="#ffffff" class="message-line" marker-end="url(#arrow-user)"/>
      <text x="195" y="155" text-anchor="middle" fill="#ffffff" class="message-label">发送工作请求</text>
      <text x="195" y="143" text-anchor="middle" fill="rgba(255,255,255,0.5)" class="message-label-en">Send work request</text>
    </g>
    
    <!-- 2. Claude -> FileReadTool: Read files -->
    <g class="hover-group" data-tip="Claude在正常工作中读取项目文件。">
      <line x1="280" y1="200" x2="460" y2="200" stroke="#00d4ff" class="message-line" marker-end="url(#arrow-claude)"/>
      <text x="370" y="195" text-anchor="middle" fill="#00d4ff" class="message-label">读取项目文件</text>
      <text x="370" y="183" text-anchor="middle" fill="rgba(0,212,255,0.5)" class="message-label-en">Read project files</text>
    </g>
    
    <!-- 3. FileReadTool -> Listener: Trigger callback -->
    <g class="hover-group" data-tip="每次文件读取都会触发MagicDocs监听器的回调函数。">
      <line x1="460" y1="240" x2="460" y2="240" stroke="#ffcc00" class="message-line" style="display:none;"/>
      <!-- Self message -->
      <path d="M460,240 L500,240 L500,260 L460,260" stroke="#ffcc00" fill="none" class="message-line" marker-end="url(#arrow-magic)"/>
      <text x="490" y="235" text-anchor="end" fill="#ffcc00" class="message-label">触发读取回调</text>
      <text x="490" y="223" text-anchor="end" fill="rgba(255,204,0,0.5)" class="message-label-en">Trigger read callback</text>
    </g>
    
    <!-- 4. Listener detects magic header -> register -->
    <g class="hover-group" data-tip="监听器检测到文件中的魔法头部，调用 registerMagicDoc() 注册追踪。同一文件只注册一次（幂等）。">
      <circle cx="460" cy="300" r="24" stroke="#ffcc00" fill="none" class="flash-ring"/>
      <circle cx="460" cy="300" r="6" fill="#ffcc00" class="flash-core"/>
      <text x="490" y="295" text-anchor="start" fill="#ffcc00" class="message-label">检测到魔法头部</text>
      <text x="490" y="307" text-anchor="start" fill="#ffcc00" class="message-label" style="font-size:11px;">registerMagicDoc()</text>
      <text x="490" y="283" text-anchor="start" fill="rgba(255,204,0,0.5)" class="message-label-en">Magic header detected</text>
    </g>
    
    <!-- 5. Claude continues working -->
    <g class="hover-group" data-tip="Claude继续正常工作，执行多轮工具调用（编辑文件、Bash命令等）。">
      <line x1="110" y1="340" x2="280" y2="340" stroke="#ffffff" class="message-line" marker-end="url(#arrow-user)"/>
      <text x="195" y="335" text-anchor="middle" fill="#ffffff" class="message-label">继续对话 / 工具调用</text>
      <text x="195" y="323" text-anchor="middle" fill="rgba(255,255,255,0.5)" class="message-label-en">Continue / tool calls</text>
    </g>
    
    <!-- Tool call dashed line -->
    <line x1="280" y1="360" x2="460" y2="360" stroke="#00d4ff" stroke-dasharray="4,3" stroke-width="1" marker-end="url(#arrow-claude)"/>
    <text x="370" y="355" text-anchor="middle" fill="rgba(0,212,255,0.5)" font-size="10">Edit / Bash / ...</text>
    
    <!-- 6. Claude -> User: Pure text reply, work unit ends -->
    <g class="hover-group" data-tip="AI回复纯文本，无工具调用 —— 标志着一个工作单元的结束。">
      <line x1="280" y1="420" x2="110" y2="420" stroke="#00d4ff" class="message-line" marker-end="url(#arrow-claude)"/>
      <text x="195" y="415" text-anchor="middle" fill="#00d4ff" class="message-label">回复纯文本（无工具调用）</text>
      <text x="195" y="403" text-anchor="middle" fill="rgba(0,212,255,0.5)" class="message-label-en">Pure text reply — work unit ends</text>
    </g>
    
    <!-- 7. Post-Sampling Hook triggered -->
    <g class="hover-group" data-tip="工作单元结束后，post-sampling hook 被触发。">
      <line x1="280" y1="480" x2="640" y2="480" stroke="#ff6b9d" class="message-line" marker-end="url(#arrow-hook)"/>
      <text x="460" y="475" text-anchor="middle" fill="#ff6b9d" class="message-label">触发 Post-Sampling Hook</text>
      <text x="460" y="463" text-anchor="middle" fill="rgba(255,107,157,0.5)" class="message-label-en">Idle trigger after reply</text>
    </g>
    
    <!-- 8. Three-layer condition check (3 diamonds) -->
    <g class="hover-group" data-tip="Hook执行三层条件检查，全部通过才继续启动子Agent。">
      <polygon points="640,520 650,530 640,540 630,530" fill="rgba(255,107,157,0.2)" stroke="#ff6b9d" class="diamond-icon"/>
      <polygon points="640,555 650,565 640,575 630,565" fill="rgba(255,107,157,0.3)" stroke="#ff6b9d" class="diamond-icon" style="animation-delay:0.3s;"/>
      <polygon points="640,590 650,600 640,610 630,600" fill="rgba(255,107,157,0.4)" stroke="#ff6b9d" class="diamond-icon" style="animation-delay:0.6s;"/>
      <text x="665" y="565" fill="#ff6b9d" class="message-label" style="font-size:11px;">三层条件检查</text>
      <text x="665" y="577" fill="rgba(255,107,157,0.5)" class="message-label-en" style="font-size:9px;">All 3 filters passed</text>
    </g>
    
    <!-- 9. Sub Agent starts -->
    <g class="hover-group" data-tip="条件全部通过后，子Agent（Sonnet）异步启动编辑任务。">
      <line x1="640" y1="630" x2="810" y2="630" stroke="#00ff88" class="message-line" marker-end="url(#arrow-agent)"/>
      <text x="725" y="625" text-anchor="middle" fill="#00ff88" class="message-label">启动子Agent编辑任务</text>
      <text x="725" y="613" text-anchor="middle" fill="rgba(0,255,136,0.5)" class="message-label-en">Launch sub-agent task</text>
    </g>
    
    <!-- 10. Sub Agent reads context -->
    <g class="hover-group" data-tip="子Agent读取完整对话上下文，获取需要同步到文档的信息。">
      <path d="M810,660 L850,660 L850,680 L810,680" stroke="#00ff88" fill="none" class="message-line" marker-end="url(#arrow-agent)"/>
      <text x="855" y="675" text-anchor="start" fill="#00ff88" class="message-label" style="font-size:11px;">读取对话上下文</text>
      <text x="855" y="687" text-anchor="start" fill="rgba(0,255,136,0.5)" class="message-label-en" style="font-size:9px;">Read conversation</text>
    </g>
    
    <!-- 11. Sub Agent reads target doc -->
    <g class="hover-group" data-tip="子Agent读取目标文档的当前内容，重新检测头部和指令。">
      <path d="M810,710 L850,710 L850,730 L810,730" stroke="#00ff88" fill="none" class="message-line" marker-end="url(#arrow-agent)"/>
      <text x="855" y="725" text-anchor="start" fill="#00ff88" class="message-label" style="font-size:11px;">读取目标文档内容</text>
      <text x="855" y="737" text-anchor="start" fill="rgba(0,255,136,0.5)" class="message-label-en" style="font-size:9px;">Read target document</text>
    </g>
    
    <!-- 12. Sub Agent updates doc -->
    <g class="hover-group" data-tip="子Agent根据上下文和文档当前状态，更新文档内容。">
      <line x1="810" y1="760" x2="460" y2="760" stroke="#00ff88" class="message-line" marker-end="url(#arrow-agent)"/>
      <text x="635" y="755" text-anchor="middle" fill="#00ff88" class="message-label">更新文档内容</text>
      <text x="635" y="743" text-anchor="middle" fill="rgba(0,255,136,0.5)" class="message-label-en">Update document content</text>
    </g>
    
    <!-- 13. Done, user unaware -->
    <g class="hover-group" data-tip="文档更新完成。整个过程对用户完全透明，无感知。">
      <line x1="810" y1="800" x2="110" y2="800" stroke="rgba(255,255,255,0.2)" class="message-line" stroke-dasharray="5,4" marker-end="url(#arrow-user)"/>
      <text x="460" y="795" text-anchor="middle" fill="rgba(255,255,255,0.6)" class="message-label" style="font-size:11px;">文档已更新 · 用户无感知</text>
      <text x="460" y="783" text-anchor="middle" fill="rgba(255,255,255,0.35)" class="message-label-en">Updated silently — user unaware</text>
    </g>
    
    <!-- Idempotency note -->
    <text x="90" y="300" text-anchor="middle" fill="rgba(255,255,255,0.25)" font-size="9" font-weight="300">幂等性</text>
    <text x="90" y="312" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-size="8" font-weight="300">Idempotent</text>
    <line x1="90" y1="280" x2="90" y2="270" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <line x1="90" y1="270" x2="430" y2="270" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="430" y1="270" x2="430" y2="300" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="3,2"/>
    
    <!-- Async note -->
    <text x="90" y="650" text-anchor="middle" fill="rgba(255,255,255,0.25)" font-size="9" font-weight="300">异步</text>
    <text x="90" y="662" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-size="8" font-weight="300">Async</text>
    <line x1="90" y1="630" x2="90" y2="620" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <line x1="90" y1="620" x2="790" y2="620" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="790" y1="620" x2="790" y2="630" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="3,2"/>
  </svg>
  
  <div id="tooltip" class="tooltip"></div>
</div>

<script>
const tooltip = document.getElementById('tooltip');
document.querySelectorAll('.hover-group').forEach(group => {
  group.addEventListener('mouseenter', e => {
    const text = group.getAttribute('data-tip');
    if (!text) return;
    tooltip.textContent = text;
    tooltip.classList.add('visible');
  });
  group.addEventListener('mousemove', e => {
    const containerRect = document.querySelector('.container').getBoundingClientRect();
    let x = e.clientX - containerRect.left + 16;
    let y = e.clientY - containerRect.top + 16;
    if (x + 260 > containerRect.width) x -= 280;
    tooltip.style.left = x + 'px';
    tooltip.style.top = y + 'px';
  });
  group.addEventListener('mouseleave', () => {
    tooltip.classList.remove('visible');
  });
});
</script>

</body>
</html>
