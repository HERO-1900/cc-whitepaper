<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Token成本金字塔</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Space+Grotesk:wght@400;600;700&display=swap');

:root {
  --bg: #1a1a2e;
  --bg-2: #16213e;
  --l1: #1e3a5f;
  --l2: #4a3f8f;
  --l3: #7b61ff;
  --l4: #ffd93d;
  --text: #e8e8f0;
  --text-dim: #a0a0b8;
  --glow-l1: rgba(30,58,95,0.6);
  --glow-l2: rgba(74,63,143,0.6);
  --glow-l3: rgba(123,97,255,0.6);
  --glow-l4: rgba(255,217,61,0.5);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Space Grotesk', 'Noto Serif SC', serif;
  color: var(--text);
  overflow-x: hidden;
}

.bg-grid {
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(123,97,255,0.08) 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(30,58,95,0.1) 0%, transparent 45%),
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.container {
  width: 100%;
  max-width: 1100px;
  padding: 40px 20px;
  position: relative;
  z-index: 1;
}

.title {
  text-align: center;
  margin-bottom: 48px;
}

.title h1 {
  font-size: clamp(1.8rem, 4.5vw, 3rem);
  font-weight: 700;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, #fff 0%, var(--l3) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}

.title p {
  font-size: 0.95rem;
  color: var(--text-dim);
  font-family: 'Space Grotesk', sans-serif;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.diagram-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 48px;
  flex-wrap: wrap;
}

svg.pyramid {
  width: 100%;
  max-width: 640px;
  height: auto;
  filter: drop-shadow(0 20px 60px rgba(0,0,0,0.5));
}

.pyramid-layer {
  cursor: pointer;
  transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  transform-origin: center;
}

.pyramid-layer:hover {
  transform: scale(1.05);
}

.pyramid-layer:hover .layer-shape {
  filter: brightness(1.15);
}

.layer-shape {
  transition: filter 0.3s ease;
}

.glow-line {
  filter: drop-shadow(0 0 4px rgba(255,255,255,0.4));
}

.label-main {
  font-size: 15px;
  font-weight: 700;
  fill: #fff;
  text-anchor: middle;
  pointer-events: none;
}

.label-sub {
  font-size: 11px;
  font-weight: 400;
  fill: rgba(255,255,255,0.85);
  text-anchor: middle;
  pointer-events: none;
}

.label-stat {
  font-size: 10px;
  font-weight: 600;
  fill: rgba(255,255,255,0.7);
  text-anchor: middle;
  pointer-events: none;
  font-family: 'Space Grotesk', sans-serif;
}

.left-axis, .right-axis {
  font-size: 11px;
  fill: var(--text-dim);
  font-weight: 600;
  letter-spacing: 0.06em;
  font-family: 'Space Grotesk', sans-serif;
}

.arrow-head { fill: var(--text-dim); }

.detail-panel {
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
}

.pyramid-layer:hover + .detail-panel,
.pyramid-layer:hover ~ .detail-panel,
.pyramid-layer:hover + g .detail-panel,
.pyramid-layer:hover ~ g .detail-panel {
  opacity: 1;
}

.l4-pulse {
  stroke: var(--l4);
  stroke-width: 3;
  fill: none;
  filter: drop-shadow(0 0 8px var(--glow-l4));
  animation: pulse-gold 2s ease-in-out infinite;
}

@keyframes pulse-gold {
  0%, 100% { opacity: 0.6; stroke-width: 2; }
  50% { opacity: 1; stroke-width: 4; }
}

.cost-card {
  background: linear-gradient(145deg, rgba(26,26,46,0.9), rgba(22,33,62,0.95));
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 28px 32px;
  min-width: 220px;
  box-shadow: 0 16px 48px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.03);
  backdrop-filter: blur(10px);
  text-align: center;
}

.cost-card h3 {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-dim);
  margin-bottom: 16px;
  font-weight: 600;
}

.cost-before {
  font-size: 2.4rem;
  font-weight: 700;
  color: #ff6b6b;
  text-decoration: line-through;
  opacity: 0.7;
  font-family: 'Space Grotesk', sans-serif;
}

.cost-arrow {
  margin: 12px 0;
  font-size: 1.6rem;
  color: #51cf66;
  font-family: 'Space Grotesk', sans-serif;
}

.cost-after {
  font-size: 2.8rem;
  font-weight: 700;
  background: linear-gradient(135deg, #51cf66 0%, #2b8a3e 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-family: 'Space Grotesk', sans-serif;
}

.cost-label {
  font-size: 0.8rem;
  color: var(--text-dim);
  margin-top: 8px;
}

@media (max-width: 860px) {
  .diagram-wrap { flex-direction: column; }
  .cost-card { width: 100%; max-width: 320px; }
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="container">
  <div class="title">
    <h1>Token 是一等公民</h1>
    <p>Token Cost Pyramid / Claude Code Engineering Philosophy</p>
  </div>
  <div class="diagram-wrap">
    <svg class="pyramid" viewBox="0 0 760 540" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#264d7a;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#1e3a5f;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="grad2" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#5d4fb0;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#4a3f8f;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="grad3" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#957aff;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#7b61ff;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#ffe066;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#ffd93d;stop-opacity:1" />
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
      </defs>

      <g class="pyramid-layer" data-level="1">
        <polygon class="layer-shape" points="80,420 680,420 640,330 120,330" fill="url(#grad1)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
        <text x="380" y="365" class="label-main">Prompt Cache</text>
        <text x="380" y="383" class="label-sub">缓存 System Prompt + Tools 定义</text>
        <text x="380" y="400" class="label-stat">节省 ~70% 输入费用 · 命中率 92.7%</text>
      </g>

      <line x1="120" y1="330" x2="640" y2="330" class="glow-line" stroke="#fff" stroke-opacity="0.3" stroke-width="1.5"/>

      <g class="pyramid-layer" data-level="2">
        <polygon class="layer-shape" points="120,330 640,330 600,250 160,250" fill="url(#grad2)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
        <text x="380" y="285" class="label-main">上下文压缩</text>
        <text x="380" y="303" class="label-sub">ConversationCompactor</text>
        <text x="380" y="320" class="label-stat">超 200K 触发 · 保留最近 N 条 + 摘要旧消息</text>
      </g>

      <line x1="160" y1="250" x2="600" y2="250" class="glow-line" stroke="#fff" stroke-opacity="0.3" stroke-width="1.5"/>

      <g class="pyramid-layer" data-level="3">
        <polygon class="layer-shape" points="160,250 600,250 560,170 200,170" fill="url(#grad3)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
        <text x="380" y="205" class="label-main">智能截断</text>
        <text x="380" y="223" class="label-sub">Smart Truncation</text>
        <text x="380" y="240" class="label-stat">maxReadSize=300 · maxTokens=30000 · 头部截断</text>
      </g>

      <line x1="200" y1="170" x2="560" y2="170" class="glow-line" stroke="#fff" stroke-opacity="0.3" stroke-width="1.5"/>

      <g class="pyramid-layer" data-level="4">
        <polygon class="layer-shape" points="200,170 560,170 520,90 240,90" fill="url(#grad4)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
        <rect class="l4-pulse" x="200" y="90" width="360" height="80" rx="2"/>
        <text x="380" y="128" class="label-main" fill="#1a1a2e">投机缓存复用</text>
        <text x="380" y="146" class="label-sub" fill="#1a1a2e">CacheSafeParams · 0 额外 Cache Miss</text>
        <text x="380" y="159" class="label-stat" fill="rgba(26,26,46,0.8)">System/Tools/Model 不变 · Fork 请求复用父 Cache</text>
      </g>

      <g transform="translate(24, 270)">
        <line x1="0" y1="-140" x2="0" y2="140" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
        <polygon points="-5,135 0,148 5,135" class="arrow-head" fill="rgba(255,255,255,0.35)"/>
        <polygon points="-5,-135 0,-148 5,-135" class="arrow-head" fill="rgba(255,255,255,0.35)"/>
        <text x="-14" y="-110" class="left-axis" text-anchor="end">覆盖范围</text>
        <text x="-14" y="120" class="left-axis" text-anchor="end">广 → 窄</text>
      </g>

      <g transform="translate(736, 270)">
        <line x1="0" y1="-140" x2="0" y2="140" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
        <polygon points="-5,135 0,148 5,135" class="arrow-head" fill="rgba(255,255,255,0.35)"/>
        <polygon points="-5,-135 0,-148 5,-135" class="arrow-head" fill="rgba(255,255,255,0.35)"/>
        <text x="14" y="-110" class="right-axis" text-anchor="start">单次节省</text>
        <text x="14" y="120" class="right-axis" text-anchor="start">小 → 大</text>
      </g>
    </svg>

    <div class="cost-card">
      <h3>每小时 API 成本对比</h3>
      <div class="cost-before">$10.0</div>
      <div class="cost-arrow">↓</div>
      <div class="cost-after">$1.5</div>
      <div class="cost-label">四层协同优化后</div>
    </div>
  </div>
</div>
</body>
</html>
