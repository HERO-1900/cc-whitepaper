<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code 工程哲学 - 六大原则思维导图</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #1a1a2e;
            font-family: 'Noto Sans SC', 'Space Grotesk', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        .background-mesh {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(123, 97, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(255, 217, 61, 0.05) 0%, transparent 60%);
            pointer-events: none;
        }
        
        .noise {
            position: absolute;
            inset: 0;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            pointer-events: none;
        }
        
        svg {
            width: 90vmin;
            height: 90vmin;
            max-width: 1000px;
            max-height: 1000px;
        }
        
        /* Center node pulse animation */
        .center-node {
            animation: pulse 3s ease-in-out infinite;
            transform-origin: 500px 500px;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }
        
        .center-glow {
            animation: glow 3s ease-in-out infinite;
        }
        
        @keyframes glow {
            0%, 100% { opacity: 0.4; filter: blur(20px); }
            50% { opacity: 0.7; filter: blur(30px); }
        }
        
        /* Connection lines */
        .connection {
            stroke-width: 2;
            opacity: 0.6;
            transition: all 0.3s ease;
        }
        
        .connection.principle {
            stroke-width: 3;
            opacity: 0.8;
        }
        
        .connection.practice {
            stroke-width: 1.5;
            opacity: 0.4;
        }
        
        .connection.relation {
            stroke: rgba(255, 255, 255, 0.3);
            stroke-width: 2;
            stroke-dasharray: 8, 4;
            opacity: 0.5;
        }
        
        /* Nodes */
        .node {
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .center-circle {
            fill: #ffd93d;
            filter: drop-shadow(0 0 20px rgba(255, 217, 61, 0.5));
        }
        
        .principle-circle {
            stroke-width: 3;
            filter: drop-shadow(0 0 15px currentColor);
        }
        
        .practice-rect {
            rx: 8;
            stroke-width: 2;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }
        
        /* Text styles */
        .center-text-main {
            font-size: 16px;
            font-weight: 700;
            fill: #1a1a2e;
            text-anchor: middle;
            dominant-baseline: central;
        }
        
        .center-text-sub {
            font-size: 11px;
            font-weight: 500;
            fill: #1a1a2e;
            text-anchor: middle;
            dominant-baseline: central;
            opacity: 0.8;
        }
        
        .principle-text-main {
            font-size: 14px;
            font-weight: 700;
            fill: #ffffff;
            text-anchor: middle;
            dominant-baseline: central;
        }
        
        .principle-text-sub {
            font-size: 9px;
            font-weight: 400;
            fill: rgba(255,255,255,0.7);
            text-anchor: middle;
            dominant-baseline: central;
        }
        
        .practice-text-main {
            font-size: 11px;
            font-weight: 500;
            fill: #ffffff;
            text-anchor: middle;
            dominant-baseline: central;
        }
        
        .practice-text-sub {
            font-size: 8px;
            font-weight: 400;
            fill: rgba(255,255,255,0.6);
            text-anchor: middle;
            dominant-baseline: central;
        }
        
        .relation-text {
            font-size: 10px;
            font-weight: 500;
            fill: rgba(255,255,255,0.6);
            text-anchor: middle;
            dominant-baseline: central;
        }
        
        /* Hover effects */
        .principle-group:hover .principle-circle {
            filter: drop-shadow(0 0 25px currentColor);
            transform-origin: center;
            animation: breathe 1.5s ease-in-out infinite;
        }
        
        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
        
        /* Dimmed state */
        .dimmed {
            opacity: 0.15;
            transition: opacity 0.3s ease;
        }
        
        .highlighted {
            opacity: 1 !important;
        }
        
        .highlighted .connection {
            opacity: 0.9;
            stroke-width: 3;
        }
        
        /* VIS label */
        .vis-label {
            font-size: 8px;
            font-weight: 600;
            fill: rgba(255,255,255,0.5);
            text-anchor: middle;
            dominant-baseline: central;
        }
        
        /* Tooltip */
        .tooltip {
            position: absolute;
            background: rgba(26, 26, 46, 0.95);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 12px 16px;
            color: #fff;
            font-size: 13px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            max-width: 200px;
        }
        
        .tooltip.show {
            opacity: 1;
        }
        
        .tooltip-title {
            font-weight: 600;
            margin-bottom: 4px;
            color: #ffd93d;
        }
        
        /* Mobile responsive */
        @media (max-width: 768px) {
            svg {
                width: 95vmin;
                height: 95vmin;
            }
            .principle-text-main { font-size: 12px; }
            .practice-text-main { font-size: 9px; }
        }
    </style>
</head>

                <text x="160" y="382" class="practice-text-main">CLAUDE.md</text>
                <text x="160" y="398" class="practice-text-sub">声明式配置</text>
            </g>
            <g class="practice-group" data-principle="6">
                <rect class="practice-rect" x="160" y="444" width="120" height="48" fill="rgba(77,171,247,0.15)" stroke="#4dabf7"/>
                <text x="220" y="462" class="practice-text-main">allowedTools</text>
                <text x="220" y="478" class="practice-text-sub">细粒度授权</text>
            </g>
        </svg>
        
        <div class="tooltip" id="tooltip">
            <div class="tooltip-title"></div>
            <div class="tooltip-desc"></div>
        </div>
    </div>
    
    <script>
        const principles = document.querySelectorAll('.principle-group');
        const practices = document.querySelectorAll('.practice-group');
        const tooltip = document.getElementById('tooltip');
        
        const principleInfo = {
            1: { title: '并行优先', desc: '最大化利用异步I/O能力，减少等待时间' },
            2: { title: 'Token节约', desc: '智能缓存与压缩，降低API成本' },
            3: { title: '组合优于继承', desc: '灵活的组件化设计，支持无限扩展' },
            4: { title: '纵深防御', desc: '多层安全防护，确保系统可靠' },
            5: { title: '内建可观测', desc: '从设计之初就考虑监控与追踪' },
            6: { title: '渐进信任', desc: '按需求授予权限，平衡安全与效率' }
        };
        
        principles.forEach(principle => {
            principle.addEventListener('mouseenter', (e) => {
                const pId = principle.dataset.principle;
                
                // Dim everything
                document.querySelectorAll('.principle-group, .practice-group, .connection').forEach(el => {
                    el.classList.add('dimmed');
                });
                
                // Highlight current principle and its practices
                principle.classList.remove('dimmed');
                principle.classList.add('highlighted');
                
                document.querySelectorAll(`.practice-group[data-principle="${pId}"]`).forEach(p => {
                    p.classList.remove('dimmed');
                    p.classList.add('highlighted');
                });
                
                // Show tooltip
                const info = principleInfo[pId];
                tooltip.querySelector('.tooltip-title').textContent = info.title;
                tooltip.querySelector('.tooltip-desc').textContent = info.desc;
                tooltip.classList.add('show');
            });
            
            principle.addEventListener('mousemove', (e) => {
                tooltip.style.left = e.pageX + 15 + 'px';
                tooltip.style.top = e.pageY + 15 + 'px';
            });
            
            principle.addEventListener('mouseleave', () => {
                // Reset all
                document.querySelectorAll('.principle-group, .practice-group, .connection').forEach(el => {
                    el.classList.remove('dimmed', 'highlighted');
                });
                tooltip.classList.remove('show');
            });
        });
        
        // Add subtle parallax on mouse move
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 20;
            const y = (e.clientY / window.innerHeight - 0.5) * 20;
            
            document.querySelector('svg').style.transform = `translate(${x}px, ${y}px)`;
        });
    </script>
</body>
</html>
