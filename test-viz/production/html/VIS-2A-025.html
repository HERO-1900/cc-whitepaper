<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Cache 命中区域图</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', 'JetBrains Mono', monospace;
            background: linear-gradient(135deg, #0a0a0f 0%, #12121a 50%, #0d0d12 100%);
            color: #e8e8ec;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
        }
        
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.03;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }
        
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #00d4aa 0%, #00b4d8 50%, #ff6b6b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }
        
        .subtitle {
            font-size: 13px;
            color: #6b6b7b;
            margin-bottom: 50px;
            font-family: 'JetBrains Mono', monospace;
        }
        
        .diagram-container {
            width: 100%;
            max-width: 1000px;
            position: relative;
        }
        
        svg {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .segment {
            cursor: pointer;
            transition: filter 0.3s ease;
        }
        
        .segment:hover {
            filter: brightness(1.15);
        }
        
        .segment-label {
            font-size: 12px;
            font-weight: 500;
            fill: #e8e8ec;
            text-anchor: middle;
            pointer-events: none;
        }
        
        .segment-label-small {
            font-size: 10px;
            fill: rgba(255,255,255,0.6);
            text-anchor: middle;
            pointer-events: none;
        }
        
        .breakpoint {
            stroke: #f0c040;
            stroke-width: 2;
            stroke-dasharray: 5,5;
        }
        
        .breakpoint-circle {
            fill: #0a0a0f;
            stroke: #f0c040;
            stroke-width: 2;
        }
        
        .breakpoint-label {
            fill: #f0c040;
            font-size: 14px;
            font-weight: 700;
            text-anchor: middle;
            font-family: 'JetBrains Mono', monospace;
        }
        
        .bracket-path {
            fill: none;
            stroke: #00d4aa;
            stroke-width: 2;
        }
        
        .bracket-label {
            fill: #00d4aa;
            font-size: 13px;
            font-weight: 700;
            text-anchor: middle;
        }
        
        .price-tag {
            font-size: 11px;
            font-weight: 500;
        }
        
        .price-cache {
            fill: #00d4aa;
        }
        
        .price-full {
            fill: #ff6b6b;
        }
        
        .request-label {
            fill: #6b6b7b;
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
        }
        
        .token-info {
            fill: #8b8b9b;
            font-size: 10px;
            text-anchor: middle;
        }
        
        .tooltip {
            position: absolute;
            background: rgba(20, 20, 28, 0.95);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 16px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            max-width: 280px;
            z-index: 100;
        }
        
        .tooltip.show {
            opacity: 1;
        }
        
        .tooltip-title {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #fff;
        }
        
        .tooltip-row {
            font-size: 12px;
            color: #9b9bab;
            margin-bottom: 4px;
            font-family: 'JetBrains Mono', monospace;
        }
        
        .tooltip-row span {
            color: #fff;
        }
        
        .cache-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            margin-top: 8px;
        }
        
        .cache-hit {
            background: rgba(0, 212, 170, 0.2);
            color: #00d4aa;
        }
        
        .cache-miss {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
        }
        
        .info-panel {
            margin-top: 40px;
            width: 100%;
            max-width: 1000px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 4px;
        }
        
        .stat-value.green { color: #00d4aa; }
        .stat-value.orange { color: #ff9f43; }
        .stat-value.red { color: #ff6b6b; }
        .stat-value.blue { color: #00b4d8; }
        
        .stat-label {
            font-size: 12px;
            color: #6b6b7b;
        }
        
        .collapsible {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            overflow: hidden;
        }
        
        .collapsible-header {
            padding: 16px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s ease;
        }
        
        .collapsible-header:hover {
            background: rgba(255,255,255,0.05);
        }
        
        .collapsible-title {
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .collapsible-icon {
            width: 20px;
            height: 20px;
            transition: transform 0.3s ease;
        }
        
        .collapsible.open .collapsible-icon {
            transform: rotate(180deg);
        }
        
        .collapsible-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease, padding 0.3s ease;
        }
        
        .collapsible.open .collapsible-content {
            max-height: 500px;
            padding: 0 20px 20px;
        }
        
        .scenario-list {
            list-style: none;
        }
        
        .scenario-item {
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        
        .scenario-item:last-child {
            border-bottom: none;
        }
        
        .scenario-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }
        
        .scenario-icon.warning {
            background: rgba(255, 159, 67, 0.15);
            color: #ff9f43;
        }
        
        .scenario-content {
            flex: 1;
        }
        
        .scenario-title {
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 2px;
        }
        
        .scenario-desc {
            font-size: 12px;
            color: #6b6b7b;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .animate-pulse {
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .segment {
            animation: slideIn 0.6s ease forwards;
        }
        
        .segment:nth-child(1) { animation-delay: 0s; }
        .segment:nth-child(2) { animation-delay: 0.15s; }
        .segment:nth-child(3) { animation-delay: 0.3s; }
        .segment:nth-child(4) { animation-delay: 0.5s; }
    </style>
</head>
<body>
    <div class="noise"></div>
    
    <h1>Prompt Cache 命中区域图</h1>
    <p class="subtitle">VIS-2A-025 · 10_Token经济学.md · 图表预留 2.10-B</p>
    
    <div class="diagram-container">
        <svg viewBox="0 0 1000 420" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="grad-system" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#00b894;stop-opacity:1" />
                </linearGradient>
                <linearGradient id="grad-tool" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#00b4d8;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#0096c7;stop-opacity:1" />
                </linearGradient>
                <linearGradient id="grad-history" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#48cae4;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#90e0ef;stop-opacity:1" />
                </linearGradient>
                <linearGradient id="grad-new" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#ee5a5a;stop-opacity:1" />
                </linearGradient>
                
                <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="3" result="blur"/>
                    <feComposite in="SourceGraphic" in2="blur" operator="over"/>
                </filter>
            </defs>
            
            <!-- Request 1 Label -->
            <text x="50" y="95" class="request-label" text-anchor="end">请求 N-1</text>
            
            <!-- Request 1 Segments -->
            <rect id="r1-s1" class="segment" x="60" y="70" width="240" height="40" rx="6" fill="url(#grad-system)" 
                  data-name="系统提示词" data-tokens="20000" data-price="0.1x" data-cost="$0.03" data-cache="hit"/>
            <rect id="r1-s2" class="segment" x="302" y="70" width="120" height="40" rx="6" fill="url(#grad-tool)" 
                  data-name="工具 Schema" data-tokens="8000" data-price="0.1x" data-cost="$0.012" data-cache="hit"/>
            <rect id="r1-s3" class="segment" x="424" y="70" width="360" height="40" rx="6" fill="url(#grad-history)" 
                  data-name="历史消息" data-tokens="24000" data-price="0.1x" data-cost="$0.036" data-cache="hit"/>
            <rect id="r1-s4" class="segment" x="786" y="70" width="154" height="40" rx="6" fill="url(#grad-new)" 
                  data-name="新消息" data-tokens="6000" data-price="1x" data-cost="$0.09" data-cache="miss"/>
            
            <!-- Request 1 Labels -->
            <text x="180" y="95" class="segment-label">系统提示词</text>
            <text x="180" y="108" class="segment-label-small">System Prompt</text>
            
            <text x="362" y="95" class="segment-label">工具 Schema</text>
            <text x="362" y="108" class="segment-label-small">Tool Schema</text>
            
            <text x="604" y="95" class="segment-label">历史消息</text>
            <text x="604" y="108" class="segment-label-small">History</text>
            
            <text x="863" y="95" class="segment-label">新消息</text>
            <text x="863" y="108" class="segment-label-small">New</text>
            
            <!-- Request 2 Label -->
            <text x="50" y="195" class="request-label" text-anchor="end">请求 N</text>
            
            <!-- Request 2 Segments -->
            <rect id="r2-s1" class="segment" x="60" y="170" width="240" height="40" rx="6" fill="url(#grad-system)" 
                  data-name="系统提示词" data-tokens="20000" data-price="0.1x" data-cost="$0.03" data-cache="hit"/>
            <rect id="r2-s2" class="segment" x="302" y="170" width="120" height="40" rx="6" fill="url(#grad-tool)" 
                  data-name="工具 Schema" data-tokens="8000" data-price="0.1x" data-cost="$0.012" data-cache="hit"/>
            <rect id="r2-s3" class="segment" x="424" y="170" width="360" height="40" rx="6" fill="url(#grad-history)" 
                  data-name="历史消息" data-tokens="24000" data-price="0.1x" data-cost="$0.036" data-cache="hit"/>
            <rect id="r2-s4" class="segment" x="786" y="170" width="154" height="40" rx="6" fill="url(#grad-new)" 
                  data-name="新消息" data-tokens="8000" data-price="1x" data-cost="$0.12" data-cache="miss"/>
            
            <!-- Request 2 Labels -->
            <text x="180" y="195" class="segment-label">系统提示词</text>
            <text x="180" y="208" class="segment-label-small">System Prompt</text>
            
            <text x="362" y="195" class="segment-label">工具 Schema</text>
            <text x="362" y="208" class="segment-label-small">Tool Schema</text>
            
            <text x="604" y="195" class="segment-label">历史消息</text>
            <text x="604" y="208" class="segment-label-small">History</text>
            
            <text x="863" y="195" class="segment-label">新消息</text>
            <text x="863" y="208" class="segment-label-small">New</text>
            
            <!-- Cache Control Breakpoints -->
            <!-- Breakpoint 1 -->
            <line x1="302" y1="50" x2="302" y2="230" class="breakpoint"/>
            <circle cx="302" cy="40" r="12" class="breakpoint-circle"/>
            <text x="302" y="44" class="breakpoint-label">1</text>
            
            <!-- Breakpoint 2 -->
            <line x1="424" y1="50" x2="424" y2="230" class="breakpoint"/>
            <circle cx="424" cy="40" r="12" class="breakpoint-circle"/>
            <text x="424" y="44" class="breakpoint-label">2</text>
            
            <!-- Breakpoint 3 -->
            <line x1="786" y1="50" x2="786" y2="230" class="breakpoint"/>
            <circle cx="786" cy="40" r="12" class="breakpoint-circle"/>
            <text x="786" y="44" class="breakpoint-label">3</text>
            
            <!-- Bracket for Cache Hit Region -->
            <path d="M 60 30 Q 55 30 55 25 L 55 15 Q 55 10 60 10 L 786 10 Q 791 10 791 15 L 791 25 Q 791 30 786 30" 
                  class="bracket-path" fill="none"/>
            <text x="423" y="26" class="bracket-label">相同前缀区域 · 缓存命中 0.1x 价格</text>
            
            <!-- Price Tags -->
            <text x="423" y="140" class="price-tag price-cache" text-anchor="middle">0.1x 价格</text>
            <text x="863" y="140" class="price-tag price-full" text-anchor="middle">1x 全价</text>
            
            <text x="423" y="240" class="price-tag price-cache" text-anchor="middle">0.1x 价格</text>
            <text x="863" y="240" class="price-tag price-full" text-anchor="middle">1x 全价</text>
            
            <!-- Token Counts -->
            <text x="180" y="262" class="token-info">~20K tokens</text>
            <text x="362" y="262" class="token-info">~8K</text>
            <text x="604" y="262" class="token-info">~24K</text>
            <text x="863" y="262" class="token-info">~6-8K</text>
            
            <!-- CacheSafeParams Note -->
            <rect x="60" y="290" width="880" height="50" rx="8" fill="rgba(0,212,170,0.08)" stroke="rgba(0,212,170,0.2)"/>
            <text x="500" y="315" fill="#00d4aa" font-size="12" text-anchor="middle" font-weight="500">
                CacheSafeParams: forkedAgent · /btw 命令 · 投机执行 共享缓存前缀
            </text>
            <text x="500" y="330" fill="#6b6b7b" font-size="10" text-anchor="middle">
                保证这些操作不会破坏已缓存的前缀 · 节省 $0.3-0.6 / 请求
            </text>
            
            <!-- Legend -->
            <g transform="translate(60, 360)">
                <rect x="0" y="0" width="16" height="16" rx="4" fill="url(#grad-system)"/>
                <text x="24" y="12" fill="#9b9bab" font-size="11">缓存命中 (不变内容)</text>
                
                <rect x="160" y="0" width="16" height="16" rx="4" fill="url(#grad-new)"/>
                <text x="184" y="12" fill="#9b9bab" font-size="11">缓存未命中 (新内容)</text>
                
                <line x1="320" y1="8" x2="350" y2="8" stroke="#f0c040" stroke-width="2" stroke-dasharray="4,2"/>
                <circle cx="335" cy="8" r="5" fill="#0a0a0f" stroke="#f0c040" stroke-width="1.5"/>
                <text x="360" y="12" fill="#9b9bab" font-size="11">cache_control 断点</text>
            </g>
        </svg>
        
        <div class="tooltip" id="tooltip">
            <div class="tooltip-title" id="tooltip-title"></div>
            <div class="tooltip-row">Tokens: <span id="tooltip-tokens"></span></div>
            <div class="tooltip-row">单价: <span id="tooltip-price"></span></div>
            <div class="tooltip-row">成本: <span id="tooltip-cost"></span></div>
            <div class="cache-badge" id="tooltip-badge"></div>
        </div>
    </div>
    
    <div class="info-panel">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value green">0.1x</div>
                <div class="stat-label">缓存命中价格</div>
            </div>
            <div class="stat-card">
                <div class="stat-value red">1x</div>
                <div class="stat-label">全价付费</div>
            </div>
            <div class="stat-card">
                <div class="stat-value blue">30K+</div>
                <div class="stat-label">典型缓存 Token 数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value orange">$0.3-0.6</div>
                <div class="stat-label">单次请求节省</div>
            </div>
        </div>
        
        <div class="collapsible" id="scenarios">
            <div class="collapsible-header" onclick="toggleCollapsible()">
                <div class="collapsible-title">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                    </svg>
                    缓存失效场景（静默多花钱，不报错）
                </div>
                <svg class="collapsible-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 9l-7 7-7-7"/>
                </svg>
            </div>
            <div class="collapsible-content">
                <ul class="scenario-list">
                    <li class="scenario-item">
                        <div class="scenario-icon warning">!</div>
                        <div class="scenario-content">
                            <div class="scenario-title">MCP 服务器变化</div>
                            <div class="scenario-desc">工具 Schema 发生变化时，相关缓存段失效</div>
                        </div>
                    </li>
                    <li class="scenario-item">
                        <div class="scenario-icon warning">!</div>
                        <div class="scenario-content">
                            <div class="scenario-title">KAIROS 日期字面量</div>
                            <div class="scenario-desc">动态日期内容导致缓存前缀无法匹配</div>
                        </div>
                    </li>
                    <li class="scenario-item">
                        <div class="scenario-icon warning">!</div>
                        <div class="scenario-content">
                            <div class="scenario-title">上下文压缩触发</div>
                            <div class="scenario-desc">消息历史被压缩后，原有缓存边界改变</div>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </div>
    
    <script>
        const tooltip = document.getElementById('tooltip');
        const tooltipTitle = document.getElementById('tooltip-title');
        const tooltipTokens = document.getElementById('tooltip-tokens');
        const tooltipPrice = document.getElementById('tooltip-price');
        const tooltipCost = document.getElementById('tooltip-cost');
        const tooltipBadge = document.getElementById('tooltip-badge');
        
        document.querySelectorAll('.segment').forEach(segment => {
            segment.addEventListener('mouseenter', (e) => {
                const data = e.target.dataset;
                tooltipTitle.textContent = data.name;
                tooltipTokens.textContent = data.tokens;
                tooltipPrice.textContent = data.price;
                tooltipCost.textContent = data.cost;
                
                if (data.cache === 'hit') {
                    tooltipBadge.textContent = '缓存命中';
                    tooltipBadge.className = 'cache-badge cache-hit';
                } else {
                    tooltipBadge.textContent = '缓存未命中';
                    tooltipBadge.className = 'cache-badge cache-miss';
                }
                
                tooltip.classList.add('show');
            });
            
            segment.addEventListener('mousemove', (e) => {
                tooltip.style.left = e.pageX + 15 + 'px';
                tooltip.style.top = e.pageY - 10 + 'px';
            });
            
            segment.addEventListener('mouseleave', () => {
                tooltip.classList.remove('show');
            });
        });
        
        function toggleCollapsible() {
            document.getElementById('scenarios').classList.toggle('open');
        }
    </script>
</body>
</html>
