<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code 数据流高速公路</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .container {
            width: 95vw;
            height: 90vh;
            position: relative;
        }
        
        svg {
            width: 100%;
            height: 100%;
        }
        
        /* 背景网格 */
        .grid-bg {
            fill: none;
            stroke: rgba(255,255,255,0.03);
            stroke-width: 1;
        }
        
        /* 高速公路样式 */
        .highway-main {
            fill: none;
            stroke: url(#gradMain);
            stroke-width: 4;
            stroke-linecap: round;
            filter: url(#glowMain);
        }
        
        .highway-bg {
            fill: none;
            stroke: url(#gradBg);
            stroke-width: 2.5;
            stroke-dasharray: 8,4;
            opacity: 0.7;
        }
        
        .highway-ext {
            fill: none;
            stroke: url(#gradExt);
            stroke-width: 2;
            stroke-linecap: round;
        }
        
        /* 流动粒子动画 */
        .flow-particle-main {
            fill: #00d4ff;
            filter: url(#glowMain);
            animation: flowMain 3s linear infinite;
        }
        
        .flow-particle-bg {
            fill: #a855f7;
            opacity: 0.6;
            animation: flowBg 4s linear infinite;
        }
        
        .flow-particle-ext {
            fill: #22d3a8;
            animation: flowExt 5s linear infinite;
        }
        
        @keyframes flowMain {
            0% { offset-distance: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { offset-distance: 100%; opacity: 0; }
        }
        
        @keyframes flowBg {
            0% { offset-distance: 0%; opacity: 0; }
            15% { opacity: 0.6; }
            85% { opacity: 0.6; }
            100% { offset-distance: 100%; opacity: 0; }
        }
        
        @keyframes flowExt {
            0% { offset-distance: 0%; opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { offset-distance: 100%; opacity: 0; }
        }
        
        /* 节点样式 */
        .node-main {
            fill: #0a0a0f;
            stroke: #00d4ff;
            stroke-width: 2.5;
            filter: url(#glowMain);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .node-bg {
            fill: #0a0a0f;
            stroke: #a855f7;
            stroke-width: 2;
            stroke-dasharray: 4,2;
            cursor: pointer;
        }
        
        .node-ext {
            fill: #0a0a0f;
            stroke: #22d3a8;
            stroke-width: 2;
            cursor: pointer;
        }
        
        .node-main:hover, .node-bg:hover, .node-ext:hover {
            transform: scale(1.15);
        }
        
        .node-main:hover {
            fill: rgba(0,212,255,0.1);
        }
        
        .node-bg:hover {
            fill: rgba(168,85,247,0.1);
        }
        
        .node-ext:hover {
            fill: rgba(34,211,168,0.1);
        }
        
        /* 循环箭头 */
        .loop-arrow {
            fill: none;
            stroke: #00d4ff;
            stroke-width: 2;
            stroke-dasharray: 3,2;
            opacity: 0.8;
            animation: rotateLoop 4s linear infinite;
        }
        
        @keyframes rotateLoop {
            from { stroke-dashoffset: 0; }
            to { stroke-dashoffset: 20; }
        }
        
        /* 标签文字 */
        .label-cn {
            font-size: 11px;
            font-weight: 500;
            fill: #e2e8f0;
            text-anchor: middle;
        }
        
        .label-en {
            font-family: 'JetBrains Mono', monospace;
            font-size: 8px;
            fill: #64748b;
            text-anchor: middle;
        }
        
        .label-group {
            cursor: pointer;
        }
        
        /* 标题 */
        .title {
            font-size: 18px;
            font-weight: 700;
            fill: #f8fafc;
            letter-spacing: 2px;
        }
        
        .subtitle {
            font-size: 11px;
            fill: #64748b;
            letter-spacing: 4px;
        }
        
        /* 触发时机标签 */
        .trigger-label {
            font-size: 9px;
            fill: #475569;
            font-style: italic;
        }
        
        /* 虚线连接 */
        .trigger-line {
            fill: none;
            stroke: rgba(255,255,255,0.15);
            stroke-width: 1;
            stroke-dasharray: 4,4;
        }
        
        /* 可扩展点点 */
        .expand-dot {
            fill: #22d3a8;
            opacity: 0.4;
            animation: pulseDot 2s ease-in-out infinite;
        }
        
        .expand-dot:nth-child(2) { animation-delay: 0.3s; }
        .expand-dot:nth-child(3) { animation-delay: 0.6s; }
        
        @keyframes pulseDot {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }
        
        /* 提示框 */
        .tooltip {
            position: absolute;
            background: rgba(15,23,42,0.95);
            border: 1px solid rgba(100,116,139,0.3);
            border-radius: 8px;
            padding: 12px 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: #94a3b8;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            max-width: 280px;
            z-index: 100;
        }
        
        .tooltip.show {
            opacity: 1;
        }
        
        .tooltip-path {
            color: #00d4ff;
            font-size: 10px;
            margin-bottom: 4px;
        }
        
        .tooltip-desc {
            color: #e2e8f0;
            line-height: 1.5;
        }
        
        /* 图例 */
        .legend {
            font-size: 10px;
            fill: #64748b;
        }
        
        .legend-icon {
            stroke-width: 2;
        }
    </style>
</head>
<body>
    <div class="container">
        <svg viewBox="0 0 1400 700" preserveAspectRatio="xMidYMid meet">
            <defs>
                <!-- 发光滤镜 -->
                <filter id="glowMain" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="3" result="blur"/>
                    <feMerge>
                        <feMergeNode in="blur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
                
                <!-- 渐变定义 -->
                <linearGradient id="gradMain" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#0891b2"/>
                    <stop offset="50%" stop-color="#00d4ff"/>
                    <stop offset="100%" stop-color="#0891b2"/>
                </linearGradient>
                
                <linearGradient id="gradBg" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#7c3aed"/>
                    <stop offset="50%" stop-color="#a855f7"/>
                    <stop offset="100%" stop-color="#7c3aed"/>
                </linearGradient>
                
                <linearGradient id="gradExt" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#059669"/>
                    <stop offset="50%" stop-color="#22d3a8"/>
                    <stop offset="100%" stop-color="#059669"/>
                </linearGradient>
                
                <!-- 箭头标记 -->
                <marker id="arrowMain" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill="#00d4ff"/>
                </marker>
                <marker id="arrowBg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill="#a855f7"/>
                </marker>
                <marker id="arrowExt" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill="#22d3a8"/>
                </marker>
            </defs>
            
            <!-- 背景网格 -->
            <g id="grid">
                <line class="grid-bg" x1="0" y1="100" x2="1400" y2="100"/>
                <line class="grid-bg" x1="0" y1="200" x2="1400" y2="200"/>
                <line class="grid-bg" x1="0" y1="300" x2="1400" y2="300"/>
                <line class="grid-bg" x1="0" y1="400" x2="1400" y2="400"/>
                <line class="grid-bg" x1="0" y1="500" x2="1400" y2="500"/>
                <line class="grid-bg" x1="0" y1="600" x2="1400" y2="600"/>
                <line class="grid-bg" x1="200" y1="0" x2="200" y2="700"/>
                <line class="grid-bg" x1="400" y1="0" x2="400" y2="700"/>
                <line class="grid-bg" x1="600" y1="0" x2="600" y2="700"/>
                <line class="grid-bg" x1="800" y1="0" x2="800" y2="700"/>
                <line class="grid-bg" x1="1000" y1="0" x2="1000" y2="700"/>
                <line class="grid-bg" x1="1200" y1="0" x2="1200" y2="700"/>
            </g>
            
            <!-- 标题 -->
            <g transform="translate(700, 45)">
                <text class="title" text-anchor="middle">数据流高速公路</text>
                <text class="subtitle" y="22" text-anchor="middle">DATA FLOW HIGHWAYS</text>
            </g>
            
            <!-- 系统起点 -->
            <g transform="translate(120, 350)">
                <circle r="35" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="4,2"/>
                <text class="label-cn" y="4">系统启动</text>
                <text class="label-en" y="16">SYSTEM START</text>
            </g>
            
            <!-- ===== 扩展链路 (上方) ===== -->
            <g id="ext-highway">
                <!-- 触发线 -->
                <path class="trigger-line" d="M 155 320 L 155 220"/>
                <text class="trigger-label" x="145" y="270" transform="rotate(-90,145,270)">启动时触发</text>
                
                <!-- 高速公路 -->
                <path id="pathExt" class="highway-ext" d="M 180 180 L 1300 180" marker-end="url(#arrowExt)"/>
                
                <!-- 流动粒子 -->
                <circle r="3" class="flow-particle-ext">
                    <animateMotion dur="5s" repeatCount="indefinite">
                        <mpath href="#pathExt"/>
                    </animateMotion>
                </circle>
                <circle r="2" class="flow-particle-ext" style="animation-delay:1s">
                    <animateMotion dur="5s" begin="1s" repeatCount="indefinite">
                        <mpath href="#pathExt"/>
                    </animateMotion>
                </circle>
                
                <!-- 节点 -->
                <g class="node-group" data-path="mcp/McpClient.ts" data-desc="MCP服务器连接初始化">
                    <circle cx="280" cy="180" r="18" class="node-ext"/>
                    <text class="label-cn" x="280" y="150">MCP连接</text>
                    <text class="label-en" x="280" y="162">MCP Servers</text>
                </g>
                
                <g class="node-group" data-path="plugins/PluginManager.ts" data-desc="插件系统加载外部扩展">
                    <circle cx="460" cy="180" r="18" class="node-ext"/>
                    <text class="label-cn" x="460" y="150">插件加载</text>
                    <text class="label-en" x="460" y="162">Plugins</text>
                </g>
                
                <g class="node-group" data-path="skills/SkillRegistry.ts" data-desc="技能注册系统初始化">
                    <circle cx="640" cy="180" r="18" class="node-ext"/>
                    <text class="label-cn" x="640" y="150">技能注册</text>
                    <text class="label-en" x="640" y="162">Skills</text>
                </g>
                
                <g class="node-group" data-path="hooks/HookManager.ts" data-desc="Hook系统注册自定义钩子">
                    <circle cx="820" cy="180" r="18" class="node-ext"/>
                    <text class="label-cn" x="820" y="150">钩子注册</text>
                    <text class="label-en" x="820" y="162">Hooks</text>
                </g>
                
                <g class="node-group" data-path="bridge/BridgeClient.ts" data-desc="Bridge远程连接建立">
                    <circle cx="1000" cy="180" r="18" class="node-ext"/>
                    <text class="label-cn" x="1000" y="150">远程连接</text>
                    <text class="label-en" x="1000" y="162">Bridge</text>
                </g>
                
                <!-- 可扩展点点 -->
                <g transform="translate(1150, 180)">
                    <circle cx="0" cy="0" r="3" class="expand-dot"/>
                    <circle cx="15" cy="0" r="3" class="expand-dot"/>
                    <circle cx="30" cy="0" r="3" class="expand-dot"/>
                    <text class="label-en" x="45" y="4" fill="#22d3a8" font-size="10">...</text>
                </g>
            </g>
            
            <!-- ===== 主链路 (中间) ===== -->
            <g id="main-highway">
                <!-- 高速公路 -->
                <path id="pathMain" class="highway-main" d="M 180 350 L 1300 350" marker-end="url(#arrowMain)"/>
                
                <!-- 流动粒子 -->
                <circle r="5" class="flow-particle-main">
                    <animateMotion dur="3s" repeatCount="indefinite">
                        <mpath href="#pathMain"/>
                    </animateMotion>
                </circle>
                <circle r="4" class="flow-particle-main" style="animation-delay:0.5s">
                    <animateMotion dur="3s" begin="0.5s" repeatCount="indefinite">
                        <mpath href="#pathMain"/>
                    </animateMotion>
                </circle>
                <circle r="3" class="flow-particle-main" style="animation-delay:1s">
                    <animateMotion dur="3s" begin="1s" repeatCount="indefinite">
                        <mpath href="#pathMain"/>
                    </animateMotion>
                </circle>
                
                <!-- 节点 -->
                <g class="node-group" data-path="main.tsx" data-desc="主入口，接收用户输入并分流">
                    <circle cx="250" cy="350" r="22" class="node-main"/>
                    <text class="label-cn" x="250" y="315">用户输入</text>
                    <text class="label-en" x="250" y="328">User Input</text>
                </g>
                
                <g class="node-group" data-path="QueryEngine.ts" data-desc="查询引擎核心，处理消息提交">
                    <circle cx="400" cy="350" r="22" class="node-main"/>
                    <text class="label-cn" x="400" y="315">查询引擎</text>
                    <text class="label-en" x="400" y="328">QueryEngine</text>
                </g>
                
                <g class="node-group" data-path="context.ts" data-desc="组装系统提示词和上下文">
                    <circle cx="520" cy="350" r="20" class="node-main"/>
                    <text class="label-cn" x="520" y="315">上下文组装</text>
                    <text class="label-en" x="520" y="328">Context</text>
                </g>
                
                <!-- queryLoop 循环节点 -->
                <g class="node-group" data-path="queryLoop()" data-desc="主循环，处理API调用与工具执行的心跳循环">
                    <circle cx="680" cy="350" r="28" class="node-main"/>
                    <text class="label-cn" x="680" y="390">主循环</text>
                    <text class="label-en" x="680" y="402">queryLoop</text>
                    
                    <!-- 循环箭头 -->
                    <path class="loop-arrow" d="M 650 330 A 35 35 0 1 1 710 330" fill="none"/>
                    <polygon points="710,330 705,325 705,335" fill="#00d4ff"/>
                </g>
                
                <!-- API调用节点 -->
                <g class="node-group" data-path="services/api/" data-desc="Claude API调用服务">
                    <circle cx="820" cy="350" r="20" class="node-main"/>
                    <text class="label-cn" x="820" y="315">API调用</text>
                    <text class="label-en" x="820" y="328">API Call</text>
                </g>
                
                <!-- 工具执行 -->
                <g class="node-group" data-path="tools/" data-desc="工具执行系统">
                    <circle cx="940" cy="350" r="20" class="node-main"/>
                    <text class="label-cn" x="940" y="315">工具执行</text>
                    <text class="label-en" x="940" y="328">Tool Exec</text>
                </g>
                
                <!-- UI渲染 -->
                <g class="node-group" data-path="components/" data-desc="终端UI渲染组件">
                    <circle cx="1100" cy="350" r="24" class="node-main"/>
                    <text class="label-cn" x="1100" y="315">UI渲染</text>
                    <text class="label-en" x="1100" y="328">UI Render</text>
                </g>
                
                <!-- 循环指示线 -->
                <path fill="none" stroke="#00d4ff" stroke-width="1" stroke-dasharray="2,2" opacity="0.4"
                      d="M 940 330 Q 880 280 820 330"/>
                <text x="880" y="295" fill="#00d4ff" font-size="8" text-anchor="middle" opacity="0.6">工具结果返回</text>
            </g>
            
            <!-- ===== 后台链路 (下方) ===== -->
            <g id="bg-highway">
                <!-- 触发线 - 从主链路触发 -->
                <path class="trigger-line" d="M 1100 375 L 1100 420"/>
                <text class="trigger-label" x="1110" y="400">AI回答完成后触发</text>
                
                <!-- 高速公路 -->
                <path id="pathBg" class="highway-bg" d="M 180 520 L 1100 520" marker-end="url(#arrowBg)"/>
                
                <!-- 流动粒子 -->
                <circle r="3" class="flow-particle-bg">
                    <animateMotion dur="4s" repeatCount="indefinite">
                        <mpath href="#pathBg"/>
                    </animateMotion>
                </circle>
                
                <!-- 节点 -->
                <g class="node-group" data-path="memory/SessionMemory.ts" data-desc="提取对话摘要，持久化会话记忆">
                    <circle cx="320" cy="520" r="18" class="node-bg"/>
                    <text class="label-cn" x="320" y="490">会话记忆</text>
                    <text class="label-en" x="320" y="502">SessionMemory</text>
                </g>
                
                <g class="node-group" data-path="suggestions/PromptSuggestion.ts" data-desc="预测下一条可能的用户消息">
                    <circle cx="500" cy="520" r="18" class="node-bg"/>
                    <text class="label-cn" x="500" y="490">提示预测</text>
                    <text class="label-en" x="500" y="502">PromptSuggestion</text>
                </g>
                
                <g class="node-group" data-path="history/fileHistory.ts" data-desc="创建文件快照用于历史回溯">
                    <circle cx="680" cy="520" r="18" class="node-bg"/>
                    <text class="label-cn" x="680" y="490">文件快照</text>
                    <text class="label-en" x="680" y="502">File Snapshot</text>
                </g>
                
                <g class="node-group" data-path="speculative/SpeculativeExecutor.ts" data-desc="[可选] 投机执行预测任务">
                    <circle cx="860" cy="520" r="18" class="node-bg"/>
                    <text class="label-cn" x="860" y="490">投机执行</text>
                    <text class="label-en" x="860" y="502">Speculative</text>
                    <text x="860" y="558" fill="#64748b" font-size="8" text-anchor="middle">(可选)</text>
                </g>
            </g>
            
            <!-- 图例 -->
            <g transform="translate(50, 630)">
                <line x1="0" y1="0" x2="30" y2="0" class="highway-main" stroke-width="3"/>
                <text class="legend" x="40" y="4">主链路 (同步阻塞)</text>
                
                <line x1="200" y1="0" x2="230" y2="0" class="highway-bg"/>
                <text class="legend" x="240" y="4">后台链路 (异步)</text>
                
                <line x1="380" y1="0" x2="410" y2="0" class="highway-ext"/>
                <text class="legend" x="420" y="4">扩展链路 (初始化)</text>
            </g>
            
            <!-- 特性标注 -->
            <g transform="translate(1200, 630)">
                <rect x="0" y="-20" width="160" height="70" rx="4" fill="none" stroke="#334155" stroke-width="1"/>
                <text x="80" y="0" class="label-cn" font-size="10">链路特性</text>
                <text x="10" y="20" fill="#00d4ff" font-size="9">● 主: 同步阻塞，用户可见</text>
                <text x="10" y="35" fill="#a855f7" font-size="9">● 后台: 静默运行，异步</text>
                <text x="10" y="50" fill="#22d3a8" font-size="9">● 扩展: 系统启动时加载</text>
            </g>
        </svg>
        
        <div class="tooltip" id="tooltip">
            <div class="tooltip-path" id="tooltip-path"></div>
            <div class="tooltip-desc" id="tooltip-desc"></div>
        </div>
    </div>
    
    <script>
        const tooltip = document.getElementById('tooltip');
        const tooltipPath = document.getElementById('tooltip-path');
        const tooltipDesc = document.getElementById('tooltip-desc');
        
        document.querySelectorAll('.node-group').forEach(node => {
            node.addEventListener('mouseenter', (e) => {
                const path = node.dataset.path;
                const desc = node.dataset.desc;
                
                tooltipPath.textContent = path;
                tooltipDesc.textContent = desc;
                tooltip.classList.add('show');
            });
            
            node.addEventListener('mousemove', (e) => {
                const rect = document.querySelector('.container').getBoundingClientRect();
                const x = e.clientX - rect.left + 15;
                const y = e.clientY - rect.top - 10;
                
                tooltip.style.left = x + 'px';
                tooltip.style.top = y + 'px';
            });
            
            node.addEventListener('mouseleave', () => {
                tooltip.classList.remove('show');
            });
        });
    </script>
</body>
</html>
