<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenTelemetry Span Hierarchy - 遥测层级图</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap');

:root {
  --bg-primary: #1a1a2e;
  --bg-secondary: #16213e;
  --bg-panel: #0f3460;
  --interaction: #7b61ff;
  --llm-request: #00d4ff;
  --tool: #48bb78;
  --blocked: #ffd93d;
  --execution: #ff9f43;
  --hook: #e056a0;
  --text-primary: #eaeaea;
  --text-secondary: #a0a0a0;
  --grid-line: rgba(255,255,255,0.05);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg-primary);
  min-height: 100vh;
  padding: 40px;
  color: var(--text-primary);
  background-image: 
    radial-gradient(circle at 20% 80%, rgba(123,97,255,0.08) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(0,212,255,0.06) 0%, transparent 50%);
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

.header {
  text-align: center;
  margin-bottom: 30px;
}

.header h1 {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #fff 0%, #a0a0a0 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}

.header .subtitle {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 2px;
}

.trace-container {
  background: var(--bg-secondary);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.06);
}

.trace-header {
  display: flex;
  align-items: center;
  padding: 16px 20px;
  background: rgba(0,0,0,0.2);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.trace-title {
  font-size: 14px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 10px;
}

.trace-title::before {
  content: '◉';
  color: var(--interaction);
}

.time-ruler {
  flex: 1;
  margin-left: 40px;
  display: flex;
  justify-content: space-between;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-secondary);
}

.svg-container {
  position: relative;
  padding: 20px;
}

svg {
  width: 100%;
  height: auto;
  display: block;
}

.span-bar {
  cursor: pointer;
  transition: all 0.2s ease;
}

.span-bar:hover {
  filter: brightness(1.2);
}

.span-bar.collapsed {
  opacity: 0.6;
}

.span-label {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 12px;
  font-weight: 600;
  fill: #fff;
  pointer-events: none;
}

.span-sublabel {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  fill: rgba(255,255,255,0.7);
  pointer-events: none;
}

.attr-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  fill: var(--text-secondary);
}

.attr-value {
  fill: var(--text-primary);
}

.grid-line {
  stroke: var(--grid-line);
  stroke-width: 1;
}

.expand-icon {
  cursor: pointer;
  fill: var(--text-secondary);
  transition: all 0.2s ease;
}

.expand-icon:hover {
  fill: #fff;
}

.expand-icon.collapsed {
  transform: rotate(-90deg);
  transform-origin: center;
}

@keyframes pulse-waiting {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.waiting-indicator {
  animation: pulse-waiting 1.5s ease-in-out infinite;
}

.tooltip {
  position: absolute;
  background: rgba(26,26,46,0.98);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 12px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s ease;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  z-index: 100;
  max-width: 280px;
}

.tooltip.visible {
  opacity: 1;
}

.tooltip-title {
  font-weight: 600;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.tooltip-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.tooltip-row {
  display: flex;
  justify-content: space-between;
  gap: 20px;
  margin: 4px 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
}

.tooltip-key {
  color: var(--text-secondary);
}

.tooltip-value {
  color: var(--text-primary);
}

.beta-badge {
  fill: none;
  stroke: var(--hook);
  stroke-width: 1;
  stroke-dasharray: 3,3;
}

.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  padding: 16px 20px;
  background: rgba(0,0,0,0.2);
  border-top: 1px solid rgba(255,255,255,0.06);
  font-size: 11px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'JetBrains Mono', monospace;
}

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 2px;
}

.info-panel {
  position: absolute;
  right: 20px;
  top: 20px;
  width: 200px;
  background: rgba(15,52,96,0.6);
  backdrop-filter: blur(10px);
  border-radius: 8px;
  padding: 12px;
  border: 1px solid rgba(255,255,255,0.08);
}

.info-title {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-secondary);
  margin-bottom: 8px;
}

.info-row {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  margin: 4px 0;
  font-family: 'JetBrains Mono', monospace;
}

.timeline-marker {
  stroke: rgba(255,255,255,0.15);
  stroke-width: 1;
  stroke-dasharray: 4,4;
}

.connection-line {
  stroke: rgba(255,255,255,0.15);
  stroke-width: 1;
  fill: none;
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Span Hierarchy Visualization</h1>
    <div class="subtitle">OpenTelemetry Trace Structure / 遥测追踪层级</div>
  </div>
  
  <div class="trace-container">
    <div class="trace-header">
      <div class="trace-title">claude_code.interaction</div>
      <div class="time-ruler">
        <span>0ms</span>
        <span>5s</span>
        <span>10s</span>
        <span>15s</span>
        <span>20s</span>
        <span>25s</span>
        <span>30s</span>
      </div>
    </div>
    
    <div class="svg-container">
      <svg viewBox="0 0 1000 520" preserveAspectRatio="xMidYMid meet">
        <defs>
          <linearGradient id="grad-interaction" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#7b61ff"/>
            <stop offset="100%" stop-color="#5a4fcf"/>
          </linearGradient>
          <linearGradient id="grad-llm" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#00d4ff"/>
            <stop offset="100%" stop-color="#0099cc"/>
          </linearGradient>
          <linearGradient id="grad-tool" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#48bb78"/>
            <stop offset="100%" stop-color="#2f855a"/>
          </linearGradient>
          <linearGradient id="grad-blocked" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#ffd93d"/>
            <stop offset="100%" stop-color="#f6ad55"/>
          </linearGradient>
          <linearGradient id="grad-execution" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#ff9f43"/>
            <stop offset="100%" stop-color="#e07b39"/>
          </linearGradient>
          <linearGradient id="grad-hook" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#e056a0"/>
            <stop offset="100%" stop-color="#b83b7f"/>
          </linearGradient>
        </defs>
        
        <!-- Grid lines -->
        <line class="grid-line" x1="200" y1="50" x2="200" y2="480"/>
        <line class="grid-line" x1="350" y1="50" x2="350" y2="480"/>
        <line class="grid-line" x1="500" y1="50" x2="500" y2="480"/>
        <line class="grid-line" x1="650" y1="50" x2="650" y2="480"/>
        <line class="grid-line" x1="800" y1="50" x2="800" y2="480"/>
        <line class="grid-line" x1="950" y1="50" x2="950" y2="480"/>
        
        <!-- Timeline markers -->
        <line class="timeline-marker" x1="200" y1="40" x2="200" y2="50"/>
        <line class="timeline-marker" x1="350" y1="40" x2="350" y2="50"/>
        <line class="timeline-marker" x1="500" y1="40" x2="500" y2="50"/>
        <line class="timeline-marker" x1="650" y1="40" x2="650" y2="50"/>
        <line class="timeline-marker" x1="800" y1="40" x2="800" y2="50"/>
        <line class="timeline-marker" x1="950" y1="40" x2="950" y2="50"/>
        
        <!-- Root: interaction -->
        <g class="span-group" data-span="interaction">
          <rect class="span-bar" x="40" y="60" width="910" height="32" rx="4" fill="url(#grad-interaction)"/>
          <polygon class="expand-icon" points="24,72 18,76 24,80" fill="#fff"/>
          <text class="span-label" x="55" y="80">interaction</text>
          <text class="span-sublabel" x="130" y="80">claude_code.interaction</text>
          <text class="attr-text" x="730" y="75">sequence=<tspan class="attr-value">42</tspan></text>
          <text class="attr-text" x="730" y="85">SPAN_TTL=<tspan class="attr-value">30min</tspan></text>
        </g>
        
        <!-- Connection lines -->
        <path class="connection-line" d="M 55 92 L 55 115 L 70 115"/>
        <path class="connection-line" d="M 55 92 L 55 190 L 70 190"/>
        <path class="connection-line" d="M 55 92 L 55 350 L 70 350"/>
        
        <!-- LLM Request -->
        <g class="span-group" data-span="llm_request">
          <rect class="span-bar" x="70" y="115" width="600" height="28" rx="4" fill="url(#grad-llm)"/>
          <polygon class="expand-icon" points="54,124 48,129 54,133" fill="#fff"/>
          <text class="span-label" x="85" y="133">llm_request</text>
          <text class="span-sublabel" x="180" y="133">API调用 / API Call</text>
          
          <!-- Attributes -->
          <text class="attr-text" x="85" y="150">model=<tspan class="attr-value">claude-4</tspan></text>
          <text class="attr-text" x="200" y="150">speed=<tspan class="attr-value">normal</tspan></text>
          <text class="attr-text" x="310" y="150">ttft_ms=<tspan class="attr-value">245</tspan></text>
          <text class="attr-text" x="420" y="150">in=<tspan class="attr-value">4.2k</tspan></text>
          <text class="attr-text" x="500" y="150">out=<tspan class="attr-value">1.8k</tspan></text>
          <text class="attr-text" x="580" y="150">cache=<tspan class="attr-value">+12%</tspan></text>
        </g>
        
        <!-- Tool -->
        <g class="span-group" data-span="tool">
          <rect class="span-bar" x="70" y="190" width="450" height="28" rx="4" fill="url(#grad-tool)"/>
          <polygon class="expand-icon" points="54,199 48,204 54,208" fill="#fff"/>
          <text class="span-label" x="85" y="208">tool</text>
          <text class="span-sublabel" x="130" y="208">工具执行 / Tool Execution</text>
          <text class="attr-text" x="85" y="225">tool_name=<tspan class="attr-value">read_file</tspan></text>
        </g>
        
        <!-- Connection lines for tool children -->
        <path class="connection-line" d="M 85 218 L 85 250 L 100 250"/>
        <path class="connection-line" d="M 85 218 L 85 300 L 100 300"/>
        
        <!-- Blocked on User -->
        <g class="span-group" data-span="blocked">
          <rect class="span-bar waiting-indicator" x="100" y="242" width="120" height="24" rx="4" fill="url(#grad-blocked)"/>
          <text class="span-label" x="115" y="258" fill="#1a1a2e">blocked_on_user</text>
          <text class="attr-text" x="115" y="275">decision=<tspan class="attr-value">approved</tspan></text>
          <text class="attr-text" x="250" y="275">source=<tspan class="attr-value">user_click</tspan></text>
        </g>
        
        <!-- Execution -->
        <g class="span-group" data-span="execution">
          <rect class="span-bar" x="100" y="292" width="280" height="24" rx="4" fill="url(#grad-execution)"/>
          <text class="span-label" x="115" y="308">execution</text>
          <text class="attr-text" x="115" y="325">success=<tspan class="attr-value">true</tspan></text>
          <text class="attr-text" x="220" y="325">duration=<tspan class="attr-value">1.2s</tspan></text>
        </g>
        
        <!-- Hook (Beta Only) -->
        <g class="span-group" data-span="hook">
          <rect class="span-bar" x="70" y="360" width="350" height="28" rx="4" fill="url(#grad-hook)" style="stroke: #e056a0; stroke-width: 1; stroke-dasharray: 4,3;"/>
          <text class="span-label" x="85" y="378">hook</text>
          <text class="span-sublabel" x="130" y="378">Beta only / 测试功能</text>
          <rect x="200" y="365" width="36" height="14" rx="2" fill="none" stroke="#e056a0" stroke-width="1" stroke-dasharray="2,2"/>
          <text x="203" y="375" font-size="8" fill="#e056a0" font-family="JetBrains Mono">BETA</text>
          <text class="attr-text" x="85" y="395">hook_name=<tspan class="attr-value">pre_tool</tspan></text>
          <text class="attr-text" x="220" y="395">blocking=<tspan class="attr-value">3</tspan></text>
        </g>
        
        <!-- Privacy Rules Panel -->
        <g transform="translate(550, 230)">
          <rect x="0" y="0" width="230" height="140" rx="8" fill="rgba(15,52,96,0.4)" stroke="rgba(255,255,255,0.08)"/>
          <text x="15" y="25" font-size="11" font-weight="600" fill="#fff" font-family="Space Grotesk">隐私规则 / Privacy Rules</text>
          
          <text x="15" y="50" font-size="9" fill="#a0a0a0" font-family="JetBrains Mono">system_prompt</text>
          <text x="140" y="50" font-size="9" fill="#48bb78" font-family="JetBrains Mono">all users ✓</text>
          
          <text x="15" y="70" font-size="9" fill="#a0a0a0" font-family="JetBrains Mono">thinking_output</text>
          <text x="140" y="70" font-size="9" fill="#ffd93d" font-family="JetBrains Mono">ant-only 🔒</text>
          
          <text x="15" y="90" font-size="9" fill="#a0a0a0" font-family="JetBrains Mono">tool_schema</text>
          <text x="140" y="90" font-size="9" fill="#00d4ff" font-family="JetBrains Mono">hashed #</text>
          
          <text x="15" y="110" font-size="9" fill="#a0a0a0" font-family="JetBrains Mono">user_prompt</text>
          <text x="140" y="110" font-size="9" fill="#ff6b6b" font-family="JetBrains Mono">privacy skip</text>
          
          <line x1="15" y1="125" x2="215" y2="125" stroke="rgba(255,255,255,0.1)"/>
          <text x="15" y="135" font-size="8" fill="#7b61ff" font-family="JetBrains Mono">isEnhancedTelemetryEnabled()</text>
        </g>
        
        <!-- Parallel Request Note -->
        <g transform="translate(680, 115)">
          <rect x="0" y="0" width="200" height="60" rx="6" fill="rgba(0,212,255,0.08)" stroke="rgba(0,212,255,0.2)"/>
          <text x="12" y="22" font-size="10" font-weight="600" fill="#00d4ff" font-family="Space Grotesk">并行请求处理</text>
          <text x="12" y="38" font-size="9" fill="#a0a0a0" font-family="JetBrains Mono">endLLMRequestSpan()</text>
          <text x="12" y="52" font-size="9" fill="#fff" font-family="JetBrains Mono">显式span参数传递</text>
        </g>
      </svg>
      
      <div class="tooltip" id="tooltip">
        <div class="tooltip-title">
          <span class="tooltip-dot" id="tooltip-dot"></span>
          <span id="tooltip-name">Span Name</span>
        </div>
        <div id="tooltip-content"></div>
      </div>
    </div>
    
    <div class="legend">
      <div class="legend-item">
        <div class="legend-dot" style="background: var(--interaction);"></div>
        <span>interaction 对话根节点</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background: var(--llm-request);"></div>
        <span>llm_request API调用</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background: var(--tool);"></div>
        <span>tool 工具执行</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background: var(--blocked);"></div>
        <span>blocked_on_user 等待审批</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background: var(--execution);"></div>
        <span>execution 实际执行</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background: var(--hook); border: 1px dashed var(--hook);"></div>
        <span>hook Beta only (虚线边框)</span>
      </div>
    </div>
  </div>
</div>

<script>
const spanData = {
  interaction: {
    title: 'claude_code.interaction',
    color: '#7b61ff',
    attrs: {
      'type': 'Root Span',
      'sequence': '42 (单调递增)',
      'duration': '~30s max',
      'cleanup': '每60s清理孤儿Span'
    }
  },
  llm_request: {
    title: 'claude_code.llm_request',
    color: '#00d4ff',
    attrs: {
      'parent': 'interaction',
      'model': 'claude-4',
      'speed': 'fast/normal',
      'query_source': 'Agent名称',
      'input_tokens': '4,200',
      'output_tokens': '1,800',
      'cache_read': '+12% hit',
      'ttft_ms': '245ms (首token延迟)',
      'Beta': 'model_output, thinking_output'
    }
  },
  tool: {
    title: 'claude_code.tool',
    color: '#48bb78',
    attrs: {
      'parent': 'interaction',
      'tool_name': 'read_file',
      'children': 'blocked_on_user, execution'
    }
  },
  blocked: {
    title: 'claude_code.tool.blocked_on_user',
    color: '#ffd93d',
    attrs: {
      'decision': 'approved',
      'source': 'user_click',
      'duration_ms': '3,500',
      'status': '等待中 (闪烁)'
    }
  },
  execution: {
    title: 'claude_code.tool.execution',
    color: '#ff9f43',
    attrs: {
      'success': 'true',
      'error': 'null',
      'duration_ms': '1,200'
    }
  },
  hook: {
    title: 'claude_code.hook',
    color: '#e056a0',
    attrs: {
      'availability': 'Beta only',
      'parent': 'tool or interaction',
      'hook_event': 'pre_tool',
      'hook_name': 'validation_hook',
      'num_success': '3',
      'num_blocking': '0',
      'num_non_blocking_error': '0'
    }
  }
};

const tooltip = document.getElementById('tooltip');
const tooltipDot = document.getElementById('tooltip-dot');
const tooltipName = document.getElementById('tooltip-name');
const tooltipContent = document.getElementById('tooltip-content');

document.querySelectorAll('.span-group').forEach(group => {
  const spanType = group.dataset.span;
  const bar = group.querySelector('.span-bar');
  
  bar.addEventListener('mouseenter', (e) => {
    const data = spanData[spanType];
    if (!data) return;
    
    tooltipDot.style.background = data.color;
    tooltipName.textContent = data.title;
    tooltipContent.innerHTML = Object.entries(data.attrs)
      .map(([k, v]) => `
        <div class="tooltip-row">
          <span class="tooltip-key">${k}</span>
          <span class="tooltip-value">${v}</span>
        </div>
      `).join('');
    
    tooltip.classList.add('visible');
  });
  
  bar.addEventListener('mousemove', (e) => {
    const rect = document.querySelector('.svg-container').getBoundingClientRect();
    tooltip.style.left = (e.clientX - rect.left + 15) + 'px';
    tooltip.style.top = (e.clientY - rect.top + 15) + 'px';
  });
  
  bar.addEventListener('mouseleave', () => {
    tooltip.classList.remove('visible');
  });
  
  bar.addEventListener('click', () => {
    bar.classList.toggle('collapsed');
    const icon = group.querySelector('.expand-icon');
    if (icon) icon.classList.toggle('collapsed');
  });
});
</script>
</body>
</html>
