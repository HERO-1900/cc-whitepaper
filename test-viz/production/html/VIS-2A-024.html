<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Token 四种水价对比图 | VIS-2A-024</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oranienbaum&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg-deep:#0a0c0f;
  --bg-panel:#111418;
  --grid-line:#1a2029;
  --text-main:#e8ecf1;
  --text-dim:#7a8a9e;
  --accent-blue:#3b82f6;
  --accent-red:#ef4444;
  --accent-orange:#f97316;
  --accent-green:#22c55e;
  --accent-yellow:#eab308;
  --glow-blue:rgba(59,130,246,0.35);
  --glow-red:rgba(239,68,68,0.45);
  --glow-green:rgba(34,197,94,0.45);
  --glow-yellow:rgba(234,179,8,0.35);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg-deep);
  color: var(--text-main);
  font-family: 'Space Grotesk', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -20%, rgba(59,130,246,0.08), transparent),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(34,197,94,0.06), transparent);
}

.container {
  width: 100%;
  max-width: 1000px;
  background: var(--bg-panel);
  border: 1px solid var(--grid-line);
  border-radius: 24px;
  padding: 3rem 2.5rem;
  box-shadow: 0 32px 80px rgba(0,0,0,0.45);
  position: relative;
  overflow: hidden;
}

.container::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(59,130,246,0.4), rgba(34,197,94,0.3), transparent);
}

header {
  text-align: center;
  margin-bottom: 2.5rem;
}

.badge {
  display: inline-block;
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-dim);
  border: 1px solid var(--grid-line);
  padding: 0.35rem 0.9rem;
  border-radius: 999px;
  margin-bottom: 0.8rem;
}

h1 {
  font-family: 'Oranienbaum', serif;
  font-size: clamp(1.6rem, 4vw, 2.4rem);
  font-weight: 400;
  letter-spacing: 0.02em;
  margin-bottom: 0.4rem;
}

.subtitle {
  color: var(--text-dim);
  font-size: 0.95rem;
  font-weight: 300;
}

.chart-wrapper {
  position: relative;
  width: 100%;
  height: 420px;
}

svg {
  width: 100%;
  height: 100%;
  display: block;
}

.grid-line {
  stroke: var(--grid-line);
  stroke-width: 1;
}

.axis-text {
  fill: var(--text-dim);
  font-size: 11px;
  font-weight: 500;
}

.bar {
  cursor: pointer;
  transition: opacity 0.2s ease;
}

.bar:hover {
  opacity: 0.92;
}

.bar-label {
  fill: var(--text-main);
  font-size: 13px;
  font-weight: 600;
  text-anchor: middle;
}

.bar-sublabel {
  fill: var(--text-dim);
  font-size: 10px;
  font-weight: 500;
  text-anchor: middle;
}

.multiplier {
  font-size: 11px;
  font-weight: 700;
  text-anchor: middle;
  fill: var(--text-main);
}

.annotation {
  fill: var(--text-dim);
  font-size: 11px;
  font-weight: 500;
}

.highlight-text {
  fill: var(--accent-green);
  font-size: 12px;
  font-weight: 700;
}

.warning-text {
  fill: var(--accent-red);
  font-size: 12px;
  font-weight: 700;
}

.drop-icon {
  fill: none;
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.water-label {
  fill: var(--text-dim);
  font-size: 11px;
  font-weight: 400;
  text-anchor: middle;
}

.water-label-cn {
  fill: var(--text-main);
  font-size: 12px;
  font-weight: 500;
  text-anchor: middle;
}

.insight-box {
  margin-top: 2rem;
  padding: 1.25rem 1.5rem;
  background: rgba(34,197,94,0.06);
  border-left: 3px solid var(--accent-green);
  border-radius: 0 12px 12px 0;
}

.insight-title {
  font-size: 0.75rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent-green);
  font-weight: 600;
  margin-bottom: 0.4rem;
}

.insight-body {
  font-size: 0.95rem;
  line-height: 1.6;
  color: var(--text-main);
}

.insight-body strong {
  color: var(--accent-green);
  font-weight: 600;
}

#tooltip {
  position: absolute;
  pointer-events: none;
  opacity: 0;
  background: rgba(10,12,15,0.95);
  border: 1px solid var(--grid-line);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 12px;
  color: var(--text-main);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  backdrop-filter: blur(4px);
  transition: opacity 0.15s ease;
  max-width: 220px;
  z-index: 10;
}

#tooltip .tt-title {
  font-weight: 600;
  margin-bottom: 4px;
  font-size: 13px;
}

#tooltip .tt-row {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  margin: 2px 0;
}

#tooltip .tt-math {
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px solid var(--grid-line);
  color: var(--text-dim);
  font-size: 11px;
  line-height: 1.45;
}

.tt-highlight { color: var(--accent-green); }
.tt-warn { color: var(--accent-orange); }

@media (max-width: 640px) {
  .container { padding: 2rem 1.25rem; }
  .chart-wrapper { height: 360px; }
  .bar-label { font-size: 11px; }
  .water-label-cn { font-size: 10px; }
  .water-label { font-size: 9px; }
}
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="badge">VIS-2A-024 · Token Economics</div>
    <h1>Token 四种水价对比图</h1>
    <div class="subtitle">Claude API Opus 4.6 Pricing · 用水价类比理解缓存经济学</div>
  </header>

  <div class="chart-wrapper" id="chartWrapper">
    <svg viewBox="0 0 900 420" preserveAspectRatio="xMidYMid meet" id="mainSvg">
      <defs>
        <linearGradient id="gradInput" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#60a5fa"/>
          <stop offset="100%" stop-color="#2563eb"/>
        </linearGradient>
        <linearGradient id="gradOutput" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#fb923c"/>
          <stop offset="100%" stop-color="#dc2626"/>
        </linearGradient>
        <linearGradient id="gradCacheRead" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#4ade80"/>
          <stop offset="100%" stop-color="#16a34a"/>
        </linearGradient>
        <linearGradient id="gradCacheWrite" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#facc15"/>
          <stop offset="100%" stop-color="#ca8a04"/>
        </linearGradient>
        <filter id="glowInput" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
          <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glowOutput" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
          <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glowCacheRead" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
          <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L0,6 L9,3 z" fill="#22c55e"/>
        </marker>
      </defs>

      <!-- Grid lines -->
      <g id="grid">
        <line x1="80" y1="320" x2="820" y2="320" class="grid-line"/>
        <line x1="80" y1="260" x2="820" y2="260" class="grid-line" stroke-dasharray="4,4"/>
        <line x1="80" y1="200" x2="820" y2="200" class="grid-line" stroke-dasharray="4,4"/>
        <line x1="80" y1="140" x2="820" y2="140" class="grid-line" stroke-dasharray="4,4"/>
        <line x1="80" y1="80" x2="820" y2="80" class="grid-line" stroke-dasharray="4,4"/>
      </g>

      <!-- Y-axis labels -->
      <g id="yLabels">
        <text x="70" y="324" text-anchor="end" class="axis-text">$0</text>
        <text x="70" y="264" text-anchor="end" class="axis-text">$15</text>
        <text x="70" y="204" text-anchor="end" class="axis-text">$30</text>
        <text x="70" y="144" text-anchor="end" class="axis-text">$45</text>
        <text x="70" y="84" text-anchor="end" class="axis-text">$60</text>
        <text x="70" y="24" text-anchor="end" class="axis-text">$75</text>
      </g>

      <!-- Y-axis title -->
      <text x="30" y="170" text-anchor="middle" transform="rotate(-90,30,170)" class="axis-text" style="font-size:12px;letter-spacing:0.1em;">PRICE / 1M TOKENS</text>

      <!-- Bars with initial height 0 for animation -->
      <rect id="barInput" class="bar" x="145" y="320" width="90" height="0" rx="6" fill="url(#gradInput)" filter="url(#glowInput)" data-target-y="260" data-target-h="60"/>
      <rect id="barOutput" class="bar" x="325" y="320" width="90" height="0" rx="6" fill="url(#gradOutput)" filter="url(#glowOutput)" data-target-y="80" data-target-h="240"/>
      <rect id="barCacheRead" class="bar" x="505" y="320" width="90" height="0" rx="6" fill="url(#gradCacheRead)" filter="url(#glowCacheRead)" data-target-y="308" data-target-h="12"/>
      <rect id="barCacheWrite" class="bar" x="685" y="320" width="90" height="0" rx="6" fill="url(#gradCacheWrite)" filter="url(#glowInput)" data-target-y="245" data-target-h="75"/>

      <!-- Top labels (prices) -->
      <text id="labelInput" x="190" y="250" class="bar-label" opacity="0">$15</text>
      <text id="labelOutput" x="370" y="70" class="bar-label" opacity="0">$75</text>
      <text id="labelCacheRead" x="550" y="298" class="bar-label" opacity="0">$1.5</text>
      <text id="labelCacheWrite" x="730" y="235" class="bar-label" opacity="0">$18.75</text>

      <!-- Multipliers -->
      <text id="multInput" x="190" y="239" class="multiplier" opacity="0" fill="#93c5fd">1x 基准</text>
      <text id="multOutput" x="370" y="59" class="multiplier" opacity="0" fill="#fca5a5">5x 最贵</text>
      <text id="multCacheRead" x="550" y="287" class="multiplier" opacity="0" fill="#86efac">0.1x 最便宜</text>
      <text id="multCacheWrite" x="730" y="224" class="multiplier" opacity="0" fill="#fde047">1.25x 略贵</text>

      <!-- Warning badge on Output -->
      <g id="warnBadge" opacity="0">
        <rect x="330" y="20" width="80" height="22" rx="4" fill="rgba(239,68,68,0.15)" stroke="#ef4444" stroke-width="1"/>
        <text x="370" y="35" text-anchor="middle" class="warning-text" font-size="10">5x PREMIUM</text>
      </g>

      <!-- 10x annotation -->
      <g id="tenxAnno" opacity="0">
        <line x1="235" y1="290" x2="505" y2="290" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowGreen)"/>
        <circle cx="370" cy="290" r="22" fill="rgba(34,197,94,0.1)" stroke="#22c55e" stroke-width="1"/>
        <text x="370" y="294" text-anchor="middle" class="highlight-text" font-size="12">10x 差距</text>
      </g>

      <!-- Water drop icons -->
      <g id="drops">
        <!-- Input -->
        <g transform="translate(175,355)">
          <path class="drop-icon" stroke="#60a5fa" d="M10,0 C10,0 0,12 0,18 C0,24 4,28 10,28 C16,28 20,24 20,18 C20,12 10,0 10,0 Z"/>
          <circle cx="10" cy="16" r="3" fill="#60a5fa" opacity="0.4"/>
        </g>
        <text x="190" y="395" class="water-label-cn">自来水管网供水</text>
        <text x="190" y="410" class="water-label">Tap Water Supply</text>

        <!-- Output -->
        <g transform="translate(355,355)">
          <path class="drop-icon" stroke="#f97316" d="M10,0 C10,0 0,12 0,18 C0,24 4,28 10,28 C16,28 20,24 20,18 C20,12 10,0 10,0 Z"/>
          <circle cx="10" cy="16" r="3" fill="#f97316" opacity="0.4"/>
        </g>
        <text x="370" y="395" class="water-label-cn">净水器出水</text>
        <text x="370" y="410" class="water-label">Purified Water</text>

        <!-- Cache Read -->
        <g transform="translate(535,355)">
          <path class="drop-icon" stroke="#22c55e" d="M10,0 C10,0 0,12 0,18 C0,24 4,28 10,28 C16,28 20,24 20,18 C20,12 10,0 10,0 Z"/>
          <circle cx="10" cy="16" r="3" fill="#22c55e" opacity="0.4"/>
        </g>
        <text x="550" y="395" class="water-label-cn">回收中水</text>
        <text x="550" y="410" class="water-label">Recycled Water</text>

        <!-- Cache Write -->
        <g transform="translate(715,355)">
          <path class="drop-icon" stroke="#eab308" d="M10,0 C10,0 0,12 0,18 C0,24 4,28 10,28 C16,28 20,24 20,18 C20,12 10,0 10,0 Z"/>
          <circle cx="10" cy="16" r="3" fill="#eab308" opacity="0.4"/>
        </g>
        <text x="730" y="395" class="water-label-cn">水库建设投入</text>
        <text x="730" y="410" class="water-label">Reservoir Build</text>
      </g>

      <!-- Magnifier for Cache Read -->
      <g id="magnifier" opacity="0" transform="translate(595,302)">
        <circle cx="0" cy="0" r="18" fill="rgba(10,12,15,0.9)" stroke="#22c55e" stroke-width="1.5"/>
        <line x1="12" y1="12" x2="22" y2="22" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
        <text x="0" y="4" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="700">$1.5</text>
      </g>
    </svg>

    <div id="tooltip"></div>
  </div>

  <div class="insight-box">
    <div class="insight-title">Key Insight · 关键洞察</div>
    <div class="insight-body">
      Cache Read 比 Input 便宜 <strong>10 倍</strong>。系统提示词+工具 Schema 约 20,000–40,000 token，缓存命中后每次节省 <strong>$0.3–0.6</strong>，20 轮对话累计节省 <strong>$6–12</strong>。这就是 Claude Code 拼命追求缓存命中的经济学原理。
    </div>
  </div>
</div>

<script>
const bars = [
  { id:'barInput', price:15, mult:'1x', label:'Input Token', water:'自来水管网供水', savings:null },
  { id:'barOutput', price:75, mult:'5x', label:'Output Token', water:'净水器出水', savings:null },
  { id:'barCacheRead', price:1.5, mult:'0.1x', label:'Cache Read Token', water:'回收中水', savings:'每次节省 $0.3–0.6' },
  { id:'barCacheWrite', price:18.75, mult:'1.25x', label:'Cache Write Token', water:'水库建设投入', savings:null }
];

const tooltip = document.getElementById('tooltip');
const wrapper = document.getElementById('chartWrapper');

// Animate bars on load
window.addEventListener('DOMContentLoaded', () => {
  bars.forEach((b, i) => {
    const el = document.getElementById(b.id);
    const targetY = parseFloat(el.dataset.targetY);
    const targetH = parseFloat(el.dataset.targetH);

    setTimeout(() => {
      el.style.transition = 'all 1s cubic-bezier(0.22, 1, 0.36, 1)';
      el.setAttribute('y', targetY);
      el.setAttribute('height', targetH);
    }, 150 + i * 120);
  });

  // Fade in labels
  ['labelInput','labelOutput','labelCacheRead','labelCacheWrite'].forEach((id,i)=>{
    setTimeout(()=>{
      document.getElementById(id).style.transition='opacity 0.5s ease';
      document.getElementById(id).setAttribute('opacity','1');
    }, 600 + i*100);
  });

  ['multInput','multOutput','multCacheRead','multCacheWrite'].forEach((id,i)=>{
    setTimeout(()=>{
      document.getElementById(id).style.transition='opacity 0.5s ease';
      document.getElementById(id).setAttribute('opacity','1');
    }, 900 + i*100);
  });

  setTimeout(()=>{
    document.getElementById('warnBadge').style.transition='opacity 0.6s ease';
    document.getElementById('warnBadge').setAttribute('opacity','1');
  }, 1300);

  setTimeout(()=>{
    document.getElementById('tenxAnno').style.transition='opacity 0.8s ease';
    document.getElementById('tenxAnno').setAttribute('opacity','1');
  }, 1600);

  setTimeout(()=>{
    document.getElementById('magnifier').style.transition='opacity 0.6s ease';
    document.getElementById('magnifier').setAttribute('opacity','1');
  }, 2000);
});

// Tooltip logic
bars.forEach(b => {
  const el = document.getElementById(b.id);
  el.addEventListener('mousemove', e => {
    const rect = wrapper.getBoundingClientRect();
    const left = e.clientX - rect.left + 12;
    const top = e.clientY - rect.top - 12;

    let html = `<div class="tt-title">${b.label}</div>`;
    html += `<div class="tt-row"><span>Price</span><span>$${b.price} / 1M</span></div>`;
    html += `<div class="tt-row"><span>Ratio</span><span>${b.mult}</span></div>`;
    html += `<div class="tt-row"><span>Analogy</span><span>${b.water}</span></div>`;
    if (b.savings) {
      html += `<div class="tt-math">缓存命中后 <span class="tt-highlight">${b.savings}</span><br>20 轮对话累计 <span class="tt-highlight">节省 $6–12</span></div>`;
    } else if (b.mult === '5x') {
      html += `<div class="tt-math" style="color:#fca5a5">Output 是 Input 的 5 倍成本<br>每生成 1M token = $75</div>`;
    } else if (b.mult === '1.25x') {
      html += `<div class="tt-math" style="color:#fde047">Cache Write 是一次性前置投入<br>换取后续 0.1x 的读取成本</div>`;
    } else {
      html += `<div class="tt-math">基准成本 $15 / 1M tokens<br>与 Cache Read 有 10x 差距</div>`;
    }

    tooltip.innerHTML = html;
    tooltip.style.opacity = '1';
    tooltip.style.left = Math.min(left, rect.width - 200) + 'px';
    tooltip.style.top = Math.max(top - tooltip.offsetHeight, 0) + 'px';
  });

  el.addEventListener('mouseleave', () => {
    tooltip.style.opacity = '0';
  });
});
</script>

</body>
</html>
