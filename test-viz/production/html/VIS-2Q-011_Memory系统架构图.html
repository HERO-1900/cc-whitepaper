<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory系统架构图</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;600;700&display=swap');

:root {
--gold: #ffcc00;
--blue: #00d4ff;
--green: #00ff88;
--purple: #7b61ff;
--orange: #ff8844;
--bg-dark: #0a0e1f;
--bg-mid: #121832;
--text-main: #e8eaf6;
--text-dim: #8b92b4;
--red-line: #ff4444;
}

* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

body {
background: var(--bg-dark);
color: var(--text-main);
font-family: 'Space Grotesk', sans-serif;
min-height: 100vh;
display: flex;
justify-content: center;
align-items: center;
overflow: hidden;
position: relative;
}

.bg-grid {
position: fixed;
inset: 0;
background-image:
linear-gradient(rgba(123, 97, 255, 0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(123, 97, 255, 0.03) 1px, transparent 1px);
background-size: 50px 50px;
pointer-events: none;
}

.bg-glow {
position: fixed;
width: 600px;
height: 600px;
background: radial-gradient(circle, rgba(123, 97, 255, 0.08) 0%, transparent 70%);
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
pointer-events: none;
}

.container {
width: 1000px;
height: 650px;
position: relative;
z-index: 10;
}

svg {
width: 100%;
height: 100%;
}

.memory-index {
fill: rgba(255, 204, 0, 0.08);
stroke: var(--gold);
stroke-width: 2;
filter: drop-shadow(0 0 20px rgba(255, 204, 0, 0.15));
}

.memory-file-user { fill: rgba(0, 212, 255, 0.12); stroke: var(--blue); }
.memory-file-feedback { fill: rgba(0, 255, 136, 0.12); stroke: var(--green); }
.memory-file-project { fill: rgba(123, 97, 255, 0.12); stroke: var(--purple); }
.memory-file-reference { fill: rgba(255, 136, 68, 0.12); stroke: var(--orange); }

.truncation-line {
stroke: var(--red-line);
stroke-width: 2;
stroke-dasharray: 8,4;
opacity: 0.8;
}

.connection-line {
fill: none;
stroke: var(--text-dim);
stroke-width: 1.5;
opacity: 0.5;
stroke-dasharray: 4,2;
}

.connection-line.active {
stroke: var(--gold);
opacity: 0.7;
stroke-dasharray: none;
}

.md-content {
font-family: 'JetBrains Mono', monospace;
font-size: 11px;
fill: var(--gold);
opacity: 0.9;
}

.md-bullet { fill: var(--gold); opacity: 0.6; }
.md-bracket { fill: var(--blue); }
.md-paren { fill: var(--green); }
.md-text { fill: var(--text-dim); }

.label-main {
font-family: 'Space Grotesk', sans-serif;
font-size: 14px;
font-weight: 700;
fill: var(--text-main);
}

.label-sub {
font-family: 'JetBrains Mono', monospace;
font-size: 10px;
fill: var(--text-dim);
}

.label-cn {
font-size: 13px;
font-weight: 600;
}

.label-en {
font-size: 9px;
opacity: 0.7;
text-transform: uppercase;
letter-spacing: 1px;
}

.type-badge {
font-family: 'Space Grotesk', sans-serif;
font-size: 11px;
font-weight: 600;
}

.path-text {
font-family: 'JetBrains Mono', monospace;
font-size: 9px;
fill: var(--text-dim);
}

.limit-box {
fill: rgba(255, 68, 68, 0.08);
stroke: var(--red-line);
stroke-width: 1;
stroke-dasharray: 4,2;
}

.warning-icon {
fill: var(--red-line);
}

.exclusion-item {
fill: rgba(139, 146, 180, 0.1);
stroke: rgba(139, 146, 180, 0.3);
stroke-width: 1;
}

.exclusion-x {
fill: #ff6666;
font-family: 'Space Grotesk', sans-serif;
font-size: 10px;
font-weight: 700;
}

.injection-arrow {
fill: none;
stroke: var(--gold);
stroke-width: 2;
marker-end: url(#arrowhead);
}

.context-window {
fill: rgba(255, 204, 0, 0.05);
stroke: var(--gold);
stroke-width: 1.5;
stroke-dasharray: 6,3;
}

.token-badge {
fill: rgba(123, 97, 255, 0.2);
stroke: var(--purple);
stroke-width: 1;
}

.frontmatter-box {
fill: rgba(10, 14, 31, 0.95);
stroke: var(--text-dim);
stroke-width: 1;
opacity: 0;
transition: opacity 0.3s ease;
}

.file-group:hover .frontmatter-box {
opacity: 1;
}

.file-group {
cursor: pointer;
}

.glow-effect {
filter: drop-shadow(0 0 8px currentColor);
}

.title-main {
font-family: 'Space Grotesk', sans-serif;
font-size: 24px;
font-weight: 700;
fill: var(--text-main);
letter-spacing: -0.5px;
}

.title-sub {
font-family: 'JetBrains Mono', monospace;
font-size: 11px;
fill: var(--text-dim);
letter-spacing: 2px;
}

@keyframes pulse {
0%, 100% { opacity: 0.3; }
50% { opacity: 0.8; }
}

@keyframes dash {
to { stroke-dashoffset: -20; }
}

.animated-line {
animation: dash 2s linear infinite;
}

.pulsing {
animation: pulse 3s ease-in-out infinite;
}

.dir-tree-line {
stroke: var(--text-dim);
stroke-width: 1;
opacity: 0.4;
}

.dir-tree-branch {
stroke: var(--text-dim);
stroke-width: 1;
opacity: 0.4;
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="container">

<!-- Title -->
<text x="500" y="35" text-anchor="middle" class="title-main">Memory系统架构</text>

<!-- Truncation Line -->
<line x1="20" y1="235" x2="400" y2="235" class="truncation-line"/>
<rect x="320" y="240" width="90" height="32" rx="4" class="limit-box"/>

<polygon points="410,243 418,250 410,257" fill="#ff4444" opacity="0.8"/>
</g>

<!-- Injection Arrow -->
<path d="M 620 240 L 720 240" class="injection-arrow animated-line"/>
<text x="670" y="230" text-anchor="middle" class="label-main label-cn" fill="#ffcc00">会话启动注入</text>
<text x="670" y="260" text-anchor="middle" class="label-sub">SESSION START</text>

<!-- Context Window -->
<g transform="translate(730, 200)">
<rect x="0" y="0" width="140" height="80" rx="6" class="context-window pulsing"/>
<text x="70" y="35" text-anchor="middle" class="label-main label-cn" fill="#ffcc00">上下文窗口</text>
<text x="70" y="55" text-anchor="middle" class="label-sub">CONTEXT WINDOW</text>

<!-- Connection Lines to Memory Files -->

</div>
</body>
</html>
