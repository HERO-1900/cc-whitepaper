<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Channel Permission Relay 数据流图</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  color: #e8e8f0;
  font-family: 'Noto Sans SC', sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.container {
  width: 100%;
  max-width: 1200px;
}
svg {
  width: 100%;
  height: auto;
}
.node-rect {
  fill: rgba(30, 30, 50, 0.9);
  stroke-width: 2;
  rx: 12;
}
.node-claude { stroke: #00d4ff; }
.node-permission { stroke: #7b61ff; }
.node-channel { stroke: #ff9f43; }
.node-mobile { stroke: #48bb78; }
.flow-arrow {
  fill: none;
  stroke-width: 3;
  stroke-linecap: round;
}
.flow-forward { stroke: #00d4ff; }
.flow-return-yes { stroke: #48bb78; }
.flow-return-no { stroke: #ff6b6b; }
.node-label {
  fill: #fff;
  font-size: 14px;
  font-weight: 700;
  text-anchor: middle;
}
.node-sublabel {
  fill: #a0a0b8;
  font-size: 11px;
  text-anchor: middle;
}
.icon { fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.icon-claude { stroke: #00d4ff; }
.icon-permission { stroke: #7b61ff; }
.icon-channel { stroke: #ff9f43; }
.icon-mobile { stroke: #48bb78; }
.chat-bubble {
  fill: #2d2d44;
  stroke: #48bb78;
  stroke-width: 1;
  rx: 8;
}
.chat-text {
  fill: #e8e8f0;
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
}
.id-box {
  fill: rgba(123, 97, 255, 0.1);
  stroke: #7b61ff;
  stroke-width: 2;
  stroke-dasharray: 4,2;
  rx: 8;
}
.id-letter {
  fill: #7b61ff;
  font-size: 14px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  text-anchor: middle;
}
.warning-box {
  fill: rgba(255, 107, 107, 0.08);
  stroke: #ff6b6b;
  stroke-width: 2;
  stroke-dasharray: 6,3;
  rx: 8;
}
.warning-icon { fill: #ff6b6b; }
.warning-text { fill: #ff6b6b; font-size: 11px; }
.gate-tag {
  fill: rgba(0, 212, 255, 0.15);
  stroke: #00d4ff;
  stroke-width: 1;
  rx: 4;
}
.gate-text {
  fill: #00d4ff;
  font-size: 9px;
  font-family: 'JetBrains Mono', monospace;
  text-anchor: middle;
}
.flow-particle {
  fill: #fff;
  filter: drop-shadow(0 0 4px currentColor);
}
.tooltip {
  position: absolute;
  background: rgba(20, 20, 35, 0.98);
  border: 1px solid #7b61ff;
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 12px;
  color: #e8e8f0;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
  max-width: 280px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.tooltip.show { opacity: 1; }
.tooltip-title {
  color: #7b61ff;
  font-weight: 700;
  margin-bottom: 4px;
  font-size: 13px;
}
.anim-pulse {
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}
.flow-dot {
  fill: none;
  stroke-width: 2;
}
</style>
</head>

<script>
const alphabet = 'abcdefghjkmnpqrstuvwxyz'.split('');
const grid = document.getElementById('alphabet-grid');
if (grid) {
  let html = '';
  alphabet.forEach((letter, i) => {
    const x = (i % 5) * 35;
    const y = Math.floor(i / 5) * 35;
    html += `<rect x="${x}" y="${y}" width="30" height="30" fill="rgba(123,97,255,0.1)" stroke="#7b61ff" stroke-width="1" rx="4"/>
             <text x="${x+15}" y="${y+22}" class="id-letter">${letter}</text>`;
  });
  html += `<rect x="75" y="70" width="30" height="30" fill="rgba(255,107,107,0.2)" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="3,2" rx="4"/>
           <text x="90" y="92" text-anchor="middle" fill="#ff6b6b" font-size="14" style="text-decoration: line-through;">l</text>`;
  grid.innerHTML = html;
}

const stepInfo = {
  1: { title: "1. Claude 触发权限请求", desc: "执行敏感工具时弹出权限请求 / Permission request triggered when executing sensitive tools" },
  2: { title: "2. channelPermissions 检测", desc: "检测是否有活跃 Channel / Check for active channel connection" },
  3: { title: "3. 通过 MCP 发送权限提示", desc: "将权限请求发送到 Channel Server / Send permission prompt via MCP protocol" },
  4: { title: "4. 用户手机接收请求", desc: "用户收到消息并回复 'yes <5字母ID>' / User receives and replies with approval code" }
};

const tooltip = document.getElementById('tooltip');
document.querySelectorAll('.node-group').forEach(node => {
  node.addEventListener('mouseenter', (e) => {
    const step = node.dataset.step;
    if (stepInfo[step]) {
      tooltip.querySelector('.tooltip-title').textContent = stepInfo[step].title;
      tooltip.querySelector('.tooltip-desc').textContent = stepInfo[step].desc;
      tooltip.classList.add('show');
    }
  });
  node.addEventListener('mousemove', (e) => {
    tooltip.style.left = e.pageX + 15 + 'px';
    tooltip.style.top = e.pageY + 15 + 'px';
  });
  node.addEventListener('mouseleave', () => {
    tooltip.classList.remove('show');
  });
});
</script>
</body>
</html>
