<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLAUDE.md 多层级搜索链路图</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #e8e8f0;
        }
        
        .container {
            width: 100%;
            max-width: 1200px;
            position: relative;
        }
        
        .title {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .title h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(90deg, #7b61ff, #00d4ff, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }
        
        .title p {
            font-size: 12px;
            color: #8b8ba7;
            margin-top: 8px;
            font-family: 'JetBrains Mono', monospace;
        }
        
        svg {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 0 40px rgba(123, 97, 255, 0.15));
        }
        
        .node-rect {
            stroke-width: 2;
            transition: all 0.3s ease;
        }
        
        .node-rect:hover {
            filter: brightness(1.2);
            transform: scale(1.02);
        }
        
        .node-text {
            font-size: 13px;
            font-weight: 500;
            fill: #1a1a2e;
        }
        
        .node-subtext {
            font-size: 10px;
            fill: #4a4a6a;
            font-family: 'JetBrains Mono', monospace;
        }
        
        .trust-badge {
            font-size: 9px;
            font-weight: 700;
            text-anchor: middle;
            fill: #1a1a2e;
        }
        
        .arrow-path {
            stroke-width: 2;
            stroke-linecap: round;
            fill: none;
        }
        
        .flow-dot {
            fill: #fff;
            filter: drop-shadow(0 0 4px currentColor);
        }
        
        .monorepo-text {
            font-size: 11px;
            fill: #a0a0b8;
            font-family: 'JetBrains Mono', monospace;
        }
        
        .monorepo-line {
            stroke: #3a3a5c;
            stroke-width: 1;
        }
        
        .brace-path {
            fill: none;
            stroke: #ffd93d;
            stroke-width: 3;
            stroke-linecap: round;
        }
        
        .result-text {
            font-size: 14px;
            font-weight: 700;
            fill: #ffd93d;
        }
        
        .result-subtext {
            font-size: 10px;
            fill: #8b8ba7;
        }
        
        .info-tooltip {
            position: absolute;
            background: rgba(26, 26, 46, 0.95);
            border: 1px solid rgba(123, 97, 255, 0.3);
            border-radius: 12px;
            padding: 16px;
            max-width: 320px;
            font-size: 12px;
            line-height: 1.6;
            color: #c0c0d8;
            backdrop-filter: blur(10px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            z-index: 100;
        }
        
        .info-tooltip.visible {
            opacity: 1;
        }
        
        .info-tooltip h4 {
            color: #ffd93d;
            margin-bottom: 8px;
            font-size: 13px;
        }
        
        .info-tooltip code {
            background: rgba(123, 97, 255, 0.2);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            color: #7b61ff;
        }
        
        .rule-file {
            font-size: 9px;
            fill: #1a1a2e;
            font-weight: 500;
        }
        
        .legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            gap: 20px;
            font-size: 11px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 2px;
        }
        
        @keyframes flow {
            0% { offset-distance: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { offset-distance: 100%; opacity: 0; }
        }
        
        .animate-flow {
            animation: flow 2s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">
            <h1>CLAUDE.md 多层级搜索链路图</h1>
            <p>Multi-Level Search Path for CLAUDE.md Configuration</p>
        </div>
        
        <svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="grad-global" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#7b61ff"/>
                    <stop offset="100%" stop-color="#9d7bff"/>
                </linearGradient>
                <linearGradient id="grad-project" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#00d4ff"/>
                    <stop offset="100%" stop-color="#4de8ff"/>
                </linearGradient>
                <linearGradient id="grad-rules" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#48bb78"/>
                    <stop offset="100%" stop-color="#68d391"/>
                </linearGradient>
                <linearGradient id="grad-intermediate" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#ffd93d"/>
                    <stop offset="100%" stop-color="#ffe066"/>
                </linearGradient>
                <linearGradient id="grad-local" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#ff9f43"/>
                    <stop offset="100%" stop-color="#ffb366"/>
                </linearGradient>
                
                <filter id="glow-purple">
                    <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                    <feMerge>
                        <feMergeNode in="coloredBlur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
                
                <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                    <polygon points="0 0, 10 3, 0 6" fill="#4a4a6a"/>
                </marker>
            </defs>
            
            <!-- Background grid -->
            <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2a2a4a" stroke-width="0.5" opacity="0.3"/>
            </pattern>
            <rect width="1000" height="700" fill="url(#grid)"/>
            
            <!-- Title area -->
            <text x="300" y="40" text-anchor="middle" font-size="16" font-weight="700" fill="#e8e8f0">搜索路径 (Search Order)</text>
            <text x="750" y="40" text-anchor="middle" font-size="16" font-weight="700" fill="#e8e8f0">Monorepo 示例</text>
            
            <!-- Level 1: Global -->
            <g class="node-group" data-info="global">
                <rect class="node-rect" x="100" y="70" width="400" height="55" rx="12" fill="url(#grad-global)" filter="url(#glow-purple)"/>
                <text x="125" y="95" class="node-text">~/.claude/CLAUDE.md</text>
                <text x="125" y="112" class="node-subtext">User Global Configuration</text>
                <text x="470" y="105" class="trust-badge">完全信任</text>
                <rect x="435" y="95" width="70" height="20" rx="4" fill="#48bb78" opacity="0.9"/>
                <text x="470" y="108" class="trust-badge" fill="#fff">FULL TRUST</text>
            </g>
            
            <!-- Arrow 1 -->
            <path d="M 300 125 L 300 155" class="arrow-path" stroke="#4a4a6a" marker-end="url(#arrowhead)"/>
            
            <!-- Level 2: Project Root -->
            <g class="node-group" data-info="project">
                <rect class="node-rect" x="100" y="165" width="400" height="55" rx="12" fill="url(#grad-project)"/>
                <text x="125" y="190" class="node-text">&lt;git-root&gt;/CLAUDE.md</text>
                <text x="125" y="207" class="node-subtext">Project Root Configuration</text>
                <rect x="435" y="190" width="70" height="20" rx="4" fill="#ffd93d" opacity="0.9"/>
                <text x="470" y="203" class="trust-badge" fill="#1a1a2e">LIMITED</text>
            </g>
            
            <!-- Arrow 2 -->
            <path d="M 300 220 L 300 250" class="arrow-path" stroke="#4a4a6a" marker-end="url(#arrowhead)"/>
            
            <!-- Level 3: .claude/rules/ -->
            <g class="node-group" data-info="rules">
                <rect class="node-rect" x="100" y="260" width="400" height="55" rx="12" fill="url(#grad-rules)"/>
                <text x="125" y="285" class="node-text">&lt;git-root&gt;/.claude/CLAUDE.md</text>
                <text x="125" y="302" class="node-subtext">Project .claude Directory</text>
                <rect x="435" y="285" width="70" height="20" rx="4" fill="#ff6b6b" opacity="0.9"/>
                <text x="470" y="298" class="trust-badge" fill="#fff">UNTRUSTED</text>
            </g>
            
            <!-- Rules Fan -->
            <g transform="translate(520, 287)">
                <rect x="0" y="-20" width="90" height="18" rx="6" fill="#68d391"/>
                <text x="45" y="-8" text-anchor="middle" class="rule-file">coding-style.md</text>
                <rect x="5" y="2" width="100" height="18" rx="6" fill="#68d391"/>
                <text x="55" y="14" text-anchor="middle" class="rule-file">testing-policy.md</text>
                <rect x="10" y="24" width="105" height="18" rx="6" fill="#68d391"/>
                <text x="62" y="36" text-anchor="middle" class="rule-file">security-rules.md</text>
                <rect x="15" y="46" width="110" height="18" rx="6" fill="#68d391"/>
                <text x="70" y="58" text-anchor="middle" class="rule-file">deploy-checklist.md</text>
            </g>
            
            <!-- Arrow 3 -->
            <path d="M 300 315 L 300 345" class="arrow-path" stroke="#4a4a6a" marker-end="url(#arrowhead)"/>
            
            <!-- Level 4: Rules Directory -->
            <g class="node-group" data-info="rules-dir">
                <rect class="node-rect" x="100" y="360" width="400" height="40" rx="12" fill="url(#grad-rules)"/>
                <text x="125" y="385" class="node-text">.claude/rules/*.md (按字母序加载)</text>
            </g>
            
            <!-- Arrow 4 -->
            <path d="M 300 400 L 300 430" class="arrow-path" stroke="#4a4a6a" marker-end="url(#arrowhead)"/>
            
            <!-- Level 5: Intermediate Layers -->
            <g class="node-group" data-info="intermediate">
                <rect class="node-rect" x="100" y="445" width="400" height="55" rx="12" fill="url(#grad-intermediate)"/>
                <text x="125" y="470" class="node-text">中间目录层 CLAUDE.md</text>
                <text x="125" y="487" class="node-subtext">Monorepo Sub-package Layers</text>
                <rect x="435" y="470" width="70" height="20" rx="4" fill="#ffd93d" opacity="0.9"/>
                <text x="470" y="483" class="trust-badge" fill="#1a1a2e">LIMITED</text>
            </g>
            
            <!-- Arrow 5 -->
            <path d="M 300 500 L 300 530" class="arrow-path" stroke="#4a4a6a" marker-end="url(#arrowhead)"/>
            
            <!-- Level 6: Current Directory -->
            <g class="node-group" data-info="local">
                <rect class="node-rect" x="100" y="540" width="400" height="55" rx="12" fill="url(#grad-local)"/>
                <text x="125" y="565" class="node-text">&lt;cwd&gt;/CLAUDE.md</text>
                <text x="125" y="582" class="node-subtext">Current Working Directory (Most Specific)</text>
                <rect x="435" y="565" width="70" height="20" rx="4" fill="#48bb78" opacity="0.9"/>
                <text x="470" y="578" class="trust-badge" fill="#fff">FULL TRUST</text>
            </g>
            
            <!-- Large Brace -->
            <path class="brace-path" d="M 520 97 Q 560 97 560 130 L 560 570 Q 560 603 600 603"/>
            <text x="620" y="590" class="result-text">系统提示注入</text>
            <text x="620" y="610" class="result-subtext">System Prompt Injection</text>
            <text x="620" y="628" class="result-subtext" fill="#ffd93d">全部拼接 · 非覆盖 · Concatenate All</text>
            
            <!-- Search Direction Label -->
            <text x="300" y="660" text-anchor="middle" font-size="11" fill="#8b8ba7">
                搜索方向: 从根目录向下 → Search Direction: Root → CWD
            </text>
            
            <!-- Monorepo Example Tree -->
            <g transform="translate(680, 80)">
                <rect x="-20" y="-10" width="280" height="580" rx="8" fill="#1a1a2e" stroke="#3a3a5c" stroke-width="1"/>
                
                <text x="120" y="15" text-anchor="middle" font-size="12" font-weight="700" fill="#00d4ff">Monorepo Directory Tree</text>
                
                <!-- Tree lines -->
                <line x1="20" y1="40" x2="20" y2="540" class="monorepo-line"/>
                <line x1="20" y1="40" x2="40" y2="40" class="monorepo-line"/>
                
                <!-- Root -->
                <text x="45" y="45" class="monorepo-text" fill="#00d4ff">📁 &lt;git-root&gt;/</text>
                <text x="170" y="45" class="monorepo-text" fill="#48bb78">✓ CLAUDE.md</text>
                
                <!-- packages -->
                <line x1="20" y1="40" x2="20" y2="120" class="monorepo-line"/>
                <line x1="20" y1="70" x2="40" y2="70" class="monorepo-line"/>
                <text x="45" y="75" class="monorepo-text">📁 packages/</text>
                
                <line x1="40" y1="70" x2="40" y2="220" class="monorepo-line"/>
                <line x1="40" y1="100" x2="60" y2="100" class="monorepo-line"/>
                <text x="65" y="105" class="monorepo-text" fill="#ffd93d">📁 frontend/</text>
                <text x="190" y="105" class="monorepo-text" fill="#48bb78">✓ CLAUDE.md</text>
                
                <line x1="60" y1="100" x2="60" y2="180" class="monorepo-line"/>
                <line x1="60" y1="130" x2="80" y2="130" class="monorepo-line"/>
                <text x="85" y="135" class="monorepo-text">📁 src/</text>
                <text x="190" y="135" class="monorepo-text" fill="#48bb78">✓ CLAUDE.md</text>
                
                <line x1="60" y1="160" x2="80" y2="160" class="monorepo-line"/>
                <text x="85" y="165" class="monorepo-text">📄 components/</text>
                
                <line x1="40" y1="190" x2="60" y2="190" class="monorepo-line"/>
                <text x="65" y="195" class="monorepo-text">📁 backend/</text>
                
                <!-- .claude/rules -->
                <line x1="20" y1="250" x2="40" y2="250" class="monorepo-line"/>
                <text x="45" y="255" class="monorepo-text" fill="#48bb78">📁 .claude/</text>
                
                <line x1="40" y1="250" x2="40" y2="380" class="monorepo-line"/>
                <line x1="40" y1="280" x2="60" y2="280" class="monorepo-line"/>
                <text x="65" y="285" class="monorepo-text" fill="#48bb78">📁 rules/</text>
                
                <line x1="60" y1="280" x2="60" y2="370" class="monorepo-line"/>
                <text x="70" y="305" class="monorepo-text" fill="#68d391">└ coding-style.md</text>
                <text x="70" y="325" class="monorepo-text" fill="#68d391">└ testing-policy.md</text>
                <text x="70" y="345" class="monorepo-text" fill="#68d391">└ security-rules.md</text>
                <text x="70" y="365" class="monorepo-text" fill="#68d391">└ deploy-checklist.md</text>
                
                <!-- Legend for monorepo -->
                <text x="120" y="420" text-anchor="middle" font-size="10" font-weight="700" fill="#8b8ba7">继承链 (Inheritance)</text>
                <text x="20" y="445" class="monorepo-text" fill="#ffd93d">子包规范继承项目根</text>
                <text x="20" y="465" class="monorepo-text">packages/frontend/src/</text>
                <text x="20" y="480" class="monorepo-text"> └ 合并 6 层指令</text>
                
                <!-- Hot reload note -->
                <rect x="10" y="510" width="220" height="55" rx="6" fill="#2a2a4a" stroke="#7b61ff" stroke-width="1"/>
                <text x="120" y="530" text-anchor="middle" font-size="10" font-weight="700" fill="#7b61ff">热更新 (Hot Reload)</text>
                <text x="120" y="548" text-anchor="middle" font-size="9" fill="#a0a0b8">下一轮对话检测变更</text>
                <text x="120" y="562" text-anchor="middle" font-size="9" fill="#a0a0b8">Cache失效 → 重新加载</text>
            </g>
            
            <!-- Flow animation dots -->
            <circle r="4" fill="#fff" filter="url(#glow-purple)">
                <animateMotion dur="2s" repeatCount="indefinite" path="M 300 125 L 300 155"/>
            </circle>
            <circle r="4" fill="#fff" filter="url(#glow-purple)">
                <animateMotion dur="2s" begin="0.3s" repeatCount="indefinite" path="M 300 220 L 300 250"/>
            </circle>
            <circle r="4" fill="#fff" filter="url(#glow-purple)">
                <animateMotion dur="2s" begin="0.6s" repeatCount="indefinite" path="M 300 315 L 300 345"/>
            </circle>
            <circle r="4" fill="#fff" filter="url(#glow-purple)">
                <animateMotion dur="2s" begin="0.9s" repeatCount="indefinite" path="M 300 400 L 300 430"/>
            </circle>
            <circle r="4" fill="#fff" filter="url(#glow-purple)">
                <animateMotion dur="2s" begin="1.2s" repeatCount="indefinite" path="M 300 500 L 300 530"/>
            </circle>
        </svg>
        
        <div class="legend">
            <div class="legend-item">
                <div class="legend-dot" style="background: #48bb78;"></div>
                <span>完全信任 Full Trust</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background: #ffd93d;"></div>
                <span>受限信任 Limited</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background: #ff6b6b;"></div>
                <span>不信任 Untrusted</span>
            </div>
        </div>
        
        <div class="info-tooltip" id="tooltip"></div>
    </div>
    
    <script>
        const tooltipData = {
            'global': {
                title: '~/.claude/CLAUDE.md',
                content: '用户全局配置，最先加载。<code>~</code> 为用户主目录。此文件包含完全受信任的指令，应用于所有项目。'
            },
            'project': {
                title: '&lt;git-root&gt;/CLAUDE.md',
                content: '项目根目录配置。Git 仓库的根目录下的 CLAUDE.md，包含项目级通用规范。信任级别：受限。'
            },
            'rules': {
                title: '.claude/CLAUDE.md',
                content: '项目 .claude 目录下的配置。位于项目根目录的 .claude/ 文件夹内。信任级别：不信任（企业审计环境）。'
            },
            'rules-dir': {
                title: '.claude/rules/*.md',
                content: '规则目录中的所有 .md 文件按字母顺序自动加载。用于拆分不同领域的规范：代码风格、测试策略、安全规则等。'
            },
            'intermediate': {
                title: '中间目录层',
                content: '从 git-root 到 cwd 路径上的每一层目录。在 monorepo 场景中，子包可以继承并扩展项目根的规范。'
            },
            'local': {
                title: '&lt;cwd&gt;/CLAUDE.md',
                content: '当前工作目录的配置。最具体的规范，最后加载，优先级最高。Claude 会优先使用更局部的上下文。'
            }
        };
        
        const tooltip = document.getElementById('tooltip');
        const nodes = document.querySelectorAll('.node-group');
        
        nodes.forEach(node => {
            node.addEventListener('mouseenter', (e) => {
                const info = tooltipData[node.dataset.info];
                if (info) {
                    tooltip.innerHTML = `<h4>${info.title}</h4><p>${info.content}</p>`;
                    tooltip.classList.add('visible');
                }
            });
            
            node.addEventListener('mousemove', (e) => {
                tooltip.style.left = (e.pageX + 15) + 'px';
                tooltip.style.top = (e.pageY + 15) + 'px';
            });
            
            node.addEventListener('mouseleave', () => {
                tooltip.classList.remove('visible');
            });
        });
    </script>
</body>
</html>
