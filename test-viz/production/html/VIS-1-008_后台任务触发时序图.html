<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台任务触发时序图</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0e1a 0%, #121829 50%, #0d1220 100%);
            min-height: 100vh;
            font-family: 'Exo 2', sans-serif;
            color: #e2e8f0;
            overflow-x: auto;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(90deg, #00d4ff 0%, #7b61ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .header p {
            color: #64748b;
            font-size: 14px;
            font-weight: 300;
        }

        .chart-container {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 16px;
            border: 1px solid rgba(100, 116, 139, 0.2);
            padding: 30px;
            position: relative;
            backdrop-filter: blur(10px);
        }

        .chart-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.3), transparent);
        }

        svg {
            width: 100%;
            height: auto;
            display: block;
        }

        .grid-line {
            stroke: rgba(100, 116, 139, 0.15);
            stroke-width: 1;
        }

        .main-loop {
            fill: #00d4ff;
            filter: drop-shadow(0 0 12px rgba(0, 212, 255, 0.4));
        }

        .task-speculative {
            fill: #48bb78;
            stroke: #48bb78;
            stroke-dasharray: 6,4;
            fill-opacity: 0.25;
            filter: drop-shadow(0 0 8px rgba(72, 187, 120, 0.3));
        }

        .task-compaction {
            fill: #ffa500;
            fill-opacity: 0.3;
            filter: drop-shadow(0 0 8px rgba(255, 165, 0, 0.3));
        }

        .task-memory {
            fill: #7b61ff;
            fill-opacity: 0.3;
            filter: drop-shadow(0 0 8px rgba(123, 97, 255, 0.3));
        }

        .task-magicdocs {
            fill: #e88dff;
            fill-opacity: 0.3;
            filter: drop-shadow(0 0 8px rgba(232, 141, 255, 0.3));
        }

        .task-prefetch {
            fill: #a0aec0;
            fill-opacity: 0.25;
            filter: drop-shadow(0 0 8px rgba(160, 174, 192, 0.2));
        }

        .idle-highlight {
            fill: rgba(255, 255, 255, 0.06);
        }

        .blocking-line {
            stroke: #ef4444;
            stroke-width: 2;
            stroke-dasharray: 4,2;
            filter: drop-shadow(0 0 6px rgba(239, 68, 68, 0.6));
        }

        .trigger-arrow {
            stroke: rgba(226, 232, 240, 0.5);
            stroke-width: 1.5;
            stroke-dasharray: 3,2;
            marker-end: url(#arrowhead);
        }

        .lane-label {
            font-family: 'Exo 2', sans-serif;
            font-size: 12px;
            font-weight: 500;
            fill: #94a3b8;
            text-anchor: end;
        }

        .task-label {
            font-family: 'Exo 2', sans-serif;
            font-size: 11px;
            font-weight: 500;
            fill: #e2e8f0;
            dominant-baseline: middle;
        }

        .task-label-small {
            font-family: 'Exo 2', sans-serif;
            font-size: 9px;
            font-weight: 400;
            fill: #64748b;
            dominant-baseline: middle;
        }

        .time-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            fill: #475569;
            text-anchor: middle;
        }

        .event-dot {
            fill: #00d4ff;
            filter: drop-shadow(0 0 6px rgba(0, 212, 255, 0.8));
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(100, 116, 139, 0.2);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #94a3b8;
        }

        .legend-box {
            width: 16px;
            height: 12px;
            border-radius: 2px;
        }

        .legend-box.main { background: #00d4ff; }
        .legend-box.speculative { 
            background: rgba(72, 187, 120, 0.3); 
            border: 1px dashed #48bb78;
        }
        .legend-box.compaction { background: rgba(255, 165, 0, 0.3); }
        .legend-box.memory { background: rgba(123, 97, 255, 0.3); }
        .legend-box.magicdocs { background: rgba(232, 141, 255, 0.3); }
        .legend-box.prefetch { background: rgba(160, 174, 192, 0.3); }

        .tooltip {
            position: absolute;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(100, 116, 139, 0.3);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 12px;
            color: #e2e8f0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            max-width: 280px;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .tooltip-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            font-weight: 500;
            margin-bottom: 6px;
            color: #00d4ff;
        }

        .tooltip-row {
            margin: 4px 0;
            line-height: 1.5;
        }

        .tooltip-label {
            color: #64748b;
            font-size: 10px;
        }

        .task-group {
            cursor: pointer;
        }

        .task-group:hover rect {
            fill-opacity: 0.5;
            filter: drop-shadow(0 0 15px currentColor);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .pulse {
            animation: pulse 2s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Background Task Timing Sequence</h1>
            <p>后台任务触发时序图 · 并行执行与主循环协调机制</p>
        </div>

        <div class="chart-container">
            <svg viewBox="0 0 1100 520" preserveAspectRatio="xMidYMid meet">
                <defs>
                    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                        <polygon points="0 0, 10 3.5, 0 7" fill="rgba(226, 232, 240, 0.5)"/>
                    </marker>
                    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.9" />
                        <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0.6" />
                    </linearGradient>
                </defs>

                <!-- Grid Lines -->
                <g class="grid">
                    <line class="grid-line" x1="120" y1="80" x2="1050" y2="80"/>
                    <line class="grid-line" x1="120" y1="140" x2="1050" y2="140"/>
                    <line class="grid-line" x1="120" y1="200" x2="1050" y2="200"/>
                    <line class="grid-line" x1="120" y1="260" x2="1050" y2="260"/>
                    <line class="grid-line" x1="120" y1="320" x2="1050" y2="320"/>
                    <line class="grid-line" x1="120" y1="380" x2="1050" y2="380"/>
                </g>

                <!-- Time Axis -->
                <line x1="120" y1="440" x2="1050" y2="440" stroke="rgba(100,116,139,0.3)" stroke-width="2"/>
                <g class="time-marks">
                    <text class="time-label" x="120" y="460">t0</text>
                    <text class="time-label" x="305" y="460">t1</text>
                    <text class="time-label" x="490" y="460">t2</text>
                    <text class="time-label" x="675" y="460">t3</text>
                    <text class="time-label" x="860" y="460">t4</text>
                    <text class="time-label" x="1050" y="460">t5</text>
                </g>

                <!-- Idle Periods Highlight -->
                <rect class="idle-highlight" x="305" y="70" width="185" height="330"/>
                <rect class="idle-highlight" x="675" y="70" width="185" height="330"/>

                <!-- Lane Labels -->
                <g class="labels">
                    <text class="lane-label" x="110" y="105">Main Loop</text>
                    <text class="lane-label" x="110" y="105" dy="-12" style="font-size:9px;fill:#64748b">主循环</text>
                    
                    <text class="lane-label" x="110" y="165">Speculative</text>
                    <text class="lane-label" x="110" y="165" dy="-12" style="font-size:9px;fill:#64748b">投机执行</text>
                    
                    <text class="lane-label" x="110" y="225">Compaction</text>
                    <text class="lane-label" x="110" y="225" dy="-12" style="font-size:9px;fill:#64748b">上下文压缩</text>
                    
                    <text class="lane-label" x="110" y="285">Memory</text>
                    <text class="lane-label" x="110" y="285" dy="-12" style="font-size:9px;fill:#64748b">记忆整理</text>
                    
                    <text class="lane-label" x="110" y="345">MagicDocs</text>
                    <text class="lane-label" x="110" y="345" dy="-12" style="font-size:9px;fill:#64748b">文档维护</text>
                    
                    <text class="lane-label" x="110" y="405">Prefetch</text>
                    <text class="lane-label" x="110" y="405" dy="-12" style="font-size:9px;fill:#64748b">延迟预取</text>
                </g>

                <!-- Main Query Loop -->
                <g class="task-group" data-task="main">
                    <rect class="main-loop" x="120" y="85" width="930" height="40" rx="4" fill="url(#mainGradient)"/>
                    <text class="task-label" x="140" y="105" fill="#0f172a">QueryEngine Main Loop</text>
                    
                    <!-- Event Markers -->
                    <circle class="event-dot" cx="120" cy="105" r="5"/>
                    <circle class="event-dot" cx="305" cy="105" r="5"/>
                    <circle class="event-dot" cx="490" cy="105" r="5"/>
                    <circle class="event-dot" cx="675" cy="105" r="5"/>
                    <circle class="event-dot" cx="860" cy="105" r="5"/>
                    <circle class="event-dot" cx="1050" cy="105" r="5"/>
                </g>

                <!-- Speculative Execution -->
                <g class="task-group" data-task="speculative">
                    <rect class="task-speculative" x="330" y="145" width="130" height="30" rx="3"/>
                    <rect class="task-speculative" x="700" y="145" width="130" height="30" rx="3"/>
                    <text class="task-label" x="340" y="162" fill="#48bb78">Speculative</text>
                    <text class="task-label-small" x="340" y="172">Predict & Pre-read</text>
                </g>

                <!-- Context Compaction -->
                <g class="task-group" data-task="compaction">
                    <rect class="task-compaction" x="510" y="205" width="80" height="30" rx="3"/>
                    <text class="task-label" x="520" y="222" fill="#ffa500">Compaction</text>
                    
                    <!-- Blocking Lines -->
                    <line class="blocking-line" x1="510" y1="125" x2="510" y2="205"/>
                    <line class="blocking-line" x1="590" y1="125" x2="590" y2="205"/>
                    
                    <!-- Blocking Markers on Main Loop -->
                    <rect x="508" y="85" width="4" height="40" fill="#ef4444" opacity="0.8"/>
                    <rect x="588" y="85" width="4" height="40" fill="#ef4444" opacity="0.8"/>
                </g>

                <!-- Memory Dream -->
                <g class="task-group" data-task="memory">
                    <rect class="task-memory" x="920" y="265" width="110" height="30" rx="3"/>
                    <text class="task-label" x="930" y="282" fill="#7b61ff">Memory Dream</text>
                    <text class="task-label-small" x="930" y="292">Save to CLAUDE.md</text>
                </g>

                <!-- MagicDocs -->
                <g class="task-group" data-task="magicdocs">
                    <rect class="task-magicdocs" x="350" y="325" width="60" height="30" rx="3"/>
                    <rect class="task-magicdocs" x="750" y="325" width="60" height="30" rx="3"/>
                    <text class="task-label" x="358" y="342" fill="#e88dff" font-size="9">MagicDocs</text>
                </g>

                <!-- Deferred Prefetch -->
                <g class="task-group" data-task="prefetch">
                    <rect class="task-prefetch" x="140" y="385" width="120" height="30" rx="3"/>
                    <text class="task-label" x="150" y="402" fill="#a0aec0">Deferred Prefetch</text>
                    <text class="task-label-small" x="150" y="412">OAuth / Config</text>
                </g>

                <!-- Trigger Arrows -->
                <g class="triggers">
                    <path class="trigger-arrow" d="M 305 125 Q 305 135 330 145"/>
                    <path class="trigger-arrow" d="M 490 125 Q 490 165 510 205"/>
                    <path class="trigger-arrow" d="M 675 125 Q 675 135 700 145"/>
                    <path class="trigger-arrow" d="M 860 125 Q 860 195 920 265"/>
                    <path class="trigger-arrow" d="M 120 125 Q 120 255 140 385"/>
                </g>

                <!-- Token Limit Indicator -->
                <g>
                    <text x="550" y="175" font-size="9" fill="#ffa500" text-anchor="middle" opacity="0.8">token > softLimit</text>
                    <line x1="550" y1="180" x2="550" y2="205" stroke="#ffa500" stroke-width="1" stroke-dasharray="2,2"/>
                </g>

                <!-- Session End Indicator -->
                <g>
                    <line x1="975" y1="70" x2="975" y2="440" stroke="#7b61ff" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
                    <text x="975" y="65" font-size="10" fill="#7b61ff" text-anchor="middle">Session End</text>
                </g>
            </svg>

            <div class="legend">
                <div class="legend-item">
                    <div class="legend-box main"></div>
                    <span>主循环 Main Loop</span>
                </div>
                <div class="legend-item">
                    <div class="legend-box speculative"></div>
                    <span>投机执行 (空闲期·可取消)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-box compaction"></div>
                    <span>上下文压缩 (阻塞)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-box memory"></div>
                    <span>记忆整理 Memory Dream</span>
                </div>
                <div class="legend-item">
                    <div class="legend-box magicdocs"></div>
                    <span>MagicDocs 自动维护</span>
                </div>
                <div class="legend-item">
                    <div class="legend-box prefetch"></div>
                    <span>延迟预取 Deferred Prefetch</span>
                </div>
            </div>
        </div>

        <div class="tooltip" id="tooltip">
            <div class="tooltip-title" id="tooltip-title"></div>
            <div id="tooltip-content"></div>
        </div>
    </div>

    <script>
        const taskData = {
            main: {
                title: 'QueryEngine 主循环',
                content: '<div class="tooltip-row"><span class="tooltip-label">类型:</span> 核心同步循环</div><div class="tooltip-row"><span class="tooltip-label">流程:</span> User → AI → Tool → AI → ...</div><div class="tooltip-row"><span class="tooltip-label">说明:</span> 用户对话的主执行路径，处理所有同步请求</div>'
            },
            speculative: {
                title: '投机执行 Speculative Execution',
                content: '<div class="tooltip-row"><span class="tooltip-label">触发:</span> 用户空闲期间 (打字间隙)</div><div class="tooltip-row"><span class="tooltip-label">行为:</span> 预测用户下一步，提前执行只读操作</div><div class="tooltip-row"><span class="tooltip-label">结果:</span> 若预测正确直接使用缓存，若用户输入变化则取消</div><div class="tooltip-row"><span class="tooltip-label">特性:</span> 虚线表示可取消，零成本试错</div>'
            },
            compaction: {
                title: '上下文压缩 Context Compaction',
                content: '<div class="tooltip-row"><span class="tooltip-label">触发:</span> token 使用量超过 softLimit</div><div class="tooltip-row"><span class="tooltip-label">行为:</span> 六套由轻到重的压缩机制依次启动</div><div class="tooltip-row"><span class="tooltip-label">影响:</span> <span style="color:#ef4444">阻塞主循环</span>，在API调用前执行</div><div class="tooltip-row"><span class="tooltip-label">冲突:</span> 可能破坏 Prompt Cache</div>'
            },
            memory: {
                title: '记忆整理 Memory / Dream',
                content: '<div class="tooltip-row"><span class="tooltip-label">触发:</span> 会话结束或空闲超时</div><div class="tooltip-row"><span class="tooltip-label">行为:</span> AI总结对话要点，异步执行不阻塞</div><div class="tooltip-row"><span class="tooltip-label">输出:</span> 写入 CLAUDE.md 或 memory 文件</div><div class="tooltip-row"><span class="tooltip-label">类型:</span> dream 任务 (Agent 编排的一种)</div>'
            },
            magicdocs: {
                title: 'MagicDocs 自动维护',
                content: '<div class="tooltip-row"><span class="tooltip-label">触发:</span> 检测到文档需要更新</div><div class="tooltip-row"><span class="tooltip-label">行为:</span> 后台自动更新项目文档</div><div class="tooltip-row"><span class="tooltip-label">时机:</span> 间歇性触发，低优先级</div>'
            },
            prefetch: {
                title: '延迟预取 Deferred Prefetch',
                content: '<div class="tooltip-row"><span class="tooltip-label">触发:</span> 启动完成后延迟启动</div><div class="tooltip-row"><span class="tooltip-label">行为:</span> 预取 OAuth token、远程配置等</div><div class="tooltip-row"><span class="tooltip-label">目的:</span> 加速后续操作，不影响启动时间</div>'
            }
        };

        const tooltip = document.getElementById('tooltip');
        const tooltipTitle = document.getElementById('tooltip-title');
        const tooltipContent = document.getElementById('tooltip-content');
        const taskGroups = document.querySelectorAll('.task-group');

        taskGroups.forEach(group => {
            group.addEventListener('mouseenter', (e) => {
                const task = group.dataset.task;
                if (taskData[task]) {
                    tooltipTitle.textContent = taskData[task].title;
                    tooltipContent.innerHTML = taskData[task].content;
                    tooltip.style.opacity = '1';
                }
            });

            group.addEventListener('mousemove', (e) => {
                const rect = document.querySelector('.chart-container').getBoundingClientRect();
                tooltip.style.left = (e.clientX - rect.left + 15) + 'px';
                tooltip.style.top = (e.clientY - rect.top + 15) + 'px';
            });

            group.addEventListener('mouseleave', () => {
                tooltip.style.opacity = '0';
            });
        });
    </script>
</body>
</html>
