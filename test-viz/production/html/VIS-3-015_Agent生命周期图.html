<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent生命周期图</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
--bg-primary: #1a1a2e;
--bg-secondary: #16213e;
--phase-create: #7b61ff;
--phase-run: #48bb78;
--phase-cleanup: #ff9f43;
--lifecycle-main: #00d4ff;
--text-primary: #e8e8f0;
--text-secondary: #a0a0b8;
--glow-create: rgba(123, 97, 255, 0.25);
--glow-run: rgba(72, 187, 120, 0.25);
--glow-cleanup: rgba(255, 159, 67, 0.25);
}
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}
body {
font-family: 'Space Grotesk', sans-serif;
background: var(--bg-primary);
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
padding: 40px 20px;
color: var(--text-primary);
overflow-x: hidden;
}
.bg-mesh {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background:
radial-gradient(ellipse at 20% 30%, rgba(123, 97, 255, 0.08) 0%, transparent 50%),
radial-gradient(ellipse at 80% 70%, rgba(0, 212, 255, 0.06) 0%, transparent 50%),
radial-gradient(ellipse at 50% 50%, rgba(72, 187, 120, 0.05) 0%, transparent 60%);
pointer-events: none;
z-index: 0;
}
.noise-overlay {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
opacity: 0.03;
pointer-events: none;
z-index: 1;
}
.container {
position: relative;
z-index: 2;
width: 100%;
max-width: 1400px;
}
.title-section {
text-align: center;
margin-bottom: 50px;
}
.main-title {
font-size: 42px;
font-weight: 700;
letter-spacing: -1px;
background: linear-gradient(135deg, var(--lifecycle-main), var(--phase-create));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
margin-bottom: 8px;
}
.sub-title {
font-family: 'JetBrains Mono', monospace;
font-size: 14px;
color: var(--text-secondary);
text-transform: uppercase;
letter-spacing: 3px;
}
.diagram-wrapper {
background: rgba(22, 33, 62, 0.6);
border-radius: 24px;
padding: 40px;
backdrop-filter: blur(20px);
border: 1px solid rgba(255, 255, 255, 0.06);
box-shadow: 0 40px 80px rgba(0, 0, 0, 0.4);
}
svg {
width: 100%;
height: auto;
display: block;
}
.phase-zone {
transition: all 0.4s ease;
}
.phase-zone:hover {
filter: brightness(1.1);
}
.step-node {
cursor: pointer;
transition: all 0.3s ease;
}
.step-node:hover circle {
r: 18;
filter: drop-shadow(0 0 12px currentColor);
}
.step-node:hover text {
font-weight: 600;
}
.ai-loop-circle {
animation: rotate 20s linear infinite;
transform-origin: 600px 280px;
}
@keyframes rotate {
from { transform: rotate(0deg); }
to { transform: rotate(360deg); }
}
.yield-arrow {
animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
0%, 100% { opacity: 0.6; }
50% { opacity: 1; }
}
.clock-icon {
animation: tick 4s ease-in-out infinite;
}
@keyframes tick {
0%, 90%, 100% { transform: scale(1); }
95% { transform: scale(1.1); }
}
.isolation-line {
stroke-dasharray: 6 4;
animation: dash 30s linear infinite;
}
@keyframes dash {
to { stroke-dashoffset: -1000; }
}
.tooltip {
position: absolute;
background: rgba(26, 26, 46, 0.95);
border: 1px solid rgba(255, 255, 255, 0.1);
border-radius: 12px;
padding: 16px 20px;
font-size: 13px;
color: var(--text-primary);
max-width: 320px;
pointer-events: none;
opacity: 0;
transform: translateY(10px);
transition: all 0.3s ease;
box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
backdrop-filter: blur(10px);
z-index: 100;
}
.tooltip.visible {
opacity: 1;
transform: translateY(0);
}
.tooltip-title {
font-weight: 600;
margin-bottom: 6px;
color: var(--lifecycle-main);
font-size: 12px;
text-transform: uppercase;
letter-spacing: 1px;
}
.tooltip-desc {
color: var(--text-secondary);
line-height: 1.5;
font-family: 'JetBrains Mono', monospace;
font-size: 12px;
}
.task-types {
display: flex;
flex-wrap: wrap;
gap: 12px;
justify-content: center;
margin-top: 30px;
padding-top: 30px;
border-top: 1px solid rgba(255, 255, 255, 0.06);
}
.task-badge {
background: rgba(0, 212, 255, 0.08);
border: 1px solid rgba(0, 212, 255, 0.2);
border-radius: 20px;
padding: 8px 16px;
font-family: 'JetBrains Mono', monospace;
font-size: 11px;
color: var(--lifecycle-main);
transition: all 0.3s ease;
}
.task-badge:hover {
background: rgba(0, 212, 255, 0.15);
transform: translateY(-2px);
}
.omit-badge {
position: absolute;
right: 40px;
top: 40px;
background: rgba(255, 159, 67, 0.1);
border: 1px solid rgba(255, 159, 67, 0.3);
border-radius: 8px;
padding: 10px 16px;
font-size: 12px;
color: var(--phase-cleanup);
}
.omit-badge span {
text-decoration: line-through;
opacity: 0.6;
margin-right: 6px;
}
</style>
</head>
<body>
<div class="bg-mesh"></div>
<div class="noise-overlay"></div>
<div class="container">
<div class="title-section">
<h1 class="main-title">Agent生命周期</h1>
<p class="sub-title">Agent Lifecycle Architecture</p>
</div>
<div class="diagram-wrapper">
<div class="omit-badge">
<span>CLAUDE.md</span>omitClaudeMd优化 · 节省5-15 GTok/week
</div>
<svg viewBox="0 0 1200 650" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="grad-create" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#7b61ff" stop-opacity="0.3"/>
<stop offset="100%" stop-color="#7b61ff" stop-opacity="0.05"/>

<linearGradient id="grad-cleanup" x1="0%" y1="0%" x2="100%" y2="0%">

</defs>

<div class="tooltip" id="tooltip">
<div class="tooltip-title" id="tooltip-title"></div>
<div class="tooltip-desc" id="tooltip-desc"></div>
</div>
</div>
<script>
const tooltip = document.getElementById('tooltip');
const tooltipTitle = document.getElementById('tooltip-title');
const tooltipDesc = document.getElementById('tooltip-desc');
const stepNodes = document.querySelectorAll('.step-node');
stepNodes.forEach(node => {
node.addEventListener('mouseenter', (e) => {
const title = node.dataset.title;
const desc = node.dataset.desc;
tooltipTitle.textContent = title;
tooltipDesc.textContent = desc;
tooltip.classList.add('visible');
const rect = node.getBoundingClientRect();
const tooltipRect = tooltip.getBoundingClientRect();
let left = rect.left + rect.width / 2 - tooltipRect.width / 2;
let top = rect.bottom + 15;
if (left < 10) left = 10;
if (left + tooltipRect.width > window.innerWidth - 10) {
left = window.innerWidth - tooltipRect.width - 10;
}
if (top + tooltipRect.height > window.innerHeight - 10) {
top = rect.top - tooltipRect.height - 15;
}
tooltip.style.left = left + 'px';
tooltip.style.top = top + 'px';
});
node.addEventListener('mouseleave', () => {
tooltip.classList.remove('visible');
});
});
</script>
