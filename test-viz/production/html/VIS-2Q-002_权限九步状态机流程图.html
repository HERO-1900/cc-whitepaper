<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>权限九步状态机流程图 | Permission State Machine</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap');

:root {
  --bg-deep: #0a0f1c;
  --bg-panel: #111827;
  --c-allow: #00ff88;
  --c-deny: #ff6b6b;
  --c-ask: #ffcc00;
  --c-immune: #7b61ff;
  --c-bypass: #3b82f6;
  --c-text: #e2e8f0;
  --c-text-dim: #94a3b8;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg-deep);
  color: var(--c-text);
  font-family: 'Noto Sans SC', 'Space Grotesk', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -20%, rgba(123,97,255,0.15), transparent),
    linear-gradient(rgba(10,15,28,0.97), rgba(10,15,28,0.97)),
    url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0l25.98 15v30L30 60 4.02 45V15z' fill='none' stroke='%231e293b' stroke-width='0.5'/%3E%3C/svg%3E");
  background-size: cover, cover, 60px 52px;
}

header {
  text-align: center;
  margin-bottom: 30px;
  max-width: 720px;
}

header h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  background: linear-gradient(90deg, #fff 0%, #a5b4fc 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 6px;
}

header .subtitle {
  font-size: 0.9rem;
  color: var(--c-text-dim);
  font-family: 'Space Grotesk', sans-serif;
}

.container {
  width: 100%;
  max-width: 760px;
  background: rgba(17,24,39,0.6);
  border: 1px solid rgba(148,163,184,0.1);
  border-radius: 16px;
  padding: 24px;
  backdrop-filter: blur(8px);
  box-shadow: 0 24px 80px rgba(0,0,0,0.4);
}

svg {
  width: 100%;
  height: auto;
  display: block;
}

.node {
  cursor: pointer;
  transition: all 0.3s ease;
}

.node-shape {
  transition: all 0.3s ease;
}

.node:hover .node-shape {
  filter: drop-shadow(0 0 12px rgba(255,255,255,0.25));
  transform: scale(1.02);
}

.diamond { transform-origin: center; }
.rounded { transform-origin: center; }

text {
  font-family: 'Noto Sans SC', 'Space Grotesk', sans-serif;
  pointer-events: none;
}

.label-zh { font-size: 11px; font-weight: 500; }
.label-en { font-size: 8px; font-weight: 400; fill: var(--c-text-dim); }
.label-small { font-size: 9px; }
.arrow-label { font-size: 9px; font-weight: 600; }

.path-allow { stroke: var(--c-allow); }
.path-deny { stroke: var(--c-deny); }
.path-ask { stroke: var(--c-ask); }
.path-neutral { stroke: #64748b; }

.arrow-head-allow { fill: var(--c-allow); }
.arrow-head-deny { fill: var(--c-deny); }
.arrow-head-ask { fill: var(--c-ask); }
.arrow-head-neutral { fill: #64748b; }

.immune-bg {
  fill: rgba(123,97,255,0.08);
  stroke: var(--c-immune);
  stroke-width: 1.5;
  stroke-dasharray: 6,4;
}

.bypass-bg {
  fill: rgba(59,130,246,0.08);
  stroke: var(--c-bypass);
  stroke-width: 1.5;
  stroke-dasharray: 6,4;
}

.zone-label {
  font-size: 10px;
  font-weight: 700;
  font-family: 'Space Grotesk', sans-serif;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

/* Hover path highlighting */
g[data-step]:hover ~ .connectors path[data-to],
g[data-step]:hover ~ .connectors path[data-from] {
  opacity: 1;
  stroke-width: 3;
  filter: drop-shadow(0 0 4px currentColor);
}

.connectors path {
  transition: all 0.25s ease;
  opacity: 0.85;
}

.terminal-allow { fill: rgba(0,255,136,0.12); stroke: var(--c-allow); stroke-width: 2; }
.terminal-deny { fill: rgba(255,107,107,0.12); stroke: var(--c-deny); stroke-width: 2; }
.terminal-ask { fill: rgba(255,204,0,0.12); stroke: var(--c-ask); stroke-width: 2; }

.node-start { fill: rgba(30,41,59,0.8); stroke: #94a3b8; stroke-width: 1.5; }
.node-diamond { fill: rgba(30,41,59,0.85); stroke: #cbd5e1; stroke-width: 1.5; }
.node-action { fill: rgba(30,41,59,0.8); stroke: #64748b; stroke-width: 1.2; }

.panel {
  margin-top: 20px;
  padding: 16px 20px;
  background: rgba(15,23,42,0.7);
  border-radius: 12px;
  border-left: 3px solid var(--c-immune);
  min-height: 64px;
}

.panel h3 {
  font-size: 0.85rem;
  color: var(--c-immune);
  margin-bottom: 6px;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
}

.panel p {
  font-size: 0.8rem;
  color: var(--c-text-dim);
  line-height: 1.5;
}

.fade-in { animation: fadeIn 0.6s ease both; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>

  <text x="415" y="975" fill="#00ff88" class="arrow-label">Yes</text>

  <text x="358" y="1035" fill="#94a3b8" class="arrow-label">No</text>
</g>

<!-- Node: Start -->

  <rect x="250" y="30" width="200" height="45" rx="22" class="node-start"/>

  <text x="350" y="158" text-anchor="middle" fill="#94a3b8" class="label-en">Global deny rule?</text>
</g>

<g class="node" data-step="1b">
  <polygon points="350,230 430,270 350,310 270,270" class="diamond node-shape node-diamond"/>
  <text x="350" y="266" text-anchor="middle" fill="#e2e8f0" class="label-zh">全局 ask 规则?</text>
  <text x="350" y="278" text-anchor="middle" fill="#94a3b8" class="label-en">Global ask rule?</text>
</g>

<!-- Node: 1c -->
<g class="node" data-step="1c">
  <rect x="245" y="340" width="210" height="40" rx="8" class="node-action node-shape"/>
  <text x="350" y="358" text-anchor="middle" fill="#e2e8f0" class="label-zh">调用 checkPermissions()</text>
  <text x="350" y="372" text-anchor="middle" fill="#94a3b8" class="label-en">Tool-level permission check</text>

<g class="node" data-step="1d">
  <polygon points="350,410 430,450 350,490 270,450" class="diamond node-shape node-diamond"/>
  <text x="350" y="446" text-anchor="middle" fill="#e2e8f0" class="label-zh">工具返回 deny?</text>

</g>

<!-- Node: 1f -->
<g class="node" data-step="1f">
  <polygon points="350,630 430,670 350,710 270,670" class="diamond node-shape node-diamond"/>
  <text x="350" y="662" text-anchor="middle" fill="#e2e8f0" class="label-zh">内容级 ask 规则?</text>
  <text x="350" y="674" text-anchor="middle" fill="#94a3b8" class="label-en">Content-level ask rule?</text>
  <text x="350" y="686" text-anchor="middle" fill="#7b61ff" class="label-small">e.g. Bash(npm publish:*)</text>
</g>

<!-- Node: 1g -->
<g class="node" data-step="1g">
  <polygon points="350,740 430,780 350,820 270,780" class="diamond node-shape node-diamond"/>

  <text x="350" y="800" text-anchor="middle" fill="#7b61ff" class="label-small">.git/  .claude/  ~/.bashrc  etc.</text>
</g>

<!-- Node: 2a -->
<g class="node" data-step="2a">
  <polygon points="350,850 430,890 350,930 270,890" class="diamond node-shape node-diamond"/>
  <text x="350" y="886" text-anchor="middle" fill="#e2e8f0" class="label-zh">bypassPermissions 模式?</text>
  <text x="350" y="898" text-anchor="middle" fill="#94a3b8" class="label-en">Bypass mode active?</text>
</g>

<!-- Node: 2b -->
<g class="node" data-step="2b">
  <polygon points="350,960 430,980 350,1000 270,980" class="diamond node-shape node-diamond"/>
  <text x="350" y="976" text-anchor="middle" fill="#e2e8f0" class="label-zh">匹配全局 allow 规则?</text>

<!-- Terminal: Deny -->

  <rect x="160" y="980" width="120" height="56" rx="16" class="terminal-deny node-shape"/>

<text x="540" y="275" fill="#94a3b8" font-size="9">sandbox例外→Allow</text>
<text x="540" y="455" fill="#94a3b8" font-size="9">工具级拒绝</text>
<text x="540" y="565" fill="#7b61ff" font-size="9">bypass无效,强制Ask</text>
<text x="540" y="675" fill="#7b61ff" font-size="9">bypass无效,强制Ask</text>
<text x="540" y="785" fill="#7b61ff" font-size="9">bypass无效,强制Ask</text>
<text x="540" y="895" fill="#3b82f6" font-size="9">bypass生效,直接Allow</text>
<text x="540" y="985" fill="#94a3b8" font-size="9">规则匹配则Allow</text>

<div class="panel" id="detailPanel">
  <h3>Core Insight</h3>
  <p>步骤 1e/1f/1g（bypass-immune 检查）在步骤 2a（bypassPermissions 模式）之前执行，这就是"有些路径永远无法绕过"的实现机制。权限系统在安全与灵活之间走钢丝：bypass 能跳过常规检查，但触及核心安全边界时仍然被强制拦截。</p>
</div>
</div>

<script>
const details = {
  start: { title: '工具调用请求', body: '入口节点。每个 tool_use block 都会进入此权限状态机。' },
  '1a': { title: '步骤 1a — 全局 deny 规则', body: '首先检查是否存在适用于此工具/参数的全局 deny 规则。若存在，立即拒绝，不给后续任何机会。' },
  '1b': { title: '步骤 1b — 全局 ask 规则', body: '检查全局 ask 规则。若命中，通常进入 Ask 状态；sandbox 环境下存在例外可直接 Allow。' },
  '1c': { title: '步骤 1c — 工具级权限检查', body: '调用工具自身的 checkPermissions()，获取工具对当前参数的判断结果。' },
  '1d': { title: '步骤 1d — 工具返回 deny', body: '若工具级检查返回 deny，直接拒绝。这说明工具自己最清楚哪些操作是危险的。' },
  '1e': { title: '步骤 1e — 用户交互检查 [bypass-immune]', body: '若操作需要用户交互，强制 Ask。bypassPermissions 对此步骤无效。' },
  '1f': { title: '步骤 1f — 内容级 ask 规则 [bypass-immune]', body: '如 Bash(npm publish:*) 这类细粒度规则。命中即强制 Ask，bypass 无法跳过。' },
  '1g': { title: '步骤 1g — 敏感路径检查 [bypass-immune]', body: '触及 .git/、.claude/、.vscode/、~/.bashrc 等敏感路径时强制 Ask，属于不可绕过的安全底线。' },
  '2a': { title: '步骤 2a — bypassPermissions 模式 [bypass-effective]', body: '如果用户启用了 bypass 模式，此前所有检查已通过，此处直接 Allow。bypass 终于生效。' },
  '2b': { title: '步骤 2b — 全局 allow 规则', body: '未开启 bypass 时，检查是否命中全局 allow 规则。命中则 Allow，否则进入默认 Ask。' },
  deny: { title: '终态: Deny', body: '拒绝执行工具调用。' },
  ask: { title: '终态: Ask', body: '向用户询问是否允许执行。' },
  allow: { title: '终态: Allow', body: '允许执行工具调用。' }
};

const panel = document.getElementById('detailPanel');
document.querySelectorAll('.node').forEach(node => {
  node.addEventListener('mouseenter', () => {
    const step = node.dataset.step;
    const info = details[step];
    if (info) {
      panel.querySelector('h3').textContent = info.title;
      panel.querySelector('p').textContent = info.body;
      panel.style.borderColor = step.includes('immune') || step === '1e' || step === '1f' || step === '1g' ? '#7b61ff' : step === '2a' ? '#3b82f6' : '#7b61ff';
      panel.querySelector('h3').style.color = step.includes('immune') || step === '1e' || step === '1f' || step === '1g' ? '#7b61ff' : step === '2a' ? '#3b82f6' : '#7b61ff';
    }
  });
});
</script>
