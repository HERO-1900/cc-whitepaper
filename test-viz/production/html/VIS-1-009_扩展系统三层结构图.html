<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code 扩展系统三层结构图</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
--bg-deep: #0a0f1a;
--bg-panel: rgba(15, 23, 42, 0.7);
--mcp: #48bb78;
--mcp-glow: rgba(72, 187, 120, 0.3);
--hooks: #ffa500;
--hooks-glow: rgba(255, 165, 0, 0.3);
--plugins: #63b3ed;
--plugins-glow: rgba(99, 179, 237, 0.3);
--security: #ff6b6b;
--text-main: #e2e8f0;
--text-sub: #94a3b8;
--glass: rgba(255, 255, 255, 0.03);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow-x: hidden; }
body {
background: var(--bg-deep);
color: var(--text-main);
font-family: 'Space Grotesk', 'Noto Sans SC', sans-serif;
min-height: 100vh;
position: relative;
}

.bg-circuit {
position: fixed; inset: 0;
background-image:
radial-gradient(circle at 20% 30%, rgba(72, 187, 120, 0.08) 0%, transparent 40%),
radial-gradient(circle at 80% 20%, rgba(255, 107, 107, 0.06) 0%, transparent 35%),
radial-gradient(circle at 60% 80%, rgba(99, 179, 237, 0.08) 0%, transparent 45%),
linear-gradient(rgba(15, 23, 42, 0.9), rgba(10, 15, 26, 0.95)),
url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 30h60v60H30z' fill='none' stroke='%231e293b' stroke-width='0.5'/%3E%3Ccircle cx='30' cy='30' r='2' fill='%231e293b'/%3E%3Ccircle cx='90' cy='30' r='2' fill='%231e293b'/%3E%3Ccircle cx='30' cy='90' r='2' fill='%231e293b'/%3E%3Ccircle cx='90' cy='90' r='2' fill='%231e293b'/%3E%3C/svg%3E");
z-index: -2;
}

.noise {
position: fixed; inset: 0;
opacity: 0.04;
z-index: -1;
pointer-events: none;
background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

.container {
max-width: 1400px;
margin: 0 auto;
padding: 40px 20px;
min-height: 100vh;
display: flex;
flex-direction: column;
}

header {
text-align: center;
margin-bottom: 30px;
position: relative;
}

header h1 {
font-size: clamp(1.8rem, 4vw, 2.8rem);
font-weight: 700;
letter-spacing: -0.02em;
background: linear-gradient(135deg, #f8fafc 0%, #94a3b8 100%);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
margin-bottom: 8px;
}

header .subtitle {
font-size: 0.95rem;
color: var(--text-sub);
font-weight: 400;
}

.id-badge {
display: inline-block;
font-family: 'JetBrains Mono', monospace;
font-size: 0.75rem;
color: var(--text-sub);
border: 1px solid rgba(148, 163, 184, 0.3);
padding: 4px 12px;
border-radius: 20px;
margin-bottom: 16px;
backdrop-filter: blur(4px);
}

.diagram-wrapper {
flex: 1;
display: flex;
align-items: center;
justify-content: center;
position: relative;
}

svg {
width: 100%;
height: auto;
max-width: 1200px;
display: block;
}

.column-rect {
fill: var(--glass);
stroke-width: 1.5;
backdrop-filter: blur(8px);
transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
cursor: pointer;
}

.column-mcp { stroke: var(--mcp); }
.column-hooks { stroke: var(--hooks); }
.column-plugins { stroke: var(--plugins); }

.column-rect:hover {
fill: rgba(255, 255, 255, 0.06);
}

.title-main {
font-size: 22px;
font-weight: 700;
fill: #f1f5f9;
}
.title-sub {
font-size: 12px;
font-weight: 500;
fill: var(--text-sub);
}
.title-metaphor {
font-size: 14px;
font-weight: 600;
}

.node-box {
fill: rgba(15, 23, 42, 0.85);
stroke-width: 1;
rx: 6;
transition: all 0.3s ease;
}
.node-box:hover {
fill: rgba(30, 41, 59, 0.95);
}

.node-text {
font-size: 11px;
fill: #e2e8f0;
font-weight: 500;
}
.node-text-small {
font-size: 9px;
fill: var(--text-sub);
}

.protocol-icon {
fill: none;
stroke-width: 1.5;
stroke-linecap: round;
stroke-linejoin: round;
}

.arrow-path {
fill: none;
stroke-width: 1.5;
stroke-dasharray: 4 3;
opacity: 0.7;
marker-end: url(#arrowhead);
}

.security-bar {
filter: drop-shadow(0 0 8px rgba(255, 107, 107, 0.4));
}

.pulse-circle {
animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
0%, 100% { opacity: 0.4; transform: scale(1); }
50% { opacity: 0.8; transform: scale(1.1); }
}

.float-anim {
animation: float 4s ease-in-out infinite;
}
.float-anim-delay {
animation: float 4s ease-in-out infinite;
animation-delay: 1.3s;
}
.float-anim-delay2 {
animation: float 4s ease-in-out infinite;
animation-delay: 2.6s;
}

@keyframes float {
0%, 100% { transform: translateY(0); }
50% { transform: translateY(-4px); }
}

.detail-popup {
position: absolute;
background: rgba(15, 23, 42, 0.95);
border: 1px solid rgba(148, 163, 184, 0.2);
border-radius: 12px;
padding: 16px 20px;
max-width: 280px;
pointer-events: none;
opacity: 0;
transform: translateY(10px);
transition: all 0.3s ease;
backdrop-filter: blur(12px);
box-shadow: 0 20px 50px rgba(0,0,0,0.4);
z-index: 100;
}

.detail-popup.visible {
opacity: 1;
transform: translateY(0);
}

.detail-popup h3 {
font-size: 1rem;
margin-bottom: 8px;
color: #f8fafc;
}

.detail-popup p {
font-size: 0.85rem;
color: var(--text-sub);
line-height: 1.5;
}

.detail-popup .tag {
display: inline-block;
font-size: 0.7rem;
padding: 2px 8px;
border-radius: 4px;
margin-top: 8px;
font-family: 'JetBrains Mono', monospace;
}

.tag-mcp { background: rgba(72, 187, 120, 0.15); color: var(--mcp); }
.tag-hooks { background: rgba(255, 165, 0, 0.15); color: var(--hooks); }
.tag-plugins { background: rgba(99, 179, 237, 0.15); color: var(--plugins); }

@media (max-width: 768px) {
.container { padding: 20px 12px; }
header h1 { font-size: 1.5rem; }
}
</style>
</head>

<script>
const popup = document.getElementById('popup');
const popupTitle = document.getElementById('popupTitle');
const popupDesc = document.getElementById('popupDesc');
const popupTag = document.getElementById('popupTag');
const nodes = document.querySelectorAll('[data-col]');

nodes.forEach(node => {
node.addEventListener('mouseenter', (e) => {
const col = node.dataset.col;
const title = node.dataset.title;
const desc = node.dataset.desc;
popupTitle.textContent = title;
popupDesc.textContent = desc;
popupTag.className = 'tag tag-' + col;
popupTag.textContent = col.toUpperCase();

const rect = node.getBoundingClientRect();
const containerRect = document.querySelector('.diagram-wrapper').getBoundingClientRect();

let left = rect.left + rect.width / 2 - 140;
let top = rect.top - containerRect.top - 110;

if (left < 10) left = 10;
if (left + 280 > containerRect.width) left = containerRect.width - 290;

popup.style.left = left + 'px';
popup.style.top = top + 'px';
popup.classList.add('visible');
});

node.addEventListener('mouseleave', () => {
popup.classList.remove('visible');
});
});
</script>
</body>
</html>
