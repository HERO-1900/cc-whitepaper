<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIS-2A-014 | 43个工具四大类分布图</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070708;
  --panel:#0f1012;
  --card:#13151a;
  --text:#e8e8ec;
  --text-dim:#71717a;
  --border:#1e1e24;
  --c-file:#38bdf8;
  --c-exec:#fb7185;
  --c-agent:#c084fc;
  --c-ext:#34d399;
  --font-display:'Space Grotesk',sans-serif;
  --font-body:'Noto Sans SC',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
*{
  margin:0;padding:0;box-sizing:border-box;
}
html,body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  min-height:100vh;
  overflow-x:hidden;
}
body::before{
  content:"";
  position:fixed;inset:0;
  background:
    radial-gradient(circle at 15% 25%,rgba(56,189,248,0.08) 0%,transparent 40%),
    radial-gradient(circle at 85% 15%,rgba(251,113,133,0.07) 0%,transparent 40%),
    radial-gradient(circle at 70% 80%,rgba(192,132,252,0.06) 0%,transparent 40%),
    radial-gradient(circle at 30% 70%,rgba(52,211,153,0.05) 0%,transparent 40%);
  pointer-events:none;z-index:0;
}
.container{
  position:relative;z-index:1;
  max-width:1400px;margin:0 auto;padding:48px 24px;
}
header{
  display:flex;flex-wrap:wrap;gap:24px;align-items:flex-end;
  justify-content:space-between;margin-bottom:48px;
}
h1{
  font-family:var(--font-display);
  font-size:clamp(28px,4vw,48px);font-weight:700;letter-spacing:-0.02em;
  line-height:1.1;
}
h1 span{
  display:block;font-size:0.45em;font-weight:300;
  color:var(--text-dim);letter-spacing:0.1em;margin-top:8px;
  text-transform:uppercase;
}
.filters{
  display:flex;flex-wrap:wrap;gap:10px;
}
.filters button{
  background:transparent;border:1px solid var(--border);
  color:var(--text-dim);padding:8px 16px;border-radius:999px;
  font-family:var(--font-body);font-size:13px;cursor:pointer;
  transition:all .2s ease;
}
.filters button:hover,.filters button.active{
  color:var(--text);border-color:var(--text-dim);background:rgba(255,255,255,0.03);
}
.dashboard{
  display:grid;grid-template-columns:1fr;gap:32px;
}
.category-block{
  background:var(--panel);
  border:1px solid var(--border);border-radius:16px;
  padding:24px;position:relative;overflow:hidden;
  transition:opacity .3s ease;
}
.category-block.dimmed{
  opacity:0.25;pointer-events:none;
}
.category-block::before{
  content:"";position:absolute;top:0;left:0;right:0;height:3px;
}
.category-block.file::before{background:var(--c-file);box-shadow:0 0 20px var(--c-file);}
.category-block.exec::before{background:var(--c-exec);box-shadow:0 0 20px var(--c-exec);}
.category-block.agent::before{background:var(--c-agent);box-shadow:0 0 20px var(--c-agent);}
.category-block.ext::before{background:var(--c-ext);box-shadow:0 0 20px var(--c-ext);}
.cat-header{
  display:flex;align-items:center;gap:12px;margin-bottom:20px;
}
.cat-title{
  font-family:var(--font-display);font-size:22px;font-weight:700;
}
.cat-title.zh{color:var(--text);}
.cat-title.en{
  font-size:14px;font-weight:300;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em;
}
.cat-badge{
  font-family:var(--font-mono);font-size:11px;padding:3px 8px;border-radius:4px;
  background:rgba(255,255,255,0.05);color:var(--text-dim);margin-left:auto;
}
.tool-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:12px;
}
.tool-card{
  background:var(--card);
  border:1px solid var(--border);
  border-left-width:3px;border-radius:10px;
  padding:14px 12px;position:relative;
  cursor:pointer;transition:all .2s ease;
  display:flex;flex-direction:column;justify-content:space-between;
  min-height:90px;
}
.tool-card:hover{
  transform:translateY(-3px);
  background:#1a1c23;
}
.tool-card.hidden{ display:none; }
.tool-card.dimmed{ opacity:0.15; pointer-events:none; }
.tool-card.file{ border-left-color:var(--c-file); }
.tool-card.exec{ border-left-color:var(--c-exec); }
.tool-card.agent{ border-left-color:var(--c-agent); }
.tool-card.ext{ border-left-color:var(--c-ext); }
.tool-card.high-risk{
  border-color:#ef4444;
  box-shadow:0 0 0 1px rgba(239,68,68,0.3),inset 0 0 20px rgba(239,68,68,0.05);
  animation:pulseRed 3s infinite;
}
@keyframes pulseRed{
  0%,100%{box-shadow:0 0 0 1px rgba(239,68,68,0.3),inset 0 0 20px rgba(239,68,68,0.05);}
  50%{box-shadow:0 0 0 2px rgba(239,68,68,0.5),inset 0 0 30px rgba(239,68,68,0.1);}
}
.card-top{
  display:flex;justify-content:space-between;align-items:flex-start;gap:6px;
}
.tool-name{
  font-family:var(--font-mono);font-size:14px;font-weight:700;color:var(--text);
  word-break:break-word;line-height:1.2;
}
.tool-badges{
  display:flex;gap:6px;flex-shrink:0;margin-top:2px;
}
.icon{
  width:14px;height:14px;opacity:0.7;
}
.fork-badge{
  font-family:var(--font-mono);font-size:9px;
  color:var(--c-agent);border:1px solid var(--c-agent);
  padding:1px 4px;border-radius:3px;margin-top:auto;align-self:flex-start;
  opacity:0.8;
}
.risk-label{
  font-family:var(--font-mono);font-size:9px;color:#ef4444;margin-top:auto;align-self:flex-start;
}
.win-label{
  font-family:var(--font-mono);font-size:9px;color:var(--text-dim);margin-top:auto;align-self:flex-start;
}
.tooltip{
  position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%);
  width:220px;background:rgba(10,10,12,0.95);
  border:1px solid var(--border);border-radius:8px;
  padding:12px;font-size:12px;color:var(--text-dim);
  pointer-events:none;opacity:0;transition:opacity .2s ease;
  z-index:10;backdrop-filter:blur(6px);
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}
.tooltip::after{
  content:"";position:absolute;top:100%;left:50%;margin-left:-5px;
  border-width:5px;border-style:solid;border-color:var(--border) transparent transparent transparent;
}
.tool-card:hover .tooltip{ opacity:1; }
.tooltip strong{
  display:block;color:var(--text);margin-bottom:4px;font-size:13px;
}
@media (max-width:640px){
  .container{padding:24px 16px;}
  .tool-grid{
    grid-template-columns:repeat(2,1fr);
  }
  .category-block{padding:18px 16px;}
}
</style>
</head>
<body>
<div class="container">
  <header>
    <div>
      <h1>43个工具四大类分布图 <span>Tool Distribution VIS-2A-014</span></h1>
    </div>
    <div class="filters">
      <button class="active" data-filter="all">全部 All</button>
      <button data-filter="readonly">只读 Read-Only</button>
      <button data-filter="safe">并发安全 Safe</button>
      <button data-filter="file">文件操作 File</button>
      <button data-filter="exec">执行引擎 Exec</button>
      <button data-filter="agent">Agent家族</button>
      <button data-filter="ext">扩展辅助 Ext</button>
    </div>
  </header>

  <div class="dashboard" id="dashboard">
    <!-- Generated by JS -->
  </div>
</div>

<script>
const categories=[
  {
    id:'file',
    zh:'文件操作',
    en:'File Operations',
    desc:'AI的"双手"，直接操作文件系统',
    color:'var(--c-file)',
    tools:[
      {name:'Read',readonly:true,safe:true,desc:'读取文件内容，只读且并发安全'},
      {name:'Edit',readonly:false,safe:false,desc:'差分编辑文件，修改部分内容'},
      {name:'Write',readonly:false,safe:false,desc:'覆盖写入整个文件'},
      {name:'Glob',readonly:true,safe:true,desc:'按模式匹配文件路径'},
      {name:'Grep',readonly:true,safe:true,desc:'在文件内容中搜索匹配'},
      {name:'NotebookEdit',readonly:false,safe:false,desc:'编辑Jupyter Notebook单元格'}
    ]
  },
  {
    id:'exec',
    zh:'执行引擎',
    en:'Execution Engines',
    desc:'AI的"跑腿"，执行Shell命令',
    color:'var(--c-exec)',
    tools:[
      {name:'Bash',readonly:false,safe:false,desc:'执行Bash命令，使用频率最高，安全风险最大',special:'high-risk'},
      {name:'PowerShell',readonly:false,safe:false,desc:'执行PowerShell命令，仅Windows可用',special:'windows'}
    ]
  },
  {
    id:'agent',
    zh:'Agent家族',
    en:'Agent Family',
    desc:'AI的"分身"，调用Agent=fork创建新queryLoop实例',
    color:'var(--c-agent)',
    tools:[
      {name:'Agent',readonly:false,safe:false,desc:'创建子Agent（fork新实例）',special:'fork'},
      {name:'SendMessage',readonly:false,safe:false,desc:'向已有Agent发送消息'},
      {name:'TeamCreate',readonly:false,safe:false,desc:'Swarm模式：创建团队',special:'fork'},
      {name:'TeamDelete',readonly:false,safe:false,desc:'Swarm模式：删除团队',special:'fork'},
      {name:'TaskCreate',readonly:false,safe:false,desc:'创建后台任务',special:'fork'},
      {name:'TaskGet',readonly:true,safe:true,desc:'获取任务状态信息'},
      {name:'TaskList',readonly:true,safe:true,desc:'列出所有后台任务'},
      {name:'TaskUpdate',readonly:false,safe:false,desc:'更新任务配置'},
      {name:'TaskStop',readonly:false,safe:false,desc:'停止运行中的任务'}
    ]
  },
  {
    id:'ext',
    zh:'扩展与辅助',
    en:'Extensions & Helpers',
    desc:'外部能力接入和辅助功能',
    color:'var(--c-ext)',
    tools:[
      {name:'WebFetch',readonly:true,safe:true,desc:'获取并解析网页内容'},
      {name:'WebSearch',readonly:true,safe:true,desc:'执行网络搜索'},
      {name:'MCPTool',readonly:false,safe:false,desc:'调用MCP服务器工具'},
      {name:'SkillTool',readonly:false,safe:false,desc:'调用内置技能'},
      {name:'ToolSearch',readonly:true,safe:true,desc:'元工具：搜索可用工具'},
      {name:'AskUserQuestion',readonly:false,safe:true,desc:'向用户提出问题'},
      {name:'Sleep',readonly:false,safe:true,desc:'等待指定时间'},
      {name:'Brief',readonly:false,safe:true,desc:'生成简短输出摘要'},
      {name:'EnterPlanMode',readonly:false,safe:false,desc:'进入计划模式'},
      {name:'ExitPlanMode',readonly:false,safe:false,desc:'退出计划模式'},
      {name:'EnterWorktree',readonly:false,safe:false,desc:'进入Git工作树'},
      {name:'ExitWorktree',readonly:false,safe:false,desc:'退出Git工作树'},
      {name:'ReadMcpResource',readonly:true,safe:true,desc:'读取MCP资源'},
      {name:'ListMcpResources',readonly:true,safe:true,desc:'列出MCP资源'},
      {name:'RemoteTrigger',readonly:false,safe:false,desc:'远程触发代理执行'},
      {name:'ScheduleCron',readonly:false,safe:false,desc:'调度定时任务'}
    ]
  }
];

const lockIcon=`<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0110 0v4"></path></svg>`;
const boltIcon=`<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>`;
const crossIcon=`<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;

function createCard(tool,catId){
  const cls=['tool-card',catId];
  if(tool.special==='high-risk') cls.push('high-risk');
  const readonlyIcon=tool.readonly?lockIcon:crossIcon;
  const safeIcon=tool.safe?boltIcon:crossIcon;
  const specialBadge=tool.special==='fork'?`<span class="fork-badge">fork</span>`:
                      tool.special==='high-risk'?`<span class="risk-label">HIGH RISK</span>`:
                      tool.special==='windows'?`<span class="win-label">Windows only</span>`:'';
  return `<div class="${cls.join(' ')}" data-cat="${catId}" data-readonly="${tool.readonly}" data-safe="${tool.safe}">
    <div class="card-top">
      <div class="tool-name">${tool.name}</div>
      <div class="tool-badges" title="Read-only: ${tool.readonly?'Yes':'No'} | Safe: ${tool.safe?'Yes':'No'}">
        ${readonlyIcon}${safeIcon}
      </div>
    </div>
    ${specialBadge}
    <div class="tooltip"><strong>${tool.name}</strong>${tool.desc}</div>
  </div>`;
}

function render(){
  const db=document.getElementById('dashboard');
  db.innerHTML=categories.map(cat=>{
    const cards=cat.tools.map(t=>createCard(t,cat.id)).join('');
    return `<div class="category-block ${cat.id}" data-cat="${cat.id}">
      <div class="cat-header">
        <div class="cat-title zh">${cat.zh}</div>
        <div class="cat-title en">${cat.en}</div>
        <div class="cat-badge">${cat.tools.length} tools</div>
      </div>
      <div class="tool-grid">${cards}</div>
    </div>`;
  }).join('');
}

render();

const btns=document.querySelectorAll('.filters button');
btns.forEach(btn=>{
  btn.addEventListener('click',()=>{
    btns.forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const filter=btn.dataset.filter;
    document.querySelectorAll('.category-block').forEach(block=>{
      const cat=block.dataset.cat;
      let blockMatch=(filter==='all'||filter===cat||((filter==='readonly'||filter==='safe')));
      block.classList.toggle('dimmed',!blockMatch);
      block.querySelectorAll('.tool-card').forEach(card=>{
        let match=true;
        if(filter==='readonly') match=card.dataset.readonly==='true';
        else if(filter==='safe') match=card.dataset.safe==='true';
        else if(filter!=='all' && filter!=='readonly' && filter!=='safe') match=card.dataset.cat===filter;
        card.classList.toggle('dimmed',!match);
      });
      const anyVisible=[...block.querySelectorAll('.tool-card')].some(c=>!c.classList.contains('dimmed'));
      block.classList.toggle('dimmed',!anyVisible);
    });
  });
});
</script>
</body>
</html>
