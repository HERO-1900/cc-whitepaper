<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>系统全景架构图 — Claude Code 八大子系统</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@500;700&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Noto Sans SC', sans-serif;
  background: #0d1117;
  color: #f0f6fc;
  min-height: 100vh;
  padding: 40px 20px;
}

.container {
  max-width: 1500px;
  margin: 0 auto;
}

h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 42px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #f0f6fc 0%, #8b949e 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.subtitle {
  text-align: center;
  font-size: 16px;
  color: #8b949e;
  margin-bottom: 30px;
  font-family: 'JetBrains Mono', monospace;
}

.analogy {
  max-width: 900px;
  margin: 0 auto 40px;
  text-align: center;
  line-height: 2;
  color: #c9d1d9;
  font-size: 15px;
}

.analogy p {
  margin-bottom: 12px;
}

.svg-container {
  display: flex;
  justify-content: center;
  filter: drop-shadow(0 20px 60px rgba(0,0,0,0.5));
}

svg {
  background: #0d1117;
  border-radius: 12px;
}
</style>
</head>
<body>
<div class="container">
  <h1>系统全景架构图</h1>
  <div class="subtitle">Big Picture · Claude Code 八大子系统的全局地图</div>
  
  <div class="analogy">
    <p>💡 把 Claude Code 想象成一座城市：QueryEngine 是市中心（心脏），7 个子系统是各个功能区（UI 区/工具区/安全区/Agent 区/...），三条彩色高速公路连接所有区域。</p>
    <p>🔵 蓝色 = 你说的话怎么传到 AI（请求路径）&nbsp;&nbsp;|&nbsp;&nbsp;🟢 绿色 = AI 决定做什么后，工具怎么实际执行（执行路径）&nbsp;&nbsp;|&nbsp;&nbsp;🟡 黄色 = 状态变更如何更新到屏幕上（状态路径）</p>
    <p style="color: #8b949e; font-size: 13px;">💡 建议：看完这张图，你应该能在脑中定位每个子系统的位置，后续阅读单个子系统时就能脑补它在全景中的角色。</p>
  </div>
  
  <div class="svg-container">
    <svg width="1400" height="1000" viewBox="0 0 1400 1000" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Arrow marker -->
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L0,8 L8,4 z" fill="#58a6ff"/>
        </marker>
        <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L0,8 L8,4 z" fill="#48bb78"/>
        </marker>
        <marker id="arrow-yellow" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L0,8 L8,4 z" fill="#e3b341"/>
        </marker>
        
        <!-- Grid pattern -->
        <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
          <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#161b22" stroke-width="1"/>
        </pattern>
        
        <!-- Glow filter -->
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
          <feMerge>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
        
        <!-- Drop shadow -->
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
        </filter>
      </defs>
      
      <!-- Background grid -->
      <rect width="1400" height="1000" fill="#0d1117"/>
      <rect width="1400" height="1000" fill="url(#grid)"/>
      
      <!-- Additional grid lines for visual rhythm -->
      <line x1="0" y1="500" x2="1400" y2="500" stroke="#161b22" stroke-width="1"/>
      <line x1="700" y1="0" x2="700" y2="1000" stroke="#161b22" stroke-width="1"/>
      
      <!-- ============ CONNECTION LINES (main links, behind nodes) ============ -->
      <!-- SS1 Terminal UI -->
      <line x1="700" y1="410" x2="700" y2="310" stroke="#58a6ff" stroke-width="2.5" marker-end="url(#arrow)"/>
      
      <!-- SS2 System Prompt -->
      <polyline points="763,437 900,437 900,355 1100,355" fill="none" stroke="#58a6ff" stroke-width="2.5" marker-end="url(#arrow)"/>
      
      <!-- SS3 Tool Runtime -->
      <polyline points="763,563 900,563 900,655 1100,655" fill="none" stroke="#58a6ff" stroke-width="2.5" marker-end="url(#arrow)"/>
      
      <!-- SS4 Agent -->
      <line x1="700" y1="590" x2="700" y2="800" stroke="#58a6ff" stroke-width="2.5" marker-end="url(#arrow)"/>
      
      <!-- SS5 State -->
      <polyline points="637,563 500,563 500,655 300,655" fill="none" stroke="#58a6ff" stroke-width="2.5" marker-end="url(#arrow)"/>
      
      <!-- SS6 Security -->
      <polyline points="637,437 500,437 500,355 300,355" fill="none" stroke="#58a6ff" stroke-width="2.5" marker-end="url(#arrow)"/>
      
      <!-- SS4 Agent to SS7 Extensions -->
      <line x1="800" y1="855" x2="1180" y2="855" stroke="#58a6ff" stroke-width="2.5" marker-end="url(#arrow)"/>
      
      <!-- ============ DATA FLOW HIGHWAYS (on top of main links) ============ -->
      <!-- Data Flow 1: Request Path (Blue) -->
      <polyline points="700,310 700,410 763,437 1300,437 1300,200" fill="none" stroke="#58a6ff" stroke-width="4" opacity="0.85" stroke-linecap="round" stroke-linejoin="round"/>
      
      <!-- Data Flow 2: Execute Path (Green) -->
      <polyline points="1300,200 1300,437 763,437 763,563 1100,655 1300,655 1300,920" fill="none" stroke="#48bb78" stroke-width="4" opacity="0.85" stroke-linecap="round" stroke-linejoin="round"/>
      
      <!-- Data Flow 3: State Path (Yellow) -->
      <polyline points="300,655 300,250 600,250 700,250" fill="none" stroke="#e3b341" stroke-width="4" opacity="0.85" stroke-linecap="round" stroke-linejoin="round"/>
      
      <!-- ============ EXTERNAL SERVICE NODES ============ -->
      <!-- User Terminal -->
      <rect x="600" y="80" width="200" height="60" rx="8" fill="none" stroke="#6e7681" stroke-width="1.5" stroke-dasharray="6 4"/>
      <text x="700" y="115" fill="#8b949e" font-size="12" font-family="JetBrains Mono, monospace" text-anchor="middle">💻 User Terminal</text>
      <!-- Connection to SS1 -->
      <line x1="700" y1="140" x2="700" y2="200" stroke="#6e7681" stroke-width="1.5" stroke-dasharray="6 4"/>
      
      <!-- Anthropic API -->
      <rect x="1280" y="80" width="120" height="60" rx="8" fill="none" stroke="#6e7681" stroke-width="1.5" stroke-dasharray="6 4"/>
      <text x="1340" y="115" fill="#8b949e" font-size="12" font-family="JetBrains Mono, monospace" text-anchor="middle">☁ Anthropic API</text>
      
      <!-- File System -->
      <rect x="1280" y="920" width="120" height="60" rx="8" fill="none" stroke="#6e7681" stroke-width="1.5" stroke-dasharray="6 4"/>
      <text x="1340" y="955" fill="#8b949e" font-size="12" font-family="JetBrains Mono, monospace" text-anchor="middle">📁 File System</text>
      
      <!-- MCP Servers (placed left of File System to avoid overlap) -->
      <rect x="1020" y="920" width="120" height="60" rx="8" fill="none" stroke="#6e7681" stroke-width="1.5" stroke-dasharray="6 4"/>
      <text x="1080" y="955" fill="#8b949e" font-size="12" font-family="JetBrains Mono, monospace" text-anchor="middle">🔌 MCP Servers</text>
      <!-- Connection from MCP Servers to SS7 Extensions -->
      <line x1="1080" y1="920" x2="1080" y2="910" stroke="#6e7681" stroke-width="1.5" stroke-dasharray="6 4"/>
      <line x1="1080" y1="910" x2="1180" y2="855" stroke="#6e7681" stroke-width="1.5" stroke-dasharray="6 4"/>
      
      <!-- ============ CENTER NODE: QueryEngine ============ -->
      <circle cx="700" cy="500" r="90" fill="rgba(0,212,255,0.08)" stroke="#00d4ff" stroke-width="3" filter="url(#shadow)"/>
      <circle cx="700" cy="500" r="86" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
      
      <!-- QueryEngine text -->
      <text x="700" y="490" font-size="18" fill="#00d4ff" font-weight="700" text-anchor="middle" font-family="Space Grotesk, sans-serif">Query Engine</text>
      <text x="700" y="515" font-size="14" fill="#00d4ff" text-anchor="middle">查询循环</text>
      <text x="700" y="540" font-size="12" fill="#8b949e" text-anchor="middle">心脏 ❤️</text>
      
      <!-- ============ SUBSYSTEM NODES ============ -->
      <!-- SS1: Terminal UI -->
      <g>
        <rect x="600" y="200" width="200" height="110" rx="12" fill="rgba(22,27,34,0.92)" stroke="#a0aec0" stroke-width="2.5" filter="url(#shadow)"/>
        <text x="620" y="225" font-size="20">💻</text>
        <text x="700" y="255" font-size="16" fill="#f0f6fc" font-weight="600" text-anchor="middle">终端 UI</text>
        <text x="700" y="275" font-size="11" fill="#a0aec0" text-anchor="middle" font-family="JetBrains Mono, monospace">Terminal Interface</text>
        <text x="700" y="295" font-size="11" fill="#8b949e" text-anchor="middle">人机交互的门户</text>
      </g>
      
      <!-- SS2: System Prompt -->
      <g>
        <rect x="1100" y="300" width="200" height="110" rx="12" fill="rgba(22,27,34,0.92)" stroke="#e88dff" stroke-width="2.5" filter="url(#shadow)"/>
        <text x="1120" y="325" font-size="20">📝</text>
        <text x="1200" y="355" font-size="16" fill="#f0f6fc" font-weight="600" text-anchor="middle">提示词工厂</text>
        <text x="1200" y="375" font-size="11" fill="#e88dff" text-anchor="middle" font-family="JetBrains Mono, monospace">System Prompt</text>
        <text x="1200" y="395" font-size="11" fill="#8b949e" text-anchor="middle">AI 的行为蓝图</text>
      </g>
      
      <!-- SS3: Tool Runtime -->
      <g>
        <rect x="1100" y="600" width="200" height="110" rx="12" fill="rgba(22,27,34,0.92)" stroke="#00d4ff" stroke-width="2.5" filter="url(#shadow)"/>
        <text x="1120" y="625" font-size="20">🔧</text>
        <text x="1200" y="655" font-size="16" fill="#f0f6fc" font-weight="600" text-anchor="middle">工具运行时</text>
        <text x="1200" y="675" font-size="11" fill="#00d4ff" text-anchor="middle" font-family="JetBrains Mono, monospace">Tool Runtime</text>
        <text x="1200" y="695" font-size="11" fill="#8b949e" text-anchor="middle">能力的执行引擎</text>
      </g>
      
      <!-- SS4: Agent Orchestration -->
      <g>
        <rect x="600" y="800" width="200" height="110" rx="12" fill="rgba(22,27,34,0.92)" stroke="#7b61ff" stroke-width="2.5" filter="url(#shadow)"/>
        <text x="620" y="825" font-size="20">🤖</text>
        <text x="700" y="855" font-size="16" fill="#f0f6fc" font-weight="600" text-anchor="middle">Agent 编排</text>
        <text x="700" y="875" font-size="11" fill="#7b61ff" text-anchor="middle" font-family="JetBrains Mono, monospace">Orchestration</text>
        <text x="700" y="895" font-size="11" fill="#8b949e" text-anchor="middle">自主决策的大脑</text>
      </g>
      
      <!-- SS5: State Persistence -->
      <g>
        <rect x="100" y="600" width="200" height="110" rx="12" fill="rgba(22,27,34,0.92)" stroke="#4ecdc4" stroke-width="2.5" filter="url(#shadow)"/>
        <text x="120" y="625" font-size="20">💾</text>
        <text x="200" y="655" font-size="16" fill="#f0f6fc" font-weight="600" text-anchor="middle">状态持久化</text>
        <text x="200" y="675" font-size="11" fill="#4ecdc4" text-anchor="middle" font-family="JetBrains Mono, monospace">State Persistence</text>
        <text x="200" y="695" font-size="11" fill="#8b949e" text-anchor="middle">记忆的存储库</text>
      </g>
      
      <!-- SS6: Security (with shield icon) -->
      <g>
        <rect x="100" y="300" width="200" height="110" rx="12" fill="rgba(22,27,34,0.92)" stroke="#ff6b6b" stroke-width="2.5" filter="url(#shadow)"/>
        <text x="120" y="325" font-size="20">🛡️</text>
        <text x="200" y="355" font-size="16" fill="#f0f6fc" font-weight="600" text-anchor="middle">安全架构</text>
        <text x="200" y="375" font-size="11" fill="#ff6b6b" text-anchor="middle" font-family="JetBrains Mono, monospace">Security</text>
        <text x="200" y="395" font-size="11" fill="#8b949e" text-anchor="middle">信任的守护者</text>
      </g>
      
      <!-- SS7: Extensions -->
      <g>
        <rect x="1180" y="800" width="200" height="110" rx="12" fill="rgba(22,27,34,0.92)" stroke="#48bb78" stroke-width="2.5" filter="url(#shadow)"/>
        <text x="1200" y="825" font-size="20">🔌</text>
        <text x="1280" y="855" font-size="16" fill="#f0f6fc" font-weight="600" text-anchor="middle">扩展生态</text>
        <text x="1280" y="875" font-size="11" fill="#48bb78" text-anchor="middle" font-family="JetBrains Mono, monospace">Extensions</text>
        <text x="1280" y="895" font-size="11" fill="#8b949e" text-anchor="middle">能力的无限延伸</text>
      </g>
      
      <!-- ============ DATA FLOW LABELS ============ -->
      <!-- Request Path -->
      <circle cx="860" cy="250" r="5" fill="#58a6ff"/>
      <text x="875" y="254" font-size="12" fill="#58a6ff" font-weight="600" font-family="JetBrains Mono, monospace">① 请求路径 Request</text>
      
      <!-- Execute Path -->
      <circle cx="950" cy="750" r="5" fill="#48bb78"/>
      <text x="965" y="754" font-size="12" fill="#48bb78" font-weight="600" font-family="JetBrains Mono, monospace">② 执行路径 Execute</text>
      
      <!-- State Path -->
      <circle cx="250" cy="280" r="5" fill="#e3b341"/>
      <text x="265" y="284" font-size="12" fill="#e3b341" font-weight="600" font-family="JetBrains Mono, monospace">③ 状态路径 State</text>
      
      <!-- ============ LEGEND ============ -->
      <g transform="translate(350, 970)">
        <!-- Request Path -->
        <line x1="0" y1="0" x2="30" y2="0" stroke="#58a6ff" stroke-width="4"/>
        <text x="40" y="4" font-size="12" fill="#8b949e" font-family="JetBrains Mono, monospace">请求路径</text>
        
        <!-- Execute Path -->
        <line x1="140" y1="0" x2="170" y2="0" stroke="#48bb78" stroke-width="4"/>
        <text x="180" y="4" font-size="12" fill="#8b949e" font-family="JetBrains Mono, monospace">执行路径</text>
        
        <!-- State Path -->
        <line x1="280" y1="0" x2="310" y2="0" stroke="#e3b341" stroke-width="4"/>
        <text x="320" y="4" font-size="12" fill="#8b949e" font-family="JetBrains Mono, monospace">状态路径</text>
        
        <!-- External Service -->
        <rect x="420" y="-8" width="30" height="16" rx="4" fill="none" stroke="#6e7681" stroke-width="1.5" stroke-dasharray="4 3"/>
        <text x="460" y="4" font-size="12" fill="#8b949e" font-family="JetBrains Mono, monospace">外部服务</text>
        
        <!-- Subsystem -->
        <rect x="560" y="-8" width="30" height="16" rx="4" fill="none" stroke="#a0aec0" stroke-width="2"/>
        <text x="600" y="4" font-size="12" fill="#8b949e" font-family="JetBrains Mono, monospace">子系统</text>
      </g>
      
    </svg>
  </div>
</div>
</body>
</html>
