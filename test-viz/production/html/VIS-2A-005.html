<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模式路由决策树 | Mode Routing Decision Tree</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a25;
            --accent-blue: #3b82f6;
            --accent-blue-glow: rgba(59, 130, 246, 0.4);
            --accent-green: #10b981;
            --accent-teal: #14b8a6;
            --accent-purple: #8b5cf6;
            --accent-orange: #f59e0b;
            --accent-yellow: #eab308;
            --accent-red: #ef4444;
            --accent-pink: #ec4899;
            --accent-cyan: #06b6d4;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-subtle: rgba(148, 163, 184, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated gradient background */
        .bg-gradient {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(59, 130, 246, 0.15), transparent),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(139, 92, 246, 0.1), transparent),
                radial-gradient(ellipse 40% 60% at 20% 60%, rgba(16, 185, 129, 0.08), transparent),
                var(--bg-primary);
            pointer-events: none;
            z-index: 0;
        }

        .noise-overlay {
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1600px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .diagram-container {
            background: var(--bg-secondary);
            border-radius: 24px;
            border: 1px solid var(--border-subtle);
            padding: 40px;
            overflow-x: auto;
            animation: fadeInUp 0.8s ease-out 0.2s both;
            box-shadow: 
                0 0 0 1px rgba(255,255,255,0.02),
                0 20px 60px -20px rgba(0,0,0,0.5);
        }

        svg {
            display: block;
            margin: 0 auto;
            min-width: 1200px;
        }

        /* Node styles */
        .node-rect {
            fill: var(--bg-tertiary);
            stroke: var(--border-subtle);
            stroke-width: 1.5;
            transition: all 0.3s ease;
        }

        .node-diamond {
            fill: var(--bg-tertiary);
            stroke: var(--accent-blue);
            stroke-width: 2;
            transition: all 0.3s ease;
        }

        .node-diamond.active {
            fill: rgba(59, 130, 246, 0.1);
            filter: drop-shadow(0 0 20px var(--accent-blue-glow));
        }

        .node-terminal {
            stroke-width: 2;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .node-terminal:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        .node-terminal.repl {
            fill: rgba(59, 130, 246, 0.15);
            stroke: var(--accent-blue);
            stroke-width: 3;
            filter: drop-shadow(0 0 30px var(--accent-blue-glow));
        }

        .node-terminal.headless {
            fill: rgba(16, 185, 129, 0.15);
            stroke: var(--accent-green);
        }

        .node-terminal.sdk {
            fill: rgba(20, 184, 166, 0.15);
            stroke: var(--accent-teal);
        }

        .node-terminal.coordinator {
            fill: rgba(139, 92, 246, 0.15);
            stroke: var(--accent-purple);
        }

        .node-terminal.kairos {
            fill: rgba(245, 158, 11, 0.15);
            stroke: var(--accent-orange);
        }

        .node-terminal.mcp {
            fill: rgba(234, 179, 8, 0.15);
            stroke: var(--accent-yellow);
        }

        .node-terminal.ssh {
            fill: rgba(239, 68, 68, 0.15);
            stroke: var(--accent-red);
        }

        .node-terminal.direct {
            fill: rgba(236, 72, 153, 0.15);
            stroke: var(--accent-pink);
        }

        /* Text styles */
        .text-main {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 14px;
            font-weight: 500;
            fill: var(--text-primary);
        }

        .text-sub {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            fill: var(--text-muted);
        }

        .text-diamond {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 13px;
            font-weight: 600;
            fill: var(--accent-blue);
        }

        .text-terminal {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 15px;
            font-weight: 700;
        }

        .text-terminal-sub {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            fill: var(--text-secondary);
        }

        .text-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 600;
            fill: var(--text-secondary);
        }

        .text-label-yes {
            fill: var(--accent-green);
        }

        .text-label-no {
            fill: var(--text-muted);
        }

        /* Edge styles */
        .edge {
            fill: none;
            stroke: var(--border-subtle);
            stroke-width: 2;
            transition: all 0.3s ease;
        }

        .edge-highlight {
            fill: none;
            stroke: var(--accent-blue);
            stroke-width: 3;
            filter: drop-shadow(0 0 8px var(--accent-blue-glow));
            animation: pulseLine 2s ease-in-out infinite;
        }

        .edge-yes {
            stroke: var(--accent-green);
            stroke-width: 2;
        }

        .arrowhead {
            fill: var(--border-subtle);
        }

        .arrowhead-highlight {
            fill: var(--accent-blue);
        }

        .arrowhead-yes {
            fill: var(--accent-green);
        }

        /* Legend */
        .legend {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid var(--border-subtle);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            border: 2px solid;
        }

        .legend-color.repl { border-color: var(--accent-blue); background: rgba(59, 130, 246, 0.3); }
        .legend-color.headless { border-color: var(--accent-green); background: rgba(16, 185, 129, 0.3); }
        .legend-color.sdk { border-color: var(--accent-teal); background: rgba(20, 184, 166, 0.3); }
        .legend-color.coordinator { border-color: var(--accent-purple); background: rgba(139, 92, 246, 0.3); }
        .legend-color.kairos { border-color: var(--accent-orange); background: rgba(245, 158, 11, 0.3); }
        .legend-color.mcp { border-color: var(--accent-yellow); background: rgba(234, 179, 8, 0.3); }
        .legend-color.ssh { border-color: var(--accent-red); background: rgba(239, 68, 68, 0.3); }
        .legend-color.direct { border-color: var(--accent-pink); background: rgba(236, 72, 153, 0.3); }

        /* Tooltip */
        .tooltip {
            position: absolute;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 16px 20px;
            max-width: 320px;
            pointer-events: none;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.2s ease;
            z-index: 100;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5);
        }

        .tooltip.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .tooltip-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .tooltip-trigger {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--accent-cyan);
            margin-bottom: 12px;
            padding: 4px 10px;
            background: rgba(6, 182, 212, 0.1);
            border-radius: 4px;
            display: inline-block;
        }

        .tooltip-desc {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulseLine {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        @keyframes pulseNode {
            0%, 100% { filter: drop-shadow(0 0 20px var(--accent-blue-glow)); }
            50% { filter: drop-shadow(0 0 40px var(--accent-blue-glow)); }
        }

        .pulse-animation {
            animation: pulseNode 2s ease-in-out infinite;
        }

        /* Mobile adaptation */
        @media (max-width: 768px) {
            .diagram-container {
                padding: 20px;
            }
            
            .legend {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="noise-overlay"></div>
    
    <div class="container">
        <header>
            <h1>模式路由决策树</h1>
            <p class="subtitle">Mode Routing Decision Tree · main() 函数执行路径</p>
        </header>

        <div class="diagram-container">
            <svg width="1400" height="900" viewBox="0 0 1400 900">
                <defs>
                    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                        <path d="M0,0 L0,6 L9,3 z" class="arrowhead"/>
                    </marker>
                    <marker id="arrow-highlight" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                        <path d="M0,0 L0,6 L9,3 z" class="arrowhead-highlight"/>
                    </marker>
                    <marker id="arrow-yes" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                        <path d="M0,0 L0,6 L9,3 z" class="arrowhead-yes"/>
                    </marker>
                    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                        <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                        <feMerge>
                            <feMergeNode in="coloredBlur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                </defs>

                <!-- Entry Node -->
                <g id="entry">
                    <rect x="630" y="20" width="140" height="50" rx="8" class="node-rect"/>
                    <text x="700" y="40" text-anchor="middle" class="text-main">main() 开始</text>
                    <text x="700" y="58" text-anchor="middle" class="text-sub">Entry Point</text>
                </g>

                <!-- Arrow to first decision -->
                <path d="M 700 70 L 700 100" class="edge" marker-end="url(#arrow)"/>

                <!-- Level 1: CLI Arguments -->
                <g id="cli-check">
                    <polygon points="700,100 800,140 700,180 600,140" class="node-diamond"/>
                    <text x="700" y="136" text-anchor="middle" class="text-diamond">CLI 参数检查</text>
                    <text x="700" y="152" text-anchor="middle" class="text-sub">Check CLI Args</text>
                </g>

                <!-- Branch: -p/--print -->
                <path d="M 600 140 L 450 140 L 450 220" class="edge-yes" marker-end="url(#arrow-yes)"/>
                <text x="520" y="135" text-anchor="middle" class="text-label text-label-yes">-p/--print</text>

                <!-- Headless Mode -->
                <g id="headless" class="mode-node" data-mode="headless">
                    <rect x="370" y="220" width="160" height="70" rx="12" class="node-terminal headless"/>
                    <text x="450" y="250" text-anchor="middle" class="text-terminal" fill="#10b981">Headless</text>
                    <text x="450" y="270" text-anchor="middle" class="text-terminal-sub">单次输出模式</text>
                </g>

                <!-- Arrow from Headless -->
                <path d="M 450 290 L 450 320" class="edge-yes" marker-end="url(#arrow-yes)"/>

                <!-- runHeadless() -->
                <g id="run-headless">
                    <rect x="380" y="320" width="140" height="40" rx="6" class="node-rect"/>
                    <text x="450" y="345" text-anchor="middle" class="text-main" style="font-size:12px;">runHeadless()</text>
                </g>

                <!-- Branch: mcp serve -->
                <path d="M 700 180 L 700 220 L 650 220 L 650 320" class="edge-yes" marker-end="url(#arrow-yes)"/>
                <text x="625" y="215" text-anchor="middle" class="text-label text-label-yes" style="font-size:10px;">mcp serve</text>

                <!-- MCP Mode -->
                <g id="mcp" class="mode-node" data-mode="mcp">
                    <rect x="570" y="320" width="160" height="70" rx="12" class="node-terminal mcp"/>
                    <text x="650" y="350" text-anchor="middle" class="text-terminal" fill="#eab308">MCP Serve</text>
                    <text x="650" y="370" text-anchor="middle" class="text-terminal-sub">MCP 服务器模式</text>
                </g>

                <!-- No branch to next level -->
                <path d="M 800 140 L 950 140 L 950 240 L 1050 240" class="edge" marker-end="url(#arrow)"/>
                <text x="880" y="135" text-anchor="middle" class="text-label text-label-no">否 / No</text>

                <!-- Level 2: Environment Variables -->
                <g id="env-check">
                    <polygon points="1150,200 1250,240 1150,280 1050,240" class="node-diamond"/>
                    <text x="1150" y="236" text-anchor="middle" class="text-diamond">环境变量检查</text>
                    <text x="1150" y="252" text-anchor="middle" class="text-sub">Check Env Vars</text>
                </g>

                <!-- Branch: COORDINATOR_MODE -->
                <path d="M 1050 240 L 900 240 L 900 380" class="edge-yes" marker-end="url(#arrow-yes)"/>
                <text x="970" y="235" text-anchor="middle" class="text-label text-label-yes" style="font-size:9px;">COORDINATOR_MODE=1</text>

                <!-- Coordinator Mode -->
                <g id="coordinator" class="mode-node" data-mode="coordinator">
                    <rect x="820" y="380" width="160" height="70" rx="12" class="node-terminal coordinator"/>
                    <text x="900" y="410" text-anchor="middle" class="text-terminal" fill="#8b5cf6">Coordinator</text>
                    <text x="900" y="430" text-anchor="middle" class="text-terminal-sub">多 Worker 编排</text>
                </g>

                <!-- Branch: KAIROS -->
                <path d="M 1150 280 L 1150 320 L 1100 320 L 1100 380" class="edge-yes" marker-end="url(#arrow-yes)"/>
                <text x="1140" y="310" text-anchor="middle" class="text-label text-label-yes" style="font-size:10px;">KAIROS</text>

                <!-- KAIROS Mode -->
                <g id="kairos" class="mode-node" data-mode="kairos">
                    <rect x="1020" y="380" width="160" height="70" rx="12" class="node-terminal kairos"/>
                    <text x="1100" y="410" text-anchor="middle" class="text-terminal" fill="#f59e0b">KAIROS</text>
                    <text x="1100" y="430" text-anchor="middle" class="text-terminal-sub">Assistant 模式</text>
                </g>

                <!-- No branch -->
                <path d="M 1250 240 L 1350 240 L 1350 480 L 1250 480" class="edge" marker-end="url(#arrow)"/>
                <text x="1310" y="235" text-anchor="middle" class="text-label text-label-no">否 / No</text>

                <!-- Level 3: Feature Flags -->
                <g id="flag-check">
                    <polygon points="1150,440 1250,480 1150,520 1050,480" class="node-diamond"/>
                    <text x="1150" y="476" text-anchor="middle" class="text-diamond">Feature Flag 检查</text>
                    <text x="1150" y="492" text-anchor="middle" class="text-sub">Check Flags</text>
                </g>

                <!-- Branch: SSH_REMOTE -->
                <path d="M 1050 480 L 920 480 L 920 580" class="edge-yes" marker-end="url(#arrow-yes)"/>
                <text x="980" y="475" text-anchor="middle" class="text-label text-label-yes">SSH_REMOTE</text>

                <!-- SSH Mode -->
                <g id="ssh" class="mode-node" data-mode="ssh">
                    <rect x="840" y="580" width="160" height="70" rx="12" class="node-terminal ssh"/>
                    <text x="920" y="610" text-anchor="middle" class="text-terminal" fill="#ef4444">SSH Remote</text>
                    <text x="920" y="630" text-anchor="middle" class="text-terminal-sub">远程终端连接</text>
                </g>

                <!-- Branch: DIRECT_CONNECT -->
                <path d="M 1150 520 L 1150 560 L 1100 560 L 1100 580" class="edge-yes" marker-end="url(#arrow-yes)"/>
                <text x="1145" y="555" text-anchor="middle" class="text-label text-label-yes" style="font-size:9px;">DIRECT_CONNECT</text>

                <!-- Direct Connect Mode -->
                <g id="direct" class="mode-node" data-mode="direct">
                    <rect x="1020" y="580" width="160" height="70" rx="12" class="node-terminal direct"/>
                    <text x="1100" y="610" text-anchor="middle" class="text-terminal" fill="#ec4899">Direct Connect</text>
                    <text x="1100" y="630" text-anchor="middle" class="text-terminal-sub">cc:// URL 直连</text>
                </g>

                <!-- Branch: BRIDGE_MODE (SDK) -->
                <path d="M 1250 480 L 1380 480 L 1380 650 L 1250 650" class="edge-yes" marker-end="url(#arrow-yes)"/>
                <text x="1325" y="475" text-anchor="middle" class="text-label text-label-yes">BRIDGE_MODE</text>

                <!-- SDK Mode -->
                <g id="sdk" class="mode-node" data-mode="sdk">
                    <rect x="1090" y="650" width="160" height="70" rx="12" class="node-terminal sdk"/>
                    <text x="1170" y="680" text-anchor="middle" class="text-terminal" fill="#14b8a6">SDK</text>
                    <text x="1170" y="700" text-anchor="middle" class="text-terminal-sub">桥接模式</text>
                </g>

                <!-- No branch to Migration -->
                <path d="M 1050 480 L 750 480 L 750 550" class="edge-highlight" marker-end="url(#arrow-highlight)"/>
                <text x="890" y="475" text-anchor="middle" class="text-label" style="fill:#64748b;">默认路径 / Default</text>

                <!-- Migration Check -->
                <g id="migration">
                    <polygon points="750,550 850,590 750,630 650,590" class="node-diamond"/>
                    <text x="750" y="586" text-anchor="middle" class="text-diamond" style="font-size:11px;">迁移检查</text>
                    <text x="750" y="568" text-anchor="middle" class="text-sub" style="font-size:9px;">migrationVersion ≠ 11</text>
                </g>

                <!-- Migration Yes -->
                <path d="M 650 590 L 550 590 L 550 680 L 480 680" class="edge-yes" marker-end="url(#arrow-yes)"/>
                <text x="595" y="585" text-anchor="middle" class="text-label text-label-yes">需要迁移</text>

                <!-- Migration Chain -->
                <g id="migration-chain">
                    <rect x="320" y="660" width="160" height="40" rx="6" class="node-rect"/>
                    <text x="400" y="685" text-anchor="middle" class="text-main" style="font-size:11px;">执行迁移链</text>
                </g>

                <!-- Migration arrow to init -->
                <path d="M 400 700 L 400 730 L 600 730 L 600 700" class="edge" marker-end="url(#arrow)"/>

                <!-- Migration No / Default to REPL -->
                <path d="M 750 630 L 750 720" class="edge-highlight" marker-end="url(#arrow-highlight)"/>
                <text x="730" y="680" text-anchor="middle" class="text-label" style="fill:#3b82f6;font-weight:700;">默认</text>

                <!-- REPL Mode - Highlighted -->
                <g id="repl" class="mode-node pulse-animation" data-mode="repl">
                    <rect x="630" y="720" width="240" height="90" rx="16" class="node-terminal repl"/>
                    <text x="750" y="755" text-anchor="middle" class="text-terminal" fill="#3b82f6" style="font-size:20px;">REPL</text>
                    <text x="750" y="780" text-anchor="middle" class="text-terminal-sub">交互式命令行模式</text>
                    <text x="750" y="798" text-anchor="middle" class="text-label" style="fill:#3b82f6;font-size:10px;">★ 最常见路径 / Most Common</text>
                </g>

                <!-- Glow effect for REPL path -->
                <path d="M 700 70 L 700 100 L 800 140 L 950 140 L 950 240 L 1050 240 L 1250 240 L 1350 240 L 1350 480 L 1250 480 L 750 480 L 750 550 L 750 630 L 750 720" 
                      fill="none" stroke="url(#glow-gradient)" stroke-width="20" opacity="0.1" style="pointer-events:none;"/>

            </svg>

            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color repl"></div>
                    <span>REPL · 交互式命令行</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color headless"></div>
                    <span>Headless · 单次输出</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color sdk"></div>
                    <span>SDK · 桥接模式</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color coordinator"></div>
                    <span>Coordinator · 多 Worker</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color kairos"></div>
                    <span>KAIROS · Assistant</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color mcp"></div>
                    <span>MCP Serve · 服务器</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color ssh"></div>
                    <span>SSH Remote · 远程终端</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color direct"></div>
                    <span>Direct Connect · URL直连</span>
                </div>
            </div>
        </div>
    </div>

    <div class="tooltip" id="tooltip">
        <div class="tooltip-title" id="tooltip-title"></div>
        <div class="tooltip-trigger" id="tooltip-trigger"></div>
        <div class="tooltip-desc" id="tooltip-desc"></div>
    </div>

    <script>
        const modeData = {
            headless: {
                title: 'Headless Mode',
                trigger: 'Trigger: -p / --print 参数',
                desc: '单次调用输出后退出。适用于脚本集成、批处理任务和 CI/CD 流水线中的非交互式使用场景。'
            },
            mcp: {
                title: 'MCP Serve',
                trigger: 'Trigger: mcp serve 命令',
                desc: '启动 Model Context Protocol 服务器模式，为外部客户端提供标准化的 AI 能力接口。'
            },
            coordinator: {
                title: 'Coordinator Mode',
                trigger: 'Trigger: CLAUDE_CODE_COORDINATOR_MODE=1',
                desc: '多 Worker 编排模式，用于协调多个并行工作进程，处理大规模任务分发。'
            },
            kairos: {
                title: 'KAIROS Mode',
                trigger: 'Trigger: KAIROS 环境变量',
                desc: 'Assistant 专用模式 (ant-only)，为 Anthropic 内部 Assistant 产品提供定制化能力。'
            },
            ssh: {
                title: 'SSH Remote',
                trigger: 'Trigger: SSH_REMOTE Feature Flag',
                desc: '远程终端连接模式，允许通过 SSH 协议连接到远程 Claude Code 实例。'
            },
            direct: {
                title: 'Direct Connect',
                trigger: 'Trigger: DIRECT_CONNECT Feature Flag',
                desc: 'cc:// URL 直连模式，支持通过自定义协议直接连接到指定资源。'
            },
            sdk: {
                title: 'SDK Mode',
                trigger: 'Trigger: BRIDGE_MODE Feature Flag',
                desc: '桥接模式，为外部 SDK 提供集成接口，实现与第三方工具的深度整合。'
            },
            repl: {
                title: 'REPL Mode',
                trigger: 'Trigger: 默认路径 (无特殊参数)',
                desc: '交互式命令行模式，最常见路径。提供完整的对话式 AI 编程助手体验，支持上下文感知和代码编辑。'
            }
        };

        const tooltip = document.getElementById('tooltip');
        const tooltipTitle = document.getElementById('tooltip-title');
        const tooltipTrigger = document.getElementById('tooltip-trigger');
        const tooltipDesc = document.getElementById('tooltip-desc');

        document.querySelectorAll('.mode-node').forEach(node => {
            node.addEventListener('mouseenter', (e) => {
                const mode = node.dataset.mode;
                const data = modeData[mode];
                
                tooltipTitle.textContent = data.title;
                tooltipTrigger.textContent = data.trigger;
                tooltipDesc.textContent = data.desc;
                
                tooltip.classList.add('visible');
            });

            node.addEventListener('mousemove', (e) => {
                const rect = document.querySelector('.diagram-container').getBoundingClientRect();
                tooltip.style.left = (e.pageX + 20) + 'px';
                tooltip.style.top = (e.pageY - 10) + 'px';
            });

            node.addEventListener('mouseleave', () => {
                tooltip.classList.remove('visible');
            });
        });

        // Add subtle parallax effect on mouse move
        document.addEventListener('mousemove', (e) => {
            const bg = document.querySelector('.bg-gradient');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            bg.style.transform = `translate(${x * 20}px, ${y * 20}px)`;
        });
    </script>
</body>
</html>
