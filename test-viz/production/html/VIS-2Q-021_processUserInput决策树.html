#diagram-wrap {

svg {
  width: 100%;
  height: auto;
  display: block;

.node-rect {
  rx: 10;
  ry: 10;
  stroke-width: 2;
  transition: all 0.25s ease;
  cursor: pointer;
}
.node-rect:hover {
  filter: brightness(1.2);
  stroke-width: 3;
}

.node-diamond {
  transition: all 0.25s ease;
  cursor: pointer;
}
.node-diamond:hover {
  filter: brightness(1.2);
  stroke-width: 3;
}

.node-circle {
  transition: all 0.25s ease;
  cursor: pointer;
}
.node-circle:hover {
  filter: brightness(1.2);
  r: 16;
}

.path-line {
  fill: none;
  stroke-width: 2.5;
  stroke-linecap: round;
  opacity: 0.85;
}

.flow-pulse {
  fill: none;
  stroke-width: 3;
  stroke-linecap: round;
  opacity: 0;
  stroke-dasharray: 10 20;
  animation: flow 2s linear infinite;
}

@keyframes flow {
  0% { stroke-dashoffset: 30; opacity: 0.6; }
  100% { stroke-dashoffset: 0; opacity: 0; }
}

.label-group { pointer-events: none; }
.label-cn { font-size: 12px; font-weight: 700; fill: #fff; text-anchor: middle; }
.label-en { font-size: 9px; fill: rgba(255,255,255,0.75); text-anchor: middle; font-family: 'JetBrains Mono', monospace; }
.label-small { font-size: 10px; fill: #fff; text-anchor: middle; }
.label-tiny { font-size: 8px; fill: rgba(255,255,255,0.7); text-anchor: middle; }

.short-label {
  font-size: 11px;
  font-weight: 700;
  fill: var(--accent-short);
  text-anchor: start;
}

.param-panel {
  position: absolute;
  right: 10px;
  top: 10px;
  width: 220px;
  background: rgba(15, 52, 96, 0.95);
  border: 1px solid var(--accent-entry);
  border-radius: 10px;
  padding: 12px;
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  backdrop-filter: blur(6px);
  transition: max-height 0.3s ease, opacity 0.3s ease;
  max-height: 460px;
  overflow: hidden;
}

.param-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  margin-bottom: 8px;
  font-weight: 700;
  color: var(--accent-entry);
}

.param-list {
  display: grid;
  grid-template-columns: 1fr;
  gap: 4px;
  line-height: 1.4;
}

.param-item { color: var(--text-sub); border-bottom: 1px dotted rgba(255,255,255,0.1); padding-bottom: 2px; }

#param-toggle { display: none; }
#param-toggle:checked ~ .param-panel .param-list { display: none; }
#param-toggle:checked ~ .param-panel { max-height: 36px; }

.toggle-btn {
  width: 18px; height: 18px;
  border-radius: 4px;
  background: var(--accent-entry);
  color: var(--bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
}

.tooltip {
  position: absolute;
  background: rgba(0,0,0,0.9);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
  color: #fff;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s ease;
  max-width: 280px;
  z-index: 100;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.tooltip strong { color: var(--accent-entry); }

.hidden-msg {
  opacity: 0.55;
}

  <div class="tooltip" id="tooltip"></div>
</div>

<script>
  const tooltip = document.getElementById('tooltip');
  const svg = document.querySelector('svg');

  document.querySelectorAll('.node-group').forEach(group => {
    group.addEventListener('mouseenter', e => {
      const tip = group.getAttribute('data-tip');
      if (!tip) return;
      tooltip.innerHTML = tip.replace(/\n/g, '<br>');
      tooltip.style.opacity = '1';
    });
    group.addEventListener('mousemove', e => {
      const rect = document.getElementById('diagram-wrap').getBoundingClientRect();
      tooltip.style.left = (e.clientX - rect.left + 14) + 'px';
      tooltip.style.top = (e.clientY - rect.top + 14) + 'px';
    });
    group.addEventListener('mouseleave', () => {
      tooltip.style.opacity = '0';
    });
  });
</script>

</body>
</html>
