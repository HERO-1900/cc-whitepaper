<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StreamingToolExecutor 并发时序图</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+SC:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0c10;
      --panel: #0f1218;
      --api: #ffd93d;
      --engine: #00d4ff;
      --executor: #7b61ff;
      --read: #48bb78;
      --write: #ff6b6b;
      --text: #e6ebf0;
      --sub: #8a96a8;
      --grid: rgba(138, 150, 168, 0.08);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; }

    body {
      display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
      min-height: 100vh; padding: 32px 16px;
      background:
        radial-gradient(1200px 600px at 20% -10%, rgba(0, 212, 255, 0.07), transparent),
        radial-gradient(1000px 500px at 110% 30%, rgba(123, 97, 255, 0.08), transparent),
        repeating-linear-gradient(0deg, var(--grid) 0px, var(--grid) 1px, transparent 1px, transparent 60px),
        repeating-linear-gradient(90deg, var(--grid) 0px, var(--grid) 1px, transparent 1px, transparent 60px),
        var(--bg);
    }

    .stage {
      width: 100%; max-width: 1200px;
      background: rgba(15, 18, 24, 0.72);
      border: 1px solid rgba(138, 150, 168, 0.15);
      border-radius: 20px;
      padding: 28px 24px 18px;
      backdrop-filter: blur(10px);
      box-shadow: 0 24px 80px rgba(0,0,0,0.45);
    }

    h1 {
      margin: 0 0 6px; font-size: 22px; font-weight: 700; letter-spacing: 0.2px;
      font-family: 'Noto Serif SC', serif;
    }
    .subtitle { margin: 0 0 18px; color: var(--sub); font-size: 13px; font-family: 'JetBrains Mono', monospace; }

    .diagram-wrap { overflow-x: auto; width: 100%; }
    .diagram-wrap svg { display: block; margin: 0 auto; min-width: 1000px; }

    /* Sequence animations */
    .seq-obj, .seq-msg, .seq-act, .seq-zone, .seq-note, .seq-time {
      opacity: 0;
      animation: fadeIn .25s ease both;
    }
    @keyframes fadeIn { to { opacity: 1; } }

    .actor-box { filter: drop-shadow(0 6px 16px rgba(0,0,0,.35)); }
    .actor-text { font-family: 'Noto Serif SC', serif; font-size: 13px; font-weight: 700; }
    .actor-sub { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 500; fill: rgba(255,255,255,.72); }
    .msg-line { stroke-width: 2; fill: none; }
    .msg-text { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; fill: #cfd6e0; }
    .msg-text-sub { font-family: 'Space Grotesk', sans-serif; font-size: 10px; fill: var(--sub); }
    .act-bar { filter: drop-shadow(0 2px 6px rgba(0,0,0,.25)); }
    .life-line { stroke: rgba(138,150,168,.25); stroke-dasharray: 4 4; stroke-width: 1.2; }
    .time-text { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: var(--sub); }
    .zone-label { font-family: 'Noto Serif SC', serif; font-size: 11px; font-weight: 700; }

    /* stagger delays set via inline style in SVG */
  </style>
</head>
<body>
  <div class="stage">
    <h1>流式并发执行时序图</h1>
    <div class="subtitle">VIS-1-005 · Streaming Concurrency Sequence</div>

    <div class="diagram-wrap">
      <svg viewBox="0 0 1000 720" width="1000" height="720">
        <defs>
          <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#c0c8d0" />
          </marker>
          <marker id="arrow-api" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="var(--api)" />
          </marker>
          <marker id="arrow-engine" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="var(--engine)" />
          </marker>
          <marker id="arrow-executor" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="var(--executor)" />
          </marker>
          <marker id="arrow-read" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="var(--read)" />
          </marker>
          <marker id="arrow-write" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="var(--write)" />
          </marker>

          <linearGradient id="apiStreamGrad" x1="0" x2="1" y1="0" y2="0">
            <stop offset="0%" stop-color="var(--api)" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="var(--api)" stop-opacity="0.15"/>
          </linearGradient>

          <filter id="glow-api" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <!-- Background zones (parallel and exclusive) -->
        <!-- Parallel zone: between Tool A and Tool B lifelines, from ~y=240 to ~y=400 -->
        <rect class="seq-zone" x="540" y="232" width="280" height="176" rx="10" fill="rgba(72, 187, 120, 0.10)" stroke="rgba(72, 187, 120, 0.35)" stroke-width="1" style="animation-delay:1.6s" />
        <text class="seq-zone zone-label" x="680" y="248" text-anchor="middle" fill="rgba(72,187,120,.95)" style="animation-delay:1.7s">并发区间（只读并行）Concurrent Zone</text>

        <!-- Exclusive zone: around Tool C lifeline, from ~y=420 to ~y=540 -->
        <rect class="seq-zone" x="820" y="412" width="120" height="136" rx="10" fill="rgba(255, 107, 107, 0.10)" stroke="rgba(255, 107, 107, 0.35)" stroke-width="1" style="animation-delay:2.8s" />
        <text class="seq-zone zone-label" x="880" y="428" text-anchor="middle" fill="rgba(255,107,107,.95)" style="animation-delay:2.9s">独占区间（写操作串行）Exclusive Zone</text>

        <!-- Lifelines -->
        <!-- API x=120, Engine x=320, Executor x=480, ToolA x=620, ToolB x=740, ToolC x=880 -->
        <g class="seq-obj" style="animation-delay:.05s">
          <line class="life-line" x1="120" y1="110" x2="120" y2="620" />
          <line class="life-line" x1="320" y1="110" x2="320" y2="620" />
          <line class="life-line" x1="480" y1="110" x2="480" y2="620" />
          <line class="life-line" x1="620" y1="110" x2="620" y2="620" />
          <line class="life-line" x1="740" y1="110" x2="740" y2="620" />
          <line class="life-line" x1="880" y1="110" x2="880" y2="620" />
        </g>

        <!-- Actor boxes -->
        <g class="seq-obj actor-box" style="animation-delay:.1s">
          <!-- API -->
          <rect x="50" y="24" width="140" height="56" rx="12" fill="rgba(15,18,24,.92)" stroke="var(--api)" stroke-width="2" />
          <text class="actor-text" x="120" y="48" text-anchor="middle" fill="var(--api)">Anthropic API</text>
          <text class="actor-sub" x="120" y="66" text-anchor="middle">Stream Source</text>

          <!-- Engine -->
          <rect x="260" y="24" width="120" height="56" rx="12" fill="rgba(15,18,24,.92)" stroke="var(--engine)" stroke-width="2" />
          <text class="actor-text" x="320" y="48" text-anchor="middle" fill="var(--engine)">QueryEngine</text>
          <text class="actor-sub" x="320" y="66" text-anchor="middle">Dispatcher</text>

          <!-- Executor -->
          <rect x="420" y="24" width="120" height="56" rx="12" fill="rgba(15,18,24,.92)" stroke="var(--executor)" stroke-width="2" />
          <text class="actor-text" x="480" y="48" text-anchor="middle" fill="var(--executor)">StreamingToolExecutor</text>
          <text class="actor-sub" x="480" y="66" text-anchor="middle">Concurrency Controller</text>

          <!-- Tool A -->
          <rect x="560" y="24" width="120" height="56" rx="12" fill="rgba(15,18,24,.92)" stroke="var(--read)" stroke-width="2" />
          <text class="actor-text" x="620" y="48" text-anchor="middle" fill="var(--read)">Tool A</text>
          <text class="actor-sub" x="620" y="66" text-anchor="middle">Read 文件</text>

          <!-- Tool B -->
          <rect x="680" y="24" width="120" height="56" rx="12" fill="rgba(15,18,24,.92)" stroke="var(--read)" stroke-width="2" />
          <text class="actor-text" x="740" y="48" text-anchor="middle" fill="var(--read)">Tool B</text>
          <text class="actor-sub" x="740" y="66" text-anchor="middle">Grep 搜索</text>

          <!-- Tool C -->
          <rect x="820" y="24" width="120" height="56" rx="12" fill="rgba(15,18,24,.92)" stroke="var(--write)" stroke-width="2" />
          <text class="actor-text" x="880" y="48" text-anchor="middle" fill="var(--write)">Tool C</text>
          <text class="actor-sub" x="880" y="66" text-anchor="middle">Edit 文件</text>
        </g>

        <!-- API stream bar gradient activation -->
        <rect class="seq-act act-bar" x="112" y="130" width="16" height="340" rx="4" fill="url(#apiStreamGrad)" style="animation-delay:.2s" filter="url(#glow-api)" />

        <!-- Activation bars -->
        <!-- Engine: receiving stream 130-520; dispatching tools briefly ; collecting results 550-590 -->
        <rect class="seq-act act-bar" x="312" y="130" width="16" height="460" rx="3" fill="rgba(0,212,255,.18)" style="animation-delay:.25s" />
        <rect class="seq-act act-bar" x="312" y="550" width="16" height="50" rx="3" fill="var(--engine)" style="animation-delay:3.4s" />

        <!-- Executor: active from tool dispatch through result collection -->
        <rect class="seq-act act-bar" x="472" y="220" width="16" height="340" rx="3" fill="rgba(123,97,255,.22)" style="animation-delay:.9s" />

        <!-- Tool A active -->
        <rect class="seq-act act-bar" x="612" y="250" width="16" height="130" rx="3" fill="var(--read)" style="animation-delay:1.2s" />
        <!-- Tool B active -->
        <rect class="seq-act act-bar" x="732" y="290" width="16" height="130" rx="3" fill="var(--read)" style="animation-delay:1.5s" />
        <!-- Tool C active -->
        <rect class="seq-act act-bar" x="872" y="440" width="16" height="110" rx="3" fill="var(--write)" style="animation-delay:2.6s" />

        <!-- Messages -->
        <!-- a. API stream start -->
        <line class="seq-msg msg-line" x1="120" y1="140" x2="320" y2="140" stroke="var(--api)" marker-end="url(#arrow-api)" style="animation-delay:.3s" />
        <text class="seq-msg msg-text" x="220" y="134" text-anchor="middle" style="animation-delay:.35s">SSE stream start</text>

        <!-- b. API outputs tool_use block A -->
        <line class="seq-msg msg-line" x1="120" y1="180" x2="320" y2="180" stroke="var(--api)" marker-end="url(#arrow-api)" style="animation-delay:.5s" />
        <text class="seq-msg msg-text" x="220" y="174" text-anchor="middle" style="animation-delay:.55s">tool_use block A (Read)</text>

        <!-- QueryEngine -> Executor: submit Tool A -->
        <line class="seq-msg msg-line" x1="320" y1="220" x2="480" y2="220" stroke="var(--engine)" marker-end="url(#arrow-engine)" style="animation-delay:.7s" />
        <text class="seq-msg msg-text" x="400" y="214" text-anchor="middle" style="animation-delay:.75s">submit tool_use A</text>

        <!-- Executor -> Tool A: launch immediately (isReadOnly=true) -->
        <line class="seq-msg msg-line" x1="480" y1="250" x2="620" y2="250" stroke="var(--executor)" marker-end="url(#arrow-executor)" style="animation-delay:.9s" />
        <text class="seq-msg msg-text" x="550" y="244" text-anchor="middle" style="animation-delay:.95s">launch Tool A</text>
        <text class="seq-msg msg-text-sub" x="550" y="256" text-anchor="middle" style="animation-delay:.95s">isReadOnly = true</text>

        <!-- d. API continues: tool_use block B -->
        <line class="seq-msg msg-line" x1="120" y1="280" x2="320" y2="280" stroke="var(--api)" marker-end="url(#arrow-api)" style="animation-delay:1.1s" />
        <text class="seq-msg msg-text" x="220" y="274" text-anchor="middle" style="animation-delay:1.15s">tool_use block B (Grep)</text>

        <!-- Engine -> Executor: submit Tool B -->
        <line class="seq-msg msg-line" x1="320" y1="300" x2="480" y2="300" stroke="var(--engine)" marker-end="url(#arrow-engine)" style="animation-delay:1.25s" />
        <text class="seq-msg msg-text" x="400" y="294" text-anchor="middle" style="animation-delay:1.3s">submit tool_use B</text>

        <!-- Executor -> Tool B: launch (parallel) -->
        <line class="seq-msg msg-line" x1="480" y1="320" x2="740" y2="320" stroke="var(--executor)" marker-end="url(#arrow-executor)" style="animation-delay:1.4s" />
        <text class="seq-msg msg-text" x="610" y="314" text-anchor="middle" style="animation-delay:1.45s">launch Tool B</text>
        <text class="seq-msg msg-text-sub" x="610" y="326" text-anchor="middle" style="animation-delay:1.45s">isReadOnly = true · 并行</text>

        <!-- Tool A returns result -->
        <line class="seq-msg msg-line" x1="620" y1="380" x2="480" y2="380" stroke="var(--read)" stroke-dasharray="4 3" marker-end="url(#arrow-read)" style="animation-delay:1.8s" />
        <text class="seq-msg msg-text" x="550" y="374" text-anchor="middle" style="animation-delay:1.85s">tool_result A</text>

        <!-- Tool B returns result -->
        <line class="seq-msg msg-line" x1="740" y1="420" x2="480" y2="420" stroke="var(--read)" stroke-dasharray="4 3" marker-end="url(#arrow-read)" style="animation-delay:2.0s" />
        <text class="seq-msg msg-text" x="610" y="414" text-anchor="middle" style="animation-delay:2.05s">tool_result B</text>

        <!-- f. API outputs tool_use block C (Edit) -->
        <line class="seq-msg msg-line" x1="120" y1="400" x2="320" y2="400" stroke="var(--api)" marker-end="url(#arrow-api)" style="animation-delay:2.1s" />
        <text class="seq-msg msg-text" x="220" y="394" text-anchor="middle" style="animation-delay:2.15s">tool_use block C (Edit)</text>

        <!-- Engine -> Executor: submit Tool C -->
        <line class="seq-msg msg-line" x1="320" y1="420" x2="480" y2="420" stroke="var(--engine)" marker-end="url(#arrow-engine)" style="animation-delay:2.25s" />
        <text class="seq-msg msg-text" x="400" y="414" text-anchor="middle" style="animation-delay:2.3s">submit tool_use C</text>

        <!-- Executor -> Tool C: launch exclusively (waits for A/B) -->
        <line class="seq-msg msg-line" x1="480" y1="450" x2="880" y2="450" stroke="var(--executor)" marker-end="url(#arrow-executor)" style="animation-delay:2.45s" />
        <text class="seq-msg msg-text" x="680" y="444" text-anchor="middle" style="animation-delay:2.5s">launch Tool C</text>
        <text class="seq-msg msg-text-sub" x="680" y="456" text-anchor="middle" style="animation-delay:2.5s">isReadOnly = false · 独占执行</text>

        <!-- h. API stream ends -->
        <line class="seq-msg msg-line" x1="120" y1="470" x2="320" y2="470" stroke="var(--api)" marker-end="url(#arrow-api)" style="animation-delay:2.7s" />
        <text class="seq-msg msg-text" x="220" y="464" text-anchor="middle" style="animation-delay:2.75s">message_stop</text>

        <!-- i. Tool C returns result -->
        <line class="seq-msg msg-line" x1="880" y1="550" x2="480" y2="550" stroke="var(--write)" stroke-dasharray="4 3" marker-end="url(#arrow-write)" style="animation-delay:3.15s" />
        <text class="seq-msg msg-text" x="680" y="544" text-anchor="middle" style="animation-delay:3.2s">tool_result C</text>

        <!-- All results collected -> Engine -->
        <line class="seq-msg msg-line" x1="480" y1="580" x2="320" y2="580" stroke="var(--executor)" stroke-dasharray="4 3" marker-end="url(#arrow-executor)" style="animation-delay:3.35s" />
        <text class="seq-msg msg-text" x="400" y="574" text-anchor="middle" style="animation-delay:3.4s">all tool_results</text>

        <!-- j. Next loop starts -->
        <line class="seq-msg msg-line" x1="320" y1="610" x2="120" y2="610" stroke="var(--engine)" marker-end="url(#arrow-engine)" style="animation-delay:3.55s" />
        <text class="seq-msg msg-text" x="220" y="604" text-anchor="middle" style="animation-delay:3.6s">next iteration request</text>

        <!-- Time axis -->
        <line class="seq-time" x1="60" y1="620" x2="940" y2="620" stroke="rgba(138,150,168,.35)" stroke-width="1" style="animation-delay:3.7s" />
        <g class="seq-time" style="animation-delay:3.75s">
          <text class="time-text" x="120" y="642" text-anchor="middle">t0</text>
          <text class="time-text" x="320" y="642" text-anchor="middle">t1</text>
          <text class="time-text" x="480" y="642" text-anchor="middle">t2</text>
          <text class="time-text" x="620" y="642" text-anchor="middle">t3</text>
          <text class="time-text" x="740" y="642" text-anchor="middle">t4</text>
          <text class="time-text" x="880" y="642" text-anchor="middle">t5</text>
        </g>

        <!-- Legend -->
        <g class="seq-note" transform="translate(60, 660)" style="animation-delay:3.8s">
          <rect x="0" y="0" width="12" height="12" rx="2" fill="var(--api)" />
          <text class="msg-text" x="18" y="10" fill="#cfd6e0">API 流</text>

          <rect x="80" y="0" width="12" height="12" rx="2" fill="var(--read)" />
          <text class="msg-text" x="98" y="10" fill="#cfd6e0">只读工具</text>

          <rect x="170" y="0" width="12" height="12" rx="2" fill="var(--write)" />
          <text class="msg-text" x="188" y="10" fill="#cfd6e0">写操作工具</text>

          <line x1="270" y1="6" x2="300" y2="6" stroke="#c0c8d0" stroke-width="2" marker-end="url(#arrow)" />
          <text class="msg-text" x="308" y="10" fill="#cfd6e0">调用</text>

          <line x1="350" y1="6" x2="380" y2="6" stroke="#c0c8d0" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrow)" />
          <text class="msg-text" x="388" y="10" fill="#cfd6e0">返回</text>
        </g>
      </svg>
    </div>
  </div>
</body>
</html>
