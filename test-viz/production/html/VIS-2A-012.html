<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五层压缩瀑布图 | 5-Layer Compression Cascade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0c0f;
            --bg-mid: #111418;
            --bg-light: #1a1e24;
            --accent-1: #7dd3a8;
            --accent-2: #4ade80;
            --accent-3: #facc15;
            --accent-4: #fb923c;
            --accent-5: #dc2626;
            --accent-6: #991b1b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-tertiary: #64748b;
            --border-subtle: rgba(148, 163, 184, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Crimson Pro', 'Noto Serif SC', serif;
            color: var(--text-primary);
            overflow-x: auto;
            padding: 40px;
        }

        .container {
            width: 1200px;
            position: relative;
        }

        .title-section {
            text-align: center;
            margin-bottom: 48px;
        }

        .title-section h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--accent-3);
            margin-bottom: 16px;
        }

        .title-section h2 {
            font-size: 42px;
            font-weight: 600;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .title-section .subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            font-style: italic;
        }

        .diagram-wrapper {
            position: relative;
            padding: 0 80px;
        }

        .waterfall-svg {
            width: 100%;
            height: 720px;
        }

        .layer-rect {
            cursor: pointer;
            transition: all 0.3s ease;
            filter: drop-shadow(0 4px 20px rgba(0,0,0,0.4));
        }

        .layer-rect:hover {
            filter: drop-shadow(0 8px 32px rgba(0,0,0,0.6)) brightness(1.1);
            transform: translateY(-2px);
        }

        .layer-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 500;
            fill: var(--text-primary);
        }

        .layer-number {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            fill: var(--text-tertiary);
        }

        .layer-title-cn {
            font-family: 'Noto Serif SC', serif;
            font-size: 18px;
            font-weight: 600;
            fill: var(--text-primary);
        }

        .layer-title-en {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            fill: var(--text-secondary);
            letter-spacing: 0.05em;
        }

        .layer-desc {
            font-size: 13px;
            fill: var(--text-secondary);
        }

        .layer-metric {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            fill: var(--text-tertiary);
        }

        .divider-line {
            stroke: var(--text-tertiary);
            stroke-width: 1;
            stroke-dasharray: 6, 4;
            opacity: 0.5;
        }

        .divider-text {
            font-family: 'Noto Serif SC', serif;
            font-size: 12px;
            fill: var(--accent-3);
            font-style: italic;
        }

        .emergency-layer {
            stroke: var(--accent-5);
            stroke-width: 2;
            stroke-dasharray: 8, 4;
            fill: transparent;
            animation: pulse-border 2s ease-in-out infinite;
        }

        @keyframes pulse-border {
            0%, 100% { stroke-opacity: 0.6; }
            50% { stroke-opacity: 1; }
        }

        .emergency-fill {
            fill: rgba(220, 38, 38, 0.08);
        }

        .warning-icon {
            fill: var(--accent-5);
            animation: pulse-warning 1.5s ease-in-out infinite;
        }

        @keyframes pulse-warning {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .axis-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            fill: var(--text-tertiary);
            letter-spacing: 0.1em;
        }

        .axis-arrow {
            stroke: var(--text-tertiary);
            stroke-width: 1.5;
            fill: none;
            marker-end: url(#arrowhead);
        }

        .flow-indicator {
            stroke: var(--text-tertiary);
            stroke-width: 1.5;
            fill: none;
            marker-end: url(#arrowhead-down);
            stroke-dasharray: 4, 3;
            opacity: 0.4;
        }

        .intensity-bar {
            opacity: 0.15;
        }

        .connector-line {
            stroke: var(--text-tertiary);
            stroke-width: 1;
            opacity: 0.2;
        }

        .detail-panel {
            position: absolute;
            top: 0;
            right: 0;
            width: 280px;
            background: var(--bg-mid);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 24px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .detail-panel.active {
            opacity: 1;
        }

        .detail-panel h4 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--accent-3);
            margin-bottom: 8px;
            letter-spacing: 0.1em;
        }

        .detail-panel h3 {
            font-family: 'Noto Serif SC', serif;
            font-size: 20px;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        .detail-item {
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .detail-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .detail-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--text-tertiary);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .detail-value {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .bg-grid {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(148, 163, 184, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(148, 163, 184, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        .bg-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(250, 204, 21, 0.03) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
        }

        @media (max-width: 1280px) {
            .container {
                width: 100%;
                max-width: 1000px;
            }
            .diagram-wrapper {
                padding: 0 40px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>
    
    <div class="container">
        <div class="title-section">
            <h1>VIS-2A-012 · 五层压缩瀑布图</h1>
            <h2>上下文压缩层级</h2>
            <p class="subtitle">Context Compression Cascade · 从轻量到重量的渐进式压缩策略</p>
        </div>

        <div class="diagram-wrapper">
            <svg class="waterfall-svg" viewBox="0 0 1000 720" preserveAspectRatio="xMidYMid meet">
                <defs>
                    <linearGradient id="grad-1" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#7dd3a8"/>
                        <stop offset="100%" stop-color="#4ade80"/>
                    </linearGradient>
                    <linearGradient id="grad-2" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#4ade80"/>
                        <stop offset="100%" stop-color="#22c55e"/>
                    </linearGradient>
                    <linearGradient id="grad-3" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#facc15"/>
                        <stop offset="100%" stop-color="#eab308"/>
                    </linearGradient>
                    <linearGradient id="grad-4" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#fb923c"/>
                        <stop offset="100%" stop-color="#ea580c"/>
                    </linearGradient>
                    <linearGradient id="grad-5" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#f87171"/>
                        <stop offset="100%" stop-color="#dc2626"/>
                    </linearGradient>
                    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
                    </marker>
                    <marker id="arrowhead-down" markerWidth="10" markerHeight="7" refX="5" refY="6" orient="auto">
                        <polygon points="0 0, 3.5 10, 7 0" fill="#64748b"/>
                    </marker>
                    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                        <feMerge>
                            <feMergeNode in="coloredBlur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                </defs>

                <!-- 右侧强度轴 -->
                <line x1="920" y1="80" x2="920" y2="580" class="axis-arrow"/>
                <text x="935" y="85" class="axis-label" text-anchor="start">轻量</text>
                <text x="935" y="330" class="axis-label" text-anchor="start" style="fill: var(--accent-3);">→</text>
                <text x="935" y="585" class="axis-label" text-anchor="start">重量</text>

                <!-- Layer 1: Tool Result Trim -->
                <g class="layer-group" data-layer="1">
                    <rect x="300" y="80" width="200" height="75" rx="4" fill="url(#grad-1)" class="layer-rect" opacity="0.9"/>
                    <text x="320" y="105" class="layer-number">LAYER 01</text>
                    <text x="320" y="125" class="layer-title-cn">工具结果裁剪</text>
                    <text x="320" y="143" class="layer-title-en">Tool Result Trim</text>
                    <text x="460" y="120" class="layer-desc" text-anchor="end">
                        <tspan x="480" dy="0">触发: 结果超maxResultSizeChars</tspan>
                        <tspan x="480" dy="18">操作: 截断超大工具结果</tspan>
                    </text>
                    <text x="460" y="135" class="layer-metric" text-anchor="end">压缩率: 低 | 代价: 最小</text>
                </g>

                <!-- Flow arrow -->
                <path d="M 400 155 L 400 165" class="flow-indicator"/>

                <!-- Layer 2: History Snip -->
                <g class="layer-group" data-layer="2">
                    <rect x="280" y="170" width="240" height="75" rx="4" fill="url(#grad-2)" class="layer-rect" opacity="0.92"/>
                    <text x="300" y="195" class="layer-number">LAYER 02</text>
                    <text x="300" y="215" class="layer-title-cn">历史片段剪裁</text>
                    <text x="300" y="233" class="layer-title-en">History Snip</text>
                    <text x="500" y="210" class="layer-desc" text-anchor="end">
                        <tspan x="500" dy="0">触发: HISTORY_SNIP标记</tspan>
                        <tspan x="500" dy="18">操作: 移除不重要历史片段</tspan>
                    </text>
                    <text x="500" y="225" class="layer-metric" text-anchor="end">压缩率: 中低 | 代价: 小</text>
                </g>

                <!-- Flow arrow -->
                <path d="M 400 245 L 400 255" class="flow-indicator"/>

                <!-- Layer 3: Micro-compact -->
                <g class="layer-group" data-layer="3">
                    <rect x="260" y="260" width="280" height="75" rx="4" fill="url(#grad-3)" class="layer-rect" opacity="0.95"/>
                    <text x="280" y="285" class="layer-number" style="fill: #713f12;">LAYER 03</text>
                    <text x="280" y="305" class="layer-title-cn" style="fill: #713f12;">微压缩</text>
                    <text x="280" y="323" class="layer-title-en" style="fill: #92400e;">Micro-compact</text>
                    <text x="520" y="300" class="layer-desc" text-anchor="end" style="fill: #713f12;">
                        <tspan x="520" dy="0">触发: 冗余标记存在</tspan>
                        <tspan x="520" dy="18">操作: 消除模板语言和重复</tspan>
                    </text>
                    <text x="520" y="315" class="layer-metric" text-anchor="end" style="fill: #92400e;">压缩率: 中低 | 代价: 小</text>
                </g>

                <!-- 99%分割线 -->
                <line x1="200" y1="350" x2="600" y2="350" class="divider-line"/>
                <text x="400" y="365" class="divider-text" text-anchor="middle">99% 的情况到这里就足够了</text>
                <text x="400" y="380" class="divider-text" text-anchor="middle" style="font-size: 10px; fill: var(--text-tertiary);">99% cases stop here</text>

                <!-- Layer 4: Context Collapse -->
                <g class="layer-group" data-layer="4">
                    <rect x="240" y="395" width="320" height="75" rx="4" fill="url(#grad-4)" class="layer-rect"/>
                    <text x="260" y="420" class="layer-number">LAYER 04</text>
                    <text x="260" y="440" class="layer-title-cn">上下文折叠</text>
                    <text x="260" y="458" class="layer-title-en">Context Collapse</text>
                    <text x="540" y="435" class="layer-desc" text-anchor="end">
                        <tspan x="540" dy="0">触发: CONTEXT_COLLAPSE标记</tspan>
                        <tspan x="540" dy="18">操作: 旧对话替换为AI摘要</tspan>
                    </text>
                    <text x="540" y="450" class="layer-metric" text-anchor="end">压缩率: 中高 | 代价: 信息有损</text>
                </g>

                <!-- Flow arrow -->
                <path d="M 400 470 L 400 480" class="flow-indicator"/>

                <!-- Layer 5: Auto Full Compress -->
                <g class="layer-group" data-layer="5">
                    <rect x="220" y="500" width="360" height="75" rx="4" fill="url(#grad-5)" class="layer-rect" filter="url(#glow)"/>
                    <text x="240" y="525" class="layer-number">LAYER 05</text>
                    <text x="240" y="545" class="layer-title-cn">自动全文压缩</text>
                    <text x="240" y="563" class="layer-title-en">Auto Full Compress</text>
                    <text x="560" y="540" class="layer-desc" text-anchor="end">
                        <tspan x="560" dy="0">触发: Token超阈值</tspan>
                        <tspan x="560" dy="18">操作: 新AI实例总结整段对话</tspan>
                    </text>
                    <text x="560" y="555" class="layer-metric" text-anchor="end">压缩率: 高(1/3~1/5) | 代价: API调用+缓存失效</text>
                </g>

                <!-- Emergency Layer 6 -->
                <g class="layer-group" data-layer="6">
                    <rect x="240" y="610" width="320" height="85" rx="4" class="emergency-layer"/>
                    <rect x="245" y="615" width="310" height="75" rx="2" class="emergency-fill"/>
                    
                    <!-- Warning icon -->
                    <g transform="translate(255, 630)">
                        <path class="warning-icon" d="M 8 0 L 16 14 L 0 14 Z" transform="scale(1.2)"/>
                        <text x="9.6" y="12" text-anchor="middle" fill="var(--bg-dark)" font-size="10" font-weight="bold">!</text>
                    </g>
                    
                    <text x="280" y="635" class="layer-number" style="fill: var(--accent-5);">LAYER 06 · EMERGENCY</text>
                    <text x="280" y="655" class="layer-title-cn" style="fill: #fca5a5;">紧急响应压缩</text>
                    <text x="280" y="673" class="layer-title-en" style="fill: #f87171;">Reactive Compact</text>
                    <text x="540" y="650" class="layer-desc" text-anchor="end" style="fill: #fca5a5;">
                        <tspan x="540" dy="0">触发: API返回413错误</tspan>
                        <tspan x="540" dy="18">操作: 紧急全文摘要后重试(仅一次)</tspan>
                    </text>
                    <text x="540" y="665" class="layer-metric" text-anchor="end" style="fill: var(--accent-5);">代价: 最高 · 仅尝试一次</text>
                </g>

                <!-- 左侧说明 -->
                <text x="80" y="115" class="axis-label" text-anchor="middle" transform="rotate(-90, 80, 115)">轻量压缩层</text>
                <text x="80" y="537" class="axis-label" text-anchor="middle" transform="rotate(-90, 80, 537)">重量压缩层</text>
                
                <!-- 侧边连接线 -->
                <line x1="120" y1="80" x2="120" y2="335" class="connector-line"/>
                <line x1="120" y1="395" x2="120" y2="575" class="connector-line"/>
                
                <!-- 底部说明 -->
                <text x="400" y="710" class="layer-metric" text-anchor="middle" style="font-size: 11px;">
                    压缩改变消息内容将破坏Prompt Cache前缀 | 不压缩将导致context window溢出
                </text>
            </svg>

            <div class="detail-panel" id="detailPanel">
                <h4 id="detailLayerNum">LAYER 01</h4>
                <h3 id="detailTitle">工具结果裁剪</h3>
                <div class="detail-item">
                    <div class="detail-label">触发条件 / Trigger</div>
                    <div class="detail-value" id="detailTrigger">工具结果超maxResultSizeChars</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">操作内容 / Operation</div>
                    <div class="detail-value" id="detailOperation">截断超大工具结果</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">压缩率 / Ratio</div>
                    <div class="detail-value" id="detailRatio">低（只砍大的）</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">代价 / Cost</div>
                    <div class="detail-value" id="detailCost">最小</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const layerData = {
            1: {
                num: 'LAYER 01',
                title: '工具结果裁剪',
                trigger: '工具结果超maxResultSizeChars',
                operation: '截断超大工具结果',
                ratio: '低（只砍大的）',
                cost: '最小'
            },
            2: {
                num: 'LAYER 02',
                title: '历史片段剪裁',
                trigger: '存在HISTORY_SNIP标记的消息',
                operation: '移除不重要的历史片段',
                ratio: '中低',
                cost: '小'
            },
            3: {
                num: 'LAYER 03',
                title: '微压缩',
                trigger: '存在冗余标记',
                operation: '消除模板语言和重复内容',
                ratio: '中低',
                cost: '小（不改变语义）'
            },
            4: {
                num: 'LAYER 04',
                title: '上下文折叠',
                trigger: 'CONTEXT_COLLAPSE标记',
                operation: '旧对话段替换为AI生成摘要',
                ratio: '中高',
                cost: '信息有损'
            },
            5: {
                num: 'LAYER 05',
                title: '自动全文压缩',
                trigger: 'Token超阈值',
                operation: '新AI实例总结整段对话',
                ratio: '高（1/3到1/5）',
                cost: '额外API调用+缓存失效'
            },
            6: {
                num: 'LAYER 06 · EMERGENCY',
                title: '紧急响应压缩',
                trigger: 'API返回413错误',
                operation: '紧急全文摘要然后重试（只一次）',
                ratio: '极高',
                cost: '最高'
            }
        };

        const detailPanel = document.getElementById('detailPanel');
        const layerGroups = document.querySelectorAll('.layer-group');

        layerGroups.forEach(group => {
            group.addEventListener('mouseenter', (e) => {
                const layerNum = group.getAttribute('data-layer');
                const data = layerData[layerNum];
                
                document.getElementById('detailLayerNum').textContent = data.num;
                document.getElementById('detailTitle').textContent = data.title;
                document.getElementById('detailTrigger').textContent = data.trigger;
                document.getElementById('detailOperation').textContent = data.operation;
                document.getElementById('detailRatio').textContent = data.ratio;
                document.getElementById('detailCost').textContent = data.cost;
                
                detailPanel.classList.add('active');
            });

            group.addEventListener('mouseleave', () => {
                detailPanel.classList.remove('active');
            });
        });

        // 动画效果
        document.addEventListener('DOMContentLoaded', () => {
            const layers = document.querySelectorAll('.layer-group');
            layers.forEach((layer, index) => {
                layer.style.opacity = '0';
                layer.style.transform = 'translateY(-20px)';
                layer.style.transition = 'all 0.5s ease';
                
                setTimeout(() => {
                    layer.style.opacity = '1';
                    layer.style.transform = 'translateY(0)';
                }, index * 150);
            });
        });
    </script>
</body>
</html>
