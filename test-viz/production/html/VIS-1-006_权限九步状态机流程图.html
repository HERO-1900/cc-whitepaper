<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>权限九步状态机 | 9-Step Permission State Machine</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=Space+Mono:wght@400;700&family=Outfit:wght@400;600;800&display=swap');

:root {
  --bg-deep: #0a0f1a;
  --bg-panel: #111827;
  --accent-blue: #00d4ff;
  --accent-red: #ff6b6b;
  --accent-green: #48bb78;
  --accent-gold: #ffd93d;
  --text-primary: #f0f4f8;
  --text-secondary: #94a3b8;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
}

/* Atmospheric background */
.noise {
  position: fixed;
  inset: 0;
  opacity: 0.04;
  pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  z-index: 0;
}

.grid-bg {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(0,212,255,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 90%, rgba(255,107,107,0.06) 0%, transparent 50%),
    linear-gradient(180deg, transparent 0%, rgba(0,212,255,0.03) 50%, transparent 100%);
  background-size: 100% 100%, 100% 100%, 40px 40px;
}

header {
  position: relative;
  z-index: 10;
  text-align: center;
  padding: 48px 24px 24px;
  max-width: 800px;
}

header h1 {
  font-family: 'Noto Serif SC', serif;
  font-size: clamp(1.6rem, 5vw, 2.4rem);
  font-weight: 700;
  letter-spacing: 0.05em;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

header .subtitle {
  font-family: 'Space Mono', monospace;
  font-size: 0.85rem;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.15em;
}

.chart-wrapper {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 900px;
  padding: 0 16px 64px;
  display: flex;
  justify-content: center;
}

svg {
  width: 100%;
  height: auto;
  max-width: 800px;
  filter: drop-shadow(0 20px 60px rgba(0,0,0,0.6));
}

.step-group { cursor: pointer; }
.step-group:hover .diamond-shape { filter: brightness(1.15); }
.step-group:hover .step-badge { transform: scale(1.1); }

.diamond-shape { transition: all 0.3s ease; }
.step-badge { transition: transform 0.3s ease; }

.pass-line, .reject-line, .shortcut-line {
  stroke-dasharray: 600;
  stroke-dashoffset: 600;
  animation: drawLine 1.5s ease forwards;
}

.shortcut-line { animation-delay: 0.8s; }

@keyframes drawLine {
  to { stroke-dashoffset: 0; }
}

.label-appear {
  opacity: 0;
  animation: fadeIn 0.6s ease forwards;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

/* Staggered delays */
.s1 .label-appear { animation-delay: 0.1s; }
.s2 .label-appear { animation-delay: 0.2s; }
.s3 .label-appear { animation-delay: 0.3s; }
.s4 .label-appear { animation-delay: 0.4s; }
.s5 .label-appear { animation-delay: 0.5s; }
.s6 .label-appear { animation-delay: 0.6s; }
.s7 .label-appear { animation-delay: 0.7s; }
.s8 .label-appear { animation-delay: 0.8s; }
.s9 .label-appear { animation-delay: 0.9s; }

.execute-box { animation-delay: 1s; }
.deny-column { animation-delay: 1.1s; }

.legend {
  position: relative;
  z-index: 10;
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  justify-content: center;
  padding: 0 24px 48px;
  font-size: 0.8rem;
  color: var(--text-secondary);
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Space Mono', monospace;
}

.legend-line {
  width: 20px;
  height: 3px;
  border-radius: 2px;
}

.legend-line.pass { background: var(--accent-green); }
.legend-line.reject { background: var(--accent-red); }
.legend-line.shortcut { background: repeating-linear-gradient(90deg, var(--accent-gold), var(--accent-gold) 4px, transparent 4px, transparent 8px); height: 3px; border: none; }
</style>
</head>
<body>
<div class="noise"></div>
<div class="grid-bg"></div>

<header>
  <h1>权限九步状态机</h1>
  <div class="subtitle">9-Step Permission State Machine</div>
</header>

<div class="chart-wrapper">
<svg viewBox="0 0 820 1480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradStep1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#00a8cc"/>
    </linearGradient>
    <linearGradient id="gradStep2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00b4d8"/>
      <stop offset="100%" stop-color="#0096c7"/>
    </linearGradient>
    <linearGradient id="gradStep3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0096c7"/>
      <stop offset="100%" stop-color="#4895ef"/>
    </linearGradient>
    <linearGradient id="gradStep4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4895ef"/>
      <stop offset="100%" stop-color="#7c6fae"/>
    </linearGradient>
    <linearGradient id="gradStep5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c6fae"/>
      <stop offset="100%" stop-color="#b08ea7"/>
    </linearGradient>
    <linearGradient id="gradStep6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c77d8f"/>
      <stop offset="100%" stop-color="#e06c75"/>
    </linearGradient>
    <linearGradient id="gradStep7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e06c75"/>
      <stop offset="100%" stop-color="#f06575"/>
    </linearGradient>
    <linearGradient id="gradStep8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f06575"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
    <linearGradient id="gradStep9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ff4757"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#48bb78"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff6b6b"/>
    </marker>
    <marker id="arrow-gold" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ffd93d"/>
    </marker>
    <pattern id="shieldPattern" width="10" height="10" patternUnits="userSpaceOnUse">
      <rect width="10" height="10" fill="none"/>
    </pattern>
  </defs>

  <!-- Deny Column Background -->
  <g class="deny-column label-appear">
    <rect x="40" y="120" width="160" height="1200" rx="12" fill="#1a0f14" stroke="#ff6b6b" stroke-width="1" stroke-opacity="0.2"/>
    <text x="120" y="170" text-anchor="middle" fill="#ff6b6b" font-size="14" font-weight="700" font-family="Noto Serif SC, serif">拒绝汇总</text>
    <text x="120" y="190" text-anchor="middle" fill="#ff6b6b" font-size="10" font-family="Space Mono, monospace" opacity="0.8">DENIED ZONE</text>
  </g>

  <!-- Start -->
  <g transform="translate(410, 80)">
    <rect x="-80" y="-20" width="160" height="40" rx="20" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
    <text y="5" text-anchor="middle" fill="#f0f4f8" font-size="13" font-weight="600">tool_use 请求</text>
    <text y="18" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Space Mono, monospace">INCOMING REQUEST</text>
  </g>
  <line x1="410" y1="100" x2="410" y2="140" stroke="#64748b" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Step 1 -->
  <g class="step-group s1" transform="translate(410, 180)">
    <circle class="step-badge" cx="-50" cy="-35" r="14" fill="#0a0f1a" stroke="url(#gradStep1)" stroke-width="2"/>
    <text x="-50" y="-31" text-anchor="middle" fill="#00d4ff" font-size="12" font-weight="700">1</text>
    <polygon class="diamond-shape" points="0,-50 80,0 0,50 -80,0" fill="rgba(17,24,39,0.9)" stroke="url(#gradStep1)" stroke-width="2.5"/>
    <text y="-6" text-anchor="middle" fill="#f0f4f8" font-size="12" font-weight="600">工具存在性检查</text>
    <text y="10" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Space Mono, monospace">TOOL EXISTENCE</text>
    <text x="90" y="5" text-anchor="start" fill="#64748b" font-size="9">查 toolRegistry</text>
  </g>
  <line class="pass-line" x1="410" y1="230" x2="410" y2="270" stroke="#48bb78" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <line class="reject-line" x1="370" y1="180" x2="200" y2="180" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrow-red)"/>
  <g transform="translate(120, 180)">
    <text y="-6" text-anchor="middle" fill="#ff6b6b" font-size="10" font-weight="600">未知工具</text>
    <text y="8" text-anchor="middle" fill="#ff6b6b" font-size="8" font-family="Space Mono, monospace">UNKNOWN</text>
  </g>

  <!-- Step 2 -->
  <g class="step-group s2" transform="translate(410, 310)">
    <circle class="step-badge" cx="-50" cy="-35" r="14" fill="#0a0f1a" stroke="url(#gradStep2)" stroke-width="2"/>
    <text x="-50" y="-31" text-anchor="middle" fill="#00b4d8" font-size="12" font-weight="700">2</text>
    <polygon class="diamond-shape" points="0,-50 80,0 0,50 -80,0" fill="rgba(17,24,39,0.9)" stroke="url(#gradStep2)" stroke-width="2.5"/>
    <text y="-6" text-anchor="middle" fill="#f0f4f8" font-size="12" font-weight="600">工具可用性检查</text>
    <text y="10" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Space Mono, monospace">MODE AVAILABILITY</text>
    <text x="90" y="5" text-anchor="start" fill="#64748b" font-size="9">plan模式禁用写工具</text>
  </g>
  <line class="pass-line" x1="410" y1="360" x2="410" y2="400" stroke="#48bb78" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <line class="reject-line" x1="370" y1="310" x2="200" y2="310" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrow-red)"/>
  <g transform="translate(120, 310)">
    <text y="-6" text-anchor="middle" fill="#ff6b6b" font-size="10" font-weight="600">当前模式不支持</text>
    <text y="8" text-anchor="middle" fill="#ff6b6b" font-size="8" font-family="Space Mono, monospace">MODE DISABLED</text>
  </g>

  <!-- Step 3 -->
  <g class="step-group s3" transform="translate(410, 440)">
    <circle class="step-badge" cx="-50" cy="-35" r="14" fill="#0a0f1a" stroke="url(#gradStep3)" stroke-width="2"/>
    <text x="-50" y="-31" text-anchor="middle" fill="#4895ef" font-size="12" font-weight="700">3</text>
    <polygon class="diamond-shape" points="0,-50 80,0 0,50 -80,0" fill="rgba(17,24,39,0.9)" stroke="url(#gradStep3)" stroke-width="2.5"/>
    <text y="-6" text-anchor="middle" fill="#f0f4f8" font-size="12" font-weight="600">企业策略检查</text>
    <text y="10" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Space Mono, monospace">ENTERPRISE POLICY</text>
    <text x="90" y="5" text-anchor="start" fill="#64748b" font-size="9">MDM / 远程策略</text>
    <!-- Priority badge -->
    <rect x="-30" y="60" width="60" height="18" rx="9" fill="#ff6b6b" fill-opacity="0.15" stroke="#ff6b6b" stroke-width="1"/>
    <text y="73" text-anchor="middle" fill="#ff6b6b" font-size="8" font-weight="700" font-family="Space Mono, monospace">MAX PRIORITY</text>
  </g>
  <line class="pass-line" x1="410" y1="490" x2="410" y2="530" stroke="#48bb78" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <line class="reject-line" x1="370" y1="440" x2="200" y2="440" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrow-red)"/>
  <g transform="translate(120, 440)">
    <text y="-6" text-anchor="middle" fill="#ff6b6b" font-size="10" font-weight="600">企业策略禁止</text>
    <text y="8" text-anchor="middle" fill="#ff6b6b" font-size="8" font-family="Space Mono, monospace">POLICY BLOCK</text>
  </g>

  <!-- Step 4 -->
  <g class="step-group s4" transform="translate(410, 570)">
    <circle class="step-badge" cx="-50" cy="-35" r="14" fill="#0a0f1a" stroke="url(#gradStep4)" stroke-width="2"/>
    <text x="-50" y="-31" text-anchor="middle" fill="#7c6fae" font-size="12" font-weight="700">4</text>
    <polygon class="diamond-shape" points="0,-50 80,0 0,50 -80,0" fill="rgba(17,24,39,0.9)" stroke="url(#gradStep4)" stroke-width="2.5"/>
    <text y="-6" text-anchor="middle" fill="#f0f4f8" font-size="12" font-weight="600">沙箱检查</text>
    <text y="10" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Space Mono, monospace">SANDBOX CHECK</text>
    <text x="90" y="5" text-anchor="start" fill="#64748b" font-size="9">操作是否在允许范围</text>
  </g>
  <line class="pass-line" x1="410" y1="620" x2="410" y2="660" stroke="#48bb78" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <line class="reject-line" x1="370" y1="570" x2="200" y2="570" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrow-red)"/>
  <g transform="translate(120, 570)">
    <text y="-6" text-anchor="middle" fill="#ff6b6b" font-size="10" font-weight="600">沙箱限制</text>
    <text y="8" text-anchor="middle" fill="#ff6b6b" font-size="8" font-family="Space Mono, monospace">SANDBOX DENY</text>
  </g>

  <!-- Step 5 -->
  <g class="step-group s5" transform="translate(410, 700)">
    <circle class="step-badge" cx="-50" cy="-35" r="14" fill="#0a0f1a" stroke="url(#gradStep5)" stroke-width="2"/>
    <text x="-50" y="-31" text-anchor="middle" fill="#b08ea7" font-size="12" font-weight="700">5</text>
    <polygon class="diamond-shape" points="0,-50 80,0 0,50 -80,0" fill="rgba(17,24,39,0.9)" stroke="url(#gradStep5)" stroke-width="2.5"/>
    <text y="-6" text-anchor="middle" fill="#f0f4f8" font-size="12" font-weight="600">只读快速通道</text>
    <text y="10" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Space Mono, monospace">READ-ONLY FAST PATH</text>
  </g>
  <!-- Pass to step 6 -->
  <line class="pass-line" x1="410" y1="750" x2="410" y2="790" stroke="#48bb78" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <!-- Reject (non-readonly) continues normally, no left reject -->
  <!-- Golden shortcut to Execute -->
  <path class="shortcut-line" d="M 490 700 Q 620 700 620 1300" fill="none" stroke="#ffd93d" stroke-width="2.5" stroke-dasharray="6,4" marker-end="url(#arrow-gold)"/>
  <g transform="translate(640, 1000)">
    <rect x="0" y="-12" width="80" height="24" rx="12" fill="rgba(255,217,61,0.1)" stroke="#ffd93d" stroke-width="1"/>
    <text x="40" y="4" text-anchor="middle" fill="#ffd93d" font-size="9" font-weight="600" font-family="Space Mono, monospace">READ-ONLY = true</text>
  </g>

  <!-- Step 6 -->
  <g class="step-group s6" transform="translate(410, 830)">
    <circle class="step-badge" cx="-50" cy="-35" r="14" fill="#0a0f1a" stroke="url(#gradStep6)" stroke-width="2"/>
    <text x="-50" y="-31" text-anchor="middle" fill="#e06c75" font-size="12" font-weight="700">6</text>
    <polygon class="diamond-shape" points="0,-50 80,0 0,50 -80,0" fill="rgba(17,24,39,0.9)" stroke="url(#gradStep6)" stroke-width="2.5"/>
    <text y="-6" text-anchor="middle" fill="#f0f4f8" font-size="12" font-weight="600">权限规则匹配</text>
    <text y="10" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Space Mono, monospace">RULE MATCHING</text>
    <text x="90" y="5" text-anchor="start" fill="#64748b" font-size="9">allow / deny 规则</text>
  </g>
  <!-- Allow shortcut -->
  <path class="pass-line" d="M 490 830 Q 560 830 560 1300" fill="none" stroke="#48bb78" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <g transform="translate(575, 1080)">
    <text y="0" text-anchor="start" fill="#48bb78" font-size="9" font-family="Space Mono, monospace">MATCH ALLOW</text>
  </g>
  <!-- Deny shortcut -->
  <path class="reject-line" d="M 330 830 Q 260 830 260 440 L 200 440" fill="none" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrow-red)"/>
  <g transform="translate(250, 620)">
    <text y="0" text-anchor="middle" fill="#ff6b6b" font-size="9" font-family="Space Mono, monospace">MATCH DENY</text>
  </g>
  <line class="pass-line" x1="410" y1="880" x2="410" y2="920" stroke="#48bb78" stroke-width="2.5" marker-end="url(#arrow-green)"/>

  <!-- Step 7 -->
  <g class="step-group s7" transform="translate(410, 960)">
    <circle class="step-badge" cx="-50" cy="-35" r="14" fill="#0a0f1a" stroke="url(#gradStep7)" stroke-width="2"/>
    <text x="-50" y="-31" text-anchor="middle" fill="#f06575" font-size="12" font-weight="700">7</text>
    <polygon class="diamond-shape" points="0,-50 80,0 0,50 -80,0" fill="rgba(17,24,39,0.9)" stroke="url(#gradStep7)" stroke-width="2.5"/>
    <text y="-6" text-anchor="middle" fill="#f0f4f8" font-size="12" font-weight="600">权限模式判断</text>
    <text y="10" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Space Mono, monospace">PERMISSION MODE</text>
    <text x="90" y="5" text-anchor="start" fill="#64748b" font-size="9">default / auto / bypass</text>
  </g>
  <!-- auto/bypass -> Execute -->
  <path class="pass-line" d="M 490 960 Q 540 960 540 1300" fill="none" stroke="#48bb78" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <g transform="translate(550, 1140)">
    <text y="0" text-anchor="start" fill="#48bb78" font-size="9" font-family="Space Mono, monospace">AUTO / BYPASS</text>
  </g>
  <line class="pass-line" x1="410" y1="1010" x2="410" y2="1050" stroke="#48bb78" stroke-width="2.5" marker-end="url(#arrow-green)"/>

  <!-- Step 8: Iron Gate -->
  <g class="step-group s8" transform="translate(410, 1090)">
    <circle class="step-badge" cx="-50" cy="-35" r="14" fill="#0a0f1a" stroke="#ff6b6b" stroke-width="2"/>
    <text x="-50" y="-31" text-anchor="middle" fill="#ff6b6b" font-size="12" font-weight="700">8</text>
    <polygon class="diamond-shape" points="0,-50 80,0 0,50 -80,0" fill="rgba(26,15,20,0.95)" stroke="#ff6b6b" stroke-width="4" filter="url(#glow)"/>
    <text y="-6" text-anchor="middle" fill="#f0f4f8" font-size="12" font-weight="600">Iron Gate 检查</text>
    <text y="10" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Space Mono, monospace">BYPASS-IMMUNE CHECK</text>
    <!-- Shield Icon -->
    <g transform="translate(0, -85) scale(0.7)">
      <path d="M0,-15 C0,-15 -12,-10 -12,-2 C-12,8 -2,18 0,20 C2,18 12,8 12,-2 C12,-10 0,-15 0,-15 Z" fill="none" stroke="#ff6b6b" stroke-width="2.5"/>
      <path d="M0,-12 C0,-12 -9,-8 -9,-2 C-9,6 -1,14 0,16 C1,14 9,6 9,-2 C9,-8 0,-12 0,-12 Z" fill="#ff6b6b" fill-opacity="0.2"/>
    </g>
    <text x="45" y="-75" text-anchor="start" fill="#ff6b6b" font-size="10" font-weight="700" font-family="Space Mono, monospace">SHIELD</text>
  </g>
  <line class="pass-line" x1="410" y1="1140" x2="410" y2="1180" stroke="#48bb78" stroke-width="2.5" marker-end="url(#arrow-green)"/>

  <!-- Step 9 -->
  <g class="step-group s9" transform="translate(410, 1220)">
    <circle class="step-badge" cx="-50" cy="-35" r="14" fill="#0a0f1a" stroke="url(#gradStep9)" stroke-width="2"/>
    <text x="-50" y="-31" text-anchor="middle" fill="#ff4757" font-size="12" font-weight="700">9</text>
    <polygon class="diamond-shape" points="0,-50 80,0 0,50 -80,0" fill="rgba(17,24,39,0.9)" stroke="url(#gradStep9)" stroke-width="2.5"/>
    <text y="-6" text-anchor="middle" fill="#f0f4f8" font-size="12" font-weight="600">用户交互确认</text>
    <text y="10" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Space Mono, monospace">USER CONFIRMATION</text>
    <text x="90" y="5" text-anchor="start" fill="#64748b" font-size="9">Allow / Deny / Always</text>
  </g>
  <line class="pass-line" x1="410" y1="1270" x2="410" y2="1310" stroke="#48bb78" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <line class="reject-line" x1="370" y1="1220" x2="200" y2="1220" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrow-red)"/>
  <g transform="translate(120, 1220)">
    <text y="-6" text-anchor="middle" fill="#ff6b6b" font-size="10" font-weight="600">用户拒绝</text>
    <text y="8" text-anchor="middle" fill="#ff6b6b" font-size="8" font-family="Space Mono, monospace">USER DENY</text>
  </g>

  <!-- Execute -->
  <g class="execute-box label-appear" transform="translate(410, 1360)">
    <rect x="-90" y="-30" width="180" height="60" rx="16" fill="rgba(72,187,120,0.12)" stroke="#48bb78" stroke-width="3" filter="url(#glow)"/>
    <text y="-2" text-anchor="middle" fill="#48bb78" font-size="15" font-weight="700">执行工具</text>
    <text y="16" text-anchor="middle" fill="#48bb78" font-size="10" font-family="Space Mono, monospace">EXECUTE TOOL</text>
  </g>

  <!-- Final Deny Box -->
  <g transform="translate(120, 1360)">
    <rect x="-70" y="-25" width="140" height="50" rx="12" fill="rgba(255,107,107,0.1)" stroke="#ff6b6b" stroke-width="2"/>
    <text y="-2" text-anchor="middle" fill="#ff6b6b" font-size="12" font-weight="600">权限拒绝</text>
    <text y="14" text-anchor="middle" fill="#ff6b6b" font-size="9" font-family="Space Mono, monospace">PERMISSION DENIED</text>
  </g>
  <line x1="120" y1="1320" x2="120" y2="1335" stroke="#ff6b6b" stroke-width="2" stroke-opacity="0.5"/>

</svg>
</div>

</div>
